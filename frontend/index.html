<!DOCTYPE html>
<html>
<head>
    <title>ProofPayX — Trustless AI Payments</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ffcc;
            padding: 2rem;
            margin: 0;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        button {
            background: #00ffcc;
            color: #0a0a0a;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
        }
        button.danger { background: #ff4444; color: white; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            background: #1a1a1a;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            border-radius: 4px;
        }
        .card {
            border: 1px solid #00ffcc;
            padding: 1.5rem;
            margin: 1rem 0;
            border-radius: 12px;
        }
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .agent-card {
            background: #1a1a1a;
            border: 1px solid #00ffcc44;
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
        }
        .agent-card:hover { border-color: #00ffcc; }
        .tx-hash {
            background: #1a1a1a;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            word-break: break-all;
            margin-top: 8px;
        }
        .wallet-info { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .status-connected { background: #00ffcc20; color: #00ffcc; padding: 4px 12px; border-radius: 20px; }
        .status-disconnected { background: #ff444420; color: #ff8888; padding: 4px 12px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔒 ProofPayX</h1>
    <p>Stripe for AI agents — but trustless.</p>
    
    <div class="wallet-info">
        <span id="walletStatus" class="status-disconnected">Disconnected</span>
        <button id="connectBtn">Connect OKX Wallet</button>
        <button id="disconnectBtn" style="display:none;" class="danger">Disconnect</button>
    </div>
    
    <div class="card">
        <h3>🤖 Available Agents</h3>
        <div class="agent-grid">
            <div class="agent-card" data-agent="0x04b772f0cf69f45956061100d14bc5417b9ba3eb" data-price="0.01">
                <div class="agent-name">📈 ETH Predictor</div>
                <div class="agent-price">💰 0.01 OKB</div>
            </div>
            <div class="agent-card" data-agent="0x04b772f0cf69f45956061100d14bc5417b9ba3eb" data-price="0.005">
                <div class="agent-name">📊 Sentiment Analyst</div>
                <div class="agent-price">💰 0.005 OKB</div>
            </div>
            <div class="agent-card" data-agent="0x04b772f0cf69f45956061100d14bc5417b9ba3eb" data-price="0.02">
                <div class="agent-name">🔒 Code Auditor</div>
                <div class="agent-price">💰 0.02 OKB</div>
            </div>
        </div>
    </div>
    
    <div class="card">
        <h3>💰 Create Escrow</h3>
        <input type="text" id="agentAddress" placeholder="Agent Address">
        <input type="number" id="amount" placeholder="Amount (OKB)" step="0.001">
        <input type="number" id="minConfidence" placeholder="Min Confidence %" value="80">
        <textarea id="resultData" rows="2" placeholder="Expected result (this text will be hashed)"></textarea>
        <button id="createBtn">Lock Payment</button>
        <div id="createResult" class="tx-hash" style="display:none;"></div>
    </div>
    
    <div class="card">
        <h3>🔓 Verify & Release</h3>
        <input type="number" id="escrowId" placeholder="Escrow ID">
        <textarea id="actualData" rows="2" placeholder="Actual delivered data (must match exactly)"></textarea>
        <input type="number" id="verifyConfidence" placeholder="Confidence %">
        <button id="verifyBtn">Verify & Release</button>
        <div id="verifyResult" class="tx-hash" style="display:none;"></div>
    </div>
    
    <div class="card">
        <h3>📜 Transaction Log</h3>
        <div id="txLog">No transactions yet.</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script>
    let contract, signer, currentAddress;
    const CONTRACT_ADDRESS = "0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6";
    
    const contractABI = [
        "function createEscrow(address _agent, bytes32 _hashlock, uint8 _minConfidence, uint256 _durationSeconds) external payable returns (uint256)",
        "function verifyAndRelease(uint256 _id, bytes memory _proof, uint8 _confidence) external",
        "function escrowCounter() view returns (uint256)"
    ];
    
    function log(message, txHash = null) {
        const logDiv = document.getElementById('txLog');
        const time = new Date().toLocaleTimeString();
        let html = `<div>[${time}] ${message}`;
        if (txHash) html += ` <a href="https://www.okx.com/web3/explorer/xlayer-testnet/tx/${txHash}" target="_blank">View TX</a>`;
        html += `</div>`;
        if (logDiv.innerHTML === 'No transactions yet.') logDiv.innerHTML = '';
        logDiv.innerHTML = html + logDiv.innerHTML;
        if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
    }
    
    function updateUI() {
        const statusSpan = document.getElementById('walletStatus');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        if (currentAddress) {
            statusSpan.innerHTML = `✅ Connected: ${currentAddress.slice(0,6)}...${currentAddress.slice(-4)}`;
            statusSpan.className = 'status-connected';
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'inline-block';
        } else {
            statusSpan.innerHTML = 'Disconnected';
            statusSpan.className = 'status-disconnected';
            connectBtn.style.display = 'inline-block';
            disconnectBtn.style.display = 'none';
        }
    }
    
    document.getElementById('connectBtn').onclick = async () => {
        alert("Connect button clicked - checking for OKX Wallet...");
        
        // Check for OKX Wallet
        if (typeof window.okxwallet === 'undefined' && typeof window.ethereum === 'undefined') {
            alert('OKX Wallet not installed! Please install OKX Wallet extension.');
            return;
        }
        
        const ethProvider = window.okxwallet || window.ethereum;
        alert("Provider found: " + (window.okxwallet ? "OKX Wallet" : "Ethereum"));
        
        try {
            const accounts = await ethProvider.request({ method: 'eth_requestAccounts' });
            alert("Accounts received: " + accounts[0]);
            const provider = new ethers.BrowserProvider(ethProvider);
            signer = await provider.getSigner();
            currentAddress = await signer.getAddress();
            contract = new ethers.Contract(CONTRACT_ADDRESS, contractABI, signer);
            updateUI();
            log(`Wallet connected: ${currentAddress}`);
        } catch (err) {
            alert("Error: " + err.message);
            console.error(err);
        }
    };
    
    document.getElementById('disconnectBtn').onclick = () => {
        currentAddress = null;
        contract = null;
        updateUI();
        log('Wallet disconnected');
    };
    
    document.querySelectorAll('.agent-card').forEach(card => {
        card.onclick = () => {
            document.getElementById('agentAddress').value = card.getAttribute('data-agent');
            document.getElementById('amount').value = card.getAttribute('data-price');
            document.getElementById('minConfidence').value = 80;
            log(`Selected agent: ${card.querySelector('.agent-name').innerText}`);
        };
    });
    
    document.getElementById('createBtn').onclick = async () => {
        if (!contract) { alert('Connect wallet first'); return; }
        const agent = document.getElementById('agentAddress').value;
        const amount = document.getElementById('amount').value;
        const minConf = document.getElementById('minConfidence').value;
        const data = document.getElementById('resultData').value;
        if (!agent || !amount || !data) { alert('Fill all fields'); return; }
        const resultDiv = document.getElementById('createResult');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = 'Processing...';
        try {
            const hashlock = ethers.keccak256(ethers.toUtf8Bytes(data));
            const tx = await contract.createEscrow(agent, hashlock, minConf, 3600, { value: ethers.parseEther(amount) });
            resultDiv.innerHTML = `Waiting... TX: ${tx.hash.slice(0,16)}...`;
            await tx.wait();
            const counter = await contract.escrowCounter();
            const escrowId = Number(counter) - 1;
            resultDiv.innerHTML = `✅ Escrow #${escrowId} created! TX: ${tx.hash}`;
            log(`Escrow #${escrowId} created for ${amount} OKB`, tx.hash);
            document.getElementById('escrowId').value = escrowId;
            document.getElementById('resultData').value = '';
        } catch (err) {
            resultDiv.innerHTML = `❌ Error: ${err.message}`;
            log(`Create failed: ${err.message}`);
        }
    };
    
    document.getElementById('verifyBtn').onclick = async () => {
        if (!contract) { alert('Connect wallet first'); return; }
        const id = document.getElementById('escrowId').value;
        const data = document.getElementById('actualData').value;
        const conf = document.getElementById('verifyConfidence').value;
        if (!id || !data || !conf) { alert('Fill all fields'); return; }
        const resultDiv = document.getElementById('verifyResult');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = 'Processing...';
        try {
            const proofBytes = ethers.toUtf8Bytes(data);
            const tx = await contract.verifyAndRelease(id, proofBytes, conf);
            resultDiv.innerHTML = `Waiting... TX: ${tx.hash.slice(0,16)}...`;
            await tx.wait();
            resultDiv.innerHTML = `✅ Payment released for Escrow #${id}! TX: ${tx.hash}`;
            log(`Escrow #${id} completed with ${conf}% confidence`, tx.hash);
            document.getElementById('actualData').value = '';
            document.getElementById('verifyConfidence').value = '';
        } catch (err) {
            resultDiv.innerHTML = `❌ Error: ${err.message}`;
            log(`Verification failed: ${err.message}`);
        }
    };
    
    log('Frontend loaded. Click Connect OKX Wallet to start.');
</script>
</body>
</html>
