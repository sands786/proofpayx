<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProofPayX - Trustless AI Payments</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --blue-300: #93c5fd;
            --indigo-300: #a5b4fc;
            --violet-200: #ddd6fe;
            --zinc-100: #f4f4f5;
            --zinc-300: #d4d4d8;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --zinc-600: #52525b;
            --zinc-700: #3f3f46;
            --zinc-800: #27272a;
            --zinc-900: #18181b;
            --zinc-950: #09090b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--zinc-950); color: var(--zinc-100); min-height: 100vh; overflow-x: hidden; }
        .aurora-container { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
        .aurora-gradient { position: absolute; inset: -10px; opacity: 0.4; filter: blur(10px); background-image: repeating-linear-gradient(100deg, var(--zinc-950) 0%, var(--zinc-950) 7%, transparent 10%, transparent 12%, var(--zinc-950) 16%), repeating-linear-gradient(100deg, var(--blue-500) 10%, var(--indigo-300) 15%, var(--blue-300) 20%, var(--violet-200) 25%, var(--blue-400) 30%); background-size: 300%, 200%; animation: aurora 60s linear infinite; }
        .aurora-mask { position: absolute; inset: 0; background: radial-gradient(ellipse at 100% 0%, transparent 10%, var(--zinc-950) 70%); }
        @keyframes aurora { from { background-position: 50% 50%, 50% 50%; } to { background-position: 350% 50%, 350% 50%; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .app-container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 2rem; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 3rem; animation: fadeInDown 0.6s ease-out both; }
        .logo-container { display: inline-flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .logo-mark { width: 60px; height: 60px; background: linear-gradient(135deg, rgba(34,211,238,0.12), rgba(59,130,246,0.12)); border: 1px solid rgba(34,211,238,0.3); border-radius: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        h1 { font-size: 3rem; font-weight: 700; background: linear-gradient(90deg, var(--cyan-400), var(--blue-400), #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { font-size: 1.1rem; color: var(--zinc-400); max-width: 560px; margin: 0.25rem auto 0; }
        .subtitle span { color: var(--cyan-400); font-weight: 600; }
        .wallet-section { display: flex; justify-content: center; margin-bottom: 2rem; animation: fadeInUp 0.6s ease-out 0.2s both; }
        .wallet-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.4rem; background: linear-gradient(90deg, var(--cyan-500), var(--blue-500)); color: white; border: none; border-radius: 9999px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; font-family: inherit; }
        .wallet-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(6,182,212,0.3); }
        .wallet-connected { display: inline-flex; align-items: center; gap: 1rem; }
        .wallet-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 9999px; color: #22c55e; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        .disconnect-btn { padding: 0.5rem 1rem; background: transparent; font-family: inherit; border: 1px solid rgba(239,68,68,0.3); color: #ef4444; border-radius: 9999px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
        .disconnect-btn:hover { background: rgba(239,68,68,0.1); }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        @media (max-width: 968px) { .main-grid { grid-template-columns: 1fr; } }
        .col-stack { display: flex; flex-direction: column; gap: 1.5rem; }
        .card { background: rgba(24,24,27,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(63,63,70,0.5); border-radius: 16px; padding: 1.5rem; animation: fadeInUp 0.5s ease-out both; }
        .card-title { display: flex; align-items: center; gap: 0.5rem; font-size: 1.05rem; font-weight: 600; color: var(--zinc-100); margin-bottom: 1.25rem; }
        .card-title svg { width: 18px; height: 18px; color: var(--cyan-400); flex-shrink: 0; }
        .agent-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }
        @media (max-width: 480px) { .agent-grid { grid-template-columns: 1fr; } }
        .agent-card { background: rgba(39,39,42,0.5); border: 2px solid rgba(63,63,70,0.5); border-radius: 12px; padding: 0.75rem; cursor: pointer; min-width: 0; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; position: relative; }
        .agent-card:hover { transform: scale(1.02); border-color: rgba(34,211,238,0.5); box-shadow: 0 8px 24px rgba(34,211,238,0.1); }
        .agent-card.selected { border-color: var(--cyan-400); background: rgba(34,211,238,0.08); box-shadow: 0 0 20px rgba(34,211,238,0.15); }
        .agent-card.selected::after { content: "✓"; position: absolute; top: 6px; right: 6px; width: 18px; height: 18px; line-height: 18px; text-align: center; background: var(--cyan-400); color: var(--zinc-950); border-radius: 50%; font-size: 11px; font-weight: bold; }
        .agent-icon { width: 34px; height: 34px; background: linear-gradient(135deg, rgba(34,211,238,0.18), rgba(59,130,246,0.18)); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.6rem; }
        .agent-icon svg { width: 16px; height: 16px; color: var(--cyan-400); }
        .agent-name { font-weight: 600; color: var(--zinc-100); font-size: 0.78rem; margin-bottom: 0.2rem; }
        .agent-price { font-size: 0.72rem; color: var(--zinc-400); margin-bottom: 0.35rem; }
        .agent-address { font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; color: var(--zinc-600); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
        .form-group { margin-bottom: 0.9rem; }
        .form-label { display: block; font-size: 0.78rem; color: var(--zinc-400); margin-bottom: 0.35rem; }
        .form-input { width: 100%; padding: 0.65rem 0.9rem; background: rgba(9,9,11,0.8); border: 1px solid rgba(63,63,70,0.8); border-radius: 8px; color: var(--zinc-100); font-size: 0.875rem; transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit; }
        .form-input:focus { outline: none; border-color: var(--cyan-500); box-shadow: 0 0 0 3px rgba(6,182,212,0.1); }
        .form-input::placeholder { color: var(--zinc-600); }
        textarea.form-input { resize: vertical; min-height: 76px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
        @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
        .submit-btn { width: 100%; padding: 0.85rem; background: linear-gradient(90deg, var(--cyan-500), var(--blue-500)); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 0.9rem; font-family: inherit; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 0.5rem; transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s; }
        .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(6,182,212,0.25); }
        .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .submit-btn.verify { background: linear-gradient(90deg, #22c55e, #10b981); }
        .spinner { width: 17px; height: 17px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-success { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.85rem; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; color: #22c55e; margin-top: 0.5rem; font-size: 0.875rem; }
        .status-error { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.85rem; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; color: #ef4444; margin-top: 0.5rem; font-size: 0.875rem; }
        .tx-badge { display: block; width: 100%; padding: 0.6rem; margin-top: 0.75rem; background: rgba(9,9,11,0.5); border: 1px solid rgba(63,63,70,0.5); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--zinc-400); text-align: center; word-break: break-all; }
        .log-container { max-height: 200px; overflow-y: auto; background: rgba(9,9,11,0.5); border: 1px solid rgba(63,63,70,0.5); border-radius: 8px; padding: 0.9rem; }
        .log-container::-webkit-scrollbar { width: 5px; }
        .log-container::-webkit-scrollbar-track { background: rgba(39,39,42,0.5); border-radius: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(63,63,70,0.8); border-radius: 4px; }
        .log-entry { font-size: 0.78rem; padding: 0.35rem 0; border-bottom: 1px solid rgba(63,63,70,0.3); }
        .log-entry:last-child { border-bottom: none; }
        .log-time { color: var(--zinc-600); font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; margin-right: 0.4rem; }
        .log-message { color: var(--zinc-300); }
        .log-link { color: var(--cyan-400); text-decoration: none; margin-left: 0.4rem; font-size: 0.68rem; }
        .log-link:hover { text-decoration: underline; }
        .empty-log { text-align: center; color: var(--zinc-600); padding: 2rem; font-size: 0.85rem; }
        .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 0.85rem 1.2rem; background: rgba(24,24,27,0.97); border: 1px solid rgba(63,63,70,0.5); border-radius: 12px; backdrop-filter: blur(12px); display: inline-flex; align-items: center; gap: 0.75rem; animation: slideIn 0.3s ease-out; max-width: 360px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .toast.success { border-color: rgba(34,197,94,0.3); }
        .toast.error { border-color: rgba(239,68,68,0.3); }
        .toast-icon { width: 17px; height: 17px; flex-shrink: 0; }
        .toast.success .toast-icon { color: #22c55e; }
        .toast.error .toast-icon { color: #ef4444; }
        .toast-message { color: var(--zinc-100); font-size: 0.85rem; }
        .footer { text-align: center; color: var(--zinc-600); font-size: 0.78rem; padding: 2rem 0; animation: fadeIn 0.6s ease-out 0.7s both; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const CONTRACT_ADDRESS = "0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6";
    const EXPLORER_URL = "https://www.oklink.com/xlayer-test/tx/";
    const CONTRACT_ABI = [
        "function createEscrow(address _agent, bytes32 _hashlock, uint8 _minConfidence, uint256 _durationSeconds) external payable returns (uint256)",
        "function verifyAndRelease(uint256 _id, bytes memory _proof, uint8 _confidence) external",
        "function escrowCounter() view returns (uint256)"
    ];

    const AGENTS = [
        { name: "ETH Predictor", price: "0.01 OKB", address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb",
          Icon: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> },
        { name: "Sentiment", price: "0.005 OKB", address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb",
          Icon: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg> },
        { name: "Code Auditor", price: "0.02 OKB", address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb",
          Icon: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> }
    ];

    function Toast({ message, type, onClose }) {
        useEffect(() => { const t = setTimeout(onClose, 5000); return () => clearTimeout(t); }, [onClose]);
        return (
            <div className={`toast ${type}`}>
                {type === "success"
                    ? <svg className="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    : <svg className="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                }
                <span className="toast-message">{message}</span>
            </div>
        );
    }
    function ToastContainer({ toasts, removeToast }) {
        return <div className="toast-container">{toasts.map(t => <Toast key={t.id} {...t} onClose={() => removeToast(t.id)} />)}</div>;
    }

    function AgentCard({ agent, isSelected, onClick }) {
        return (
            <div className={`agent-card${isSelected ? " selected" : ""}`} onClick={onClick}>
                <div className="agent-icon"><agent.Icon /></div>
                <div className="agent-name">{agent.name}</div>
                <div className="agent-price">{agent.price}</div>
                <div className="agent-address">{agent.address}</div>
            </div>
        );
    }

    function EscrowForm({ contract, onSuccess, onLog, selectedAgent, addToast }) {
        const [agentAddr, setAgentAddr] = useState("");
        const [amount, setAmount] = useState("");
        const [minConf, setMinConf] = useState("80");
        const [result, setResult] = useState("");
        const [loading, setLoading] = useState(false);
        const [status, setStatus] = useState("idle");
        const [txHash, setTxHash] = useState("");

        useEffect(() => { if (selectedAgent) { setAgentAddr(selectedAgent.address); setAmount(selectedAgent.price.split(" ")[0]); } }, [selectedAgent]);

        const handleSubmit = async (e) => {
            e.preventDefault();
            if (!contract || !agentAddr || !amount || !result) return;
            setLoading(true); setStatus("processing");
            onLog("Creating escrow transaction...");
            try {
                const hashlock = ethers.keccak256(ethers.toUtf8Bytes(result));
                const tx = await contract.createEscrow(agentAddr, hashlock, parseInt(minConf), 3600, { value: ethers.parseEther(amount) });
                setTxHash(tx.hash);
                onLog(`Transaction sent: ${tx.hash.slice(0,16)}...`, tx.hash);
                await tx.wait();
                const counter = await contract.escrowCounter();
                const id = Number(counter) - 1;
                setStatus("success");
                onLog(`✅ Escrow #${id} created!`, tx.hash);
                addToast(`Escrow #${id} created successfully!`, "success");
                onSuccess(id, tx.hash);
                setTimeout(() => { setStatus("idle"); setResult(""); }, 3000);
            } catch (err) {
                setStatus("error");
                onLog(`❌ Failed: ${err.message}`);
                addToast(err.message || "Failed to create escrow", "error");
                setTimeout(() => setStatus("idle"), 3000);
            } finally { setLoading(false); }
        };

        return (
            <div className="card">
                <div className="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/></svg>Create Escrow</div>
                <form onSubmit={handleSubmit}>
                    <div className="form-group"><label className="form-label">Agent Address</label><input type="text" className="form-input" value={agentAddr} onChange={e => setAgentAddr(e.target.value)} placeholder="0x..." /></div>
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">Amount (OKB)</label><input type="number" step="0.001" className="form-input" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.01" /></div>
                        <div className="form-group"><label className="form-label">Min Confidence %</label><input type="number" className="form-input" value={minConf} onChange={e => setMinConf(e.target.value)} /></div>
                    </div>
                    <div className="form-group"><label className="form-label">Expected Result (will be hashed)</label><textarea className="form-input" value={result} onChange={e => setResult(e.target.value)} placeholder="Enter expected result data..." rows="3" /></div>
                    {status === "success" && <div className="status-success"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>Escrow Created Successfully!</div>}
                    {status === "error" && <div className="status-error"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Transaction Failed</div>}
                    {(status === "idle" || status === "processing") && <button type="submit" className="submit-btn" disabled={loading || !contract || !agentAddr || !amount || !result}>{loading ? <><div className="spinner"/> Processing...</> : <><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Lock Payment</>}</button>}
                    {txHash && <div className="tx-badge">TX: {txHash.slice(0,20)}...{txHash.slice(-8)}</div>}
                </form>
            </div>
        );
    }

    function VerifyForm({ contract, onLog, addToast }) {
        const [escrowId, setEscrowId] = useState("");
        const [actual, setActual] = useState("");
        const [conf, setConf] = useState("");
        const [loading, setLoading] = useState(false);
        const [status, setStatus] = useState("idle");
        const [txHash, setTxHash] = useState("");

        const handleSubmit = async (e) => {
            e.preventDefault();
            if (!contract || !escrowId || !actual || !conf) return;
            setLoading(true); setStatus("processing");
            onLog(`Verifying escrow #${escrowId}...`);
            try {
                const tx = await contract.verifyAndRelease(parseInt(escrowId), ethers.toUtf8Bytes(actual), parseInt(conf));
                setTxHash(tx.hash);
                onLog(`Verification TX sent: ${tx.hash.slice(0,16)}...`, tx.hash);
                await tx.wait();
                setStatus("success");
                onLog(`✅ Payment released for Escrow #${escrowId}!`, tx.hash);
                addToast(`Payment released for Escrow #${escrowId}!`, "success");
                setTimeout(() => { setStatus("idle"); setActual(""); setConf(""); }, 3000);
            } catch (err) {
                setStatus("error");
                onLog(`❌ Verification failed: ${err.message}`);
                addToast(err.message || "Verification failed", "error");
                setTimeout(() => setStatus("idle"), 3000);
            } finally { setLoading(false); }
        };

        return (
            <div className="card">
                <div className="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>Verify and Release</div>
                <form onSubmit={handleSubmit}>
                    <div className="form-group"><label className="form-label">Escrow ID</label><input type="number" className="form-input" value={escrowId} onChange={e => setEscrowId(e.target.value)} placeholder="0" /></div>
                    <div className="form-group"><label className="form-label">Actual Delivered Data</label><textarea className="form-input" value={actual} onChange={e => setActual(e.target.value)} placeholder="Enter the actual result data..." rows="3" /></div>
                    <div className="form-group"><label className="form-label">Confidence %</label><input type="number" className="form-input" value={conf} onChange={e => setConf(e.target.value)} placeholder="85" /></div>
                    {status === "success" && <div className="status-success"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>Payment Released!</div>}
                    {status === "error" && <div className="status-error"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Verification Failed</div>}
                    {(status === "idle" || status === "processing") && <button type="submit" className="submit-btn verify" disabled={loading || !contract || !escrowId || !actual || !conf}>{loading ? <><div className="spinner"/> Verifying...</> : <><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg> Verify and Release</>}</button>}
                    {txHash && <div className="tx-badge">TX: {txHash.slice(0,20)}...{txHash.slice(-8)}</div>}
                </form>
            </div>
        );
    }

    function TransactionLog({ logs }) {
        return (
            <div className="card">
                <div className="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Transaction Log</div>
                <div className="log-container">
                    {logs.length === 0 ? <div className="empty-log">No transactions yet.</div> : logs.map((log, i) => (
                        <div key={i} className="log-entry">
                            <span className="log-time">[{log.time}]</span>
                            <span className="log-message">{log.message}</span>
                            {log.txHash && <a href={`${EXPLORER_URL}${log.txHash}`} target="_blank" rel="noopener noreferrer" className="log-link">🔗 View on Explorer</a>}
                        </div>
                    ))}
                </div>
            </div>
        );
    }

    function App() {
        const [contract, setContract] = useState(null);
        const [address, setAddress] = useState("");
        const [selectedAgent, setAgent] = useState(null);
        const [logs, setLogs] = useState([]);
        const [toasts, setToasts] = useState([]);

        const addToast = useCallback((message, type) => { const id = Date.now(); setToasts(p => [...p, { id, message, type }]); }, []);
        const removeToast = useCallback((id) => setToasts(p => p.filter(t => t.id !== id)), []);
        const addLog = useCallback((message, txHash) => { const time = new Date().toLocaleTimeString(); setLogs(p => [{ time, message, txHash }, ...p].slice(0, 20)); }, []);

        const connectWallet = async () => {
            try {
                const provider = window.okxwallet || window.ethereum;
                if (!provider) { addToast("No wallet found. Install OKX Wallet.", "error"); return; }
                await provider.request({ method: "eth_requestAccounts" });
                const ethProvider = new ethers.BrowserProvider(provider);
                const signer = await ethProvider.getSigner();
                const userAddress = await signer.getAddress();
                setContract(new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer));
                setAddress(userAddress);
                addLog(`Wallet connected: ${userAddress}`);
                addToast("Wallet connected!", "success");
            } catch (err) { addToast(err.message || "Failed to connect wallet", "error"); addLog(`Connection failed: ${err.message}`); }
        };

        const disconnectWallet = () => { setContract(null); setAddress(""); addLog("Wallet disconnected"); addToast("Wallet disconnected", "success"); };

        return (
            <>
                <div className="aurora-container"><div className="aurora-gradient"></div><div className="aurora-mask"></div></div>
                <ToastContainer toasts={toasts} removeToast={removeToast} />
                <div className="app-container">
                    <header className="header">
                        <div className="logo-container">
                            <div className="logo-mark"><svg width="34" height="34" viewBox="0 0 34 34" fill="none"><defs><linearGradient id="shieldGrad" x1="0" y1="0" x2="34" y2="34"><stop stopColor="#22d3ee"/><stop offset="1" stopColor="#3b82f6"/></linearGradient></defs><path d="M17 2L4 7.5V17c0 6.6 5.6 12.8 13 14.5C24.4 29.8 30 23.6 30 17V7.5L17 2z" fill="url(#shieldGrad)" fillOpacity="0.18" stroke="url(#shieldGrad)" strokeWidth="1.4"/><circle cx="17" cy="17" r="2.5" fill="#22d3ee"/><line x1="17" y1="10.5" x2="17" y2="14.5" stroke="#22d3ee" strokeWidth="1.4"/><line x1="17" y1="19.5" x2="17" y2="23.5" stroke="#22d3ee" strokeWidth="1.4"/><line x1="10.5" y1="17" x2="14.5" y2="17" stroke="#22d3ee" strokeWidth="1.4"/><line x1="19.5" y1="17" x2="23.5" y2="17" stroke="#22d3ee" strokeWidth="1.4"/></svg></div>
                            <h1>ProofPayX</h1>
                        </div>
                        <p className="subtitle">Stripe for AI agents — but <span>trustless</span></p>
                    </header>
                    <div className="wallet-section">
                        {address ? (
                            <div className="wallet-connected">
                                <div className="wallet-badge"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>{address.slice(0,6)}...{address.slice(-4)}</div>
                                <button className="disconnect-btn" onClick={disconnectWallet}>Disconnect</button>
                            </div>
                        ) : (
                            <button className="wallet-btn" onClick={connectWallet}><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M20 12v4H6a2 2 0 0 0-2 2c0 1.1.9 2 2 2h12v-4"/><path d="M20 12h-4"/></svg>Connect OKX Wallet</button>
                        )}
                    </div>
                    <div className="main-grid">
                        <div className="col-stack">
                            <div className="card">
                                <div className="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Available Agents</div>
                                <div className="agent-grid">{AGENTS.map(agent => <AgentCard key={agent.name} agent={agent} isSelected={selectedAgent?.name === agent.name} onClick={() => { setAgent(agent); addLog(`Selected agent: ${agent.name}`); }} />)}</div>
                            </div>
                            <EscrowForm contract={contract} onSuccess={() => {}} onLog={addLog} selectedAgent={selectedAgent} addToast={addToast} />
                        </div>
                        <div className="col-stack">
                            <VerifyForm contract={contract} onLog={addLog} addToast={addToast} />
                            <TransactionLog logs={logs} />
                        </div>
                    </div>
                    <footer className="footer">Connected to X Layer Testnet · Contract: {CONTRACT_ADDRESS.slice(0,6)}...{CONTRACT_ADDRESS.slice(-4)}</footer>
                </div>
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
