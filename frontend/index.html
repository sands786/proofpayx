<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProofPayX - Stripe for AI agents — but trustless</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --void-black: #050508;
            --void-dark: #0A0A0F;
            --void-card: #111118;
            --void-border: rgba(255,255,255,0.06);
            --neon-cyan: #00D4FF;
            --neon-blue: #4D9FFF;
            --neon-purple: #A855F7;
            --neon-green: #10B981;
            --neon-amber: #F59E0B;
            --neon-red: #EF4444;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --gradient-primary: linear-gradient(135deg, #00D4FF 0%, #4D9FFF 100%);
            --gradient-success: linear-gradient(135deg, #10B981 0%, #00D4FF 100%);
            --gradient-glow: radial-gradient(ellipse at center, rgba(0,212,255,0.15) 0%, transparent 70%);
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--void-black); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .aurora::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        .aurora-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: blob-float 20s ease-in-out infinite; }
        .blob-1 { width: 600px; height: 600px; top: -200px; left: -150px; background: linear-gradient(135deg, #00D4FF, #4D9FFF); animation-delay: 0s; }
        .blob-2 { width: 500px; height: 500px; top: 20%; right: -200px; background: linear-gradient(135deg, #A855F7, #4D9FFF); animation-delay: -5s; }
        .blob-3 { width: 400px; height: 400px; bottom: -100px; left: 30%; background: linear-gradient(135deg, #00D4FF, #10B981); animation-delay: -10s; }
        @keyframes blob-float { 0%, 100% { transform: translate(0,0) scale(1); } 25% { transform: translate(30px,-30px) scale(1.05); } 50% { transform: translate(-20px,20px) scale(0.95); } 75% { transform: translate(40px,10px) scale(1.02); } }
        .grid-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px), linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%); }

        /* ── Splash ── */
        .splash { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--void-black); animation: splash-exit 0.8s cubic-bezier(0.4,0,0.2,1) 4.8s forwards; }
        .splash-content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 1.2rem; text-align: center; }
        .splash-hello { height: 2rem; overflow: hidden; margin-bottom: -0.25rem; }
        .splash-hello-inner { display: flex; flex-direction: column; align-items: center; animation: hello-cycle 4.2s ease-in-out both; }
        .splash-hello-word { height: 2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; font-weight: 500; color: rgba(0,212,255,0.65); letter-spacing: 0.1em; font-family: 'JetBrains Mono', monospace; }
        @keyframes hello-cycle { 0% { transform: translateY(0); } 12% { transform: translateY(-2rem); } 24% { transform: translateY(-4rem); } 36% { transform: translateY(-6rem); } 48% { transform: translateY(-8rem); } 60% { transform: translateY(-10rem); } 72% { transform: translateY(-12rem); } 88%, 100% { transform: translateY(-14rem); } }

        /* Logo floats on background — no box, no border, no bg */
        .splash-logo {
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logo-float 2.4s ease-in-out infinite;
            /* The logo PNG has black bg so we mix-blend to dissolve it */
            filter: drop-shadow(0 0 40px rgba(0,212,255,0.55)) drop-shadow(0 0 80px rgba(77,159,255,0.3));
        }
        .splash-logo img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            /* multiply blends the black bg of the logo into the dark page bg */
            mix-blend-mode: screen;
        }
        @keyframes logo-float {
            0%, 100% { transform: translateY(0px); filter: drop-shadow(0 0 35px rgba(0,212,255,0.5)) drop-shadow(0 0 70px rgba(77,159,255,0.25)); }
            50% { transform: translateY(-8px); filter: drop-shadow(0 0 60px rgba(0,212,255,0.8)) drop-shadow(0 0 120px rgba(77,159,255,0.45)); }
        }

        .splash-subtitle { font-size: 1rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; margin-top: 0.25rem; }
        .splash-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 0.75rem; }
        .splash-fill { height: 100%; width: 0; background: var(--gradient-primary); animation: fill-bar 3.8s ease 0.5s forwards; }
        @keyframes fill-bar { to { width: 100%; } }
        @keyframes splash-exit { to { opacity: 0; transform: scale(1.05); visibility: hidden; } }

        .app { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 2rem; opacity: 0; animation: app-in 0.6s ease 5s forwards; }
        @keyframes app-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: rgba(17,17,24,0.8); backdrop-filter: blur(20px); border: 1px solid var(--void-border); border-radius: 16px; margin-bottom: 2rem; position: sticky; top: 1rem; z-index: 100; }
        .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
        .nav-logo { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; }
        .nav-logo img { width: 38px; height: 38px; object-fit: contain; mix-blend-mode: screen; filter: drop-shadow(0 0 6px rgba(0,212,255,0.5)); }
        .nav-title { font-size: 1.25rem; font-weight: 700; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-tagline { font-size: 0.65rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; }
        .nav-actions { display: flex; align-items: center; gap: 0.75rem; }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.65rem 1.25rem; border-radius: 10px; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; border: none; position: relative; overflow: hidden; }
        .btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); opacity: 0; transition: opacity 0.2s; }
        .btn:hover::before { opacity: 1; }
        .btn-primary { background: var(--gradient-primary); color: white; box-shadow: 0 4px 20px rgba(0,212,255,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,255,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--void-border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: rgba(0,212,255,0.3); }
        .btn-success { background: var(--gradient-success); color: white; box-shadow: 0 4px 20px rgba(16,185,129,0.3); }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(16,185,129,0.4); }
        .btn-danger { background: rgba(239,68,68,0.1); color: var(--neon-red); border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 2rem; }
        @media (max-width: 900px) { .stats-bar { grid-template-columns: repeat(2,1fr); } }
        @media (max-width: 500px) { .stats-bar { grid-template-columns: 1fr; } }
        .stat-card { background: var(--void-card); border: 1px solid var(--void-border); border-radius: 14px; padding: 1.25rem; display: flex; align-items: center; gap: 1rem; transition: all 0.3s ease; }
        .stat-card:hover { border-color: rgba(0,212,255,0.2); transform: translateY(-2px); }
        .stat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .stat-icon.cyan { background: rgba(0,212,255,0.1); color: var(--neon-cyan); }
        .stat-icon.green { background: rgba(16,185,129,0.1); color: var(--neon-green); }
        .stat-icon.purple { background: rgba(168,85,247,0.1); color: var(--neon-purple); }
        .stat-icon.amber { background: rgba(245,158,11,0.1); color: var(--neon-amber); }
        .stat-content { display: flex; flex-direction: column; gap: 0.25rem; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
        .stat-value span { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }
        .col { display: flex; flex-direction: column; gap: 1.5rem; }
        .card { background: var(--void-card); border: 1px solid var(--void-border); border-radius: 16px; padding: 1.5rem; position: relative; overflow: hidden; transition: all 0.3s ease; }
        .card::before { content: ''; position: absolute; inset: 0; background: var(--gradient-glow); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .card:hover::before { opacity: 1; }
        .card:hover { border-color: rgba(0,212,255,0.15); transform: translateY(-2px); }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; position: relative; z-index: 1; }
        .card-title { display: flex; align-items: center; gap: 0.5rem; font-size: 1rem; font-weight: 600; color: var(--text-primary); }
        .card-title svg { color: var(--neon-cyan); }
        .card-badge { font-size: 0.7rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.05); padding: 0.25rem 0.75rem; border-radius: 20px; }
        .card-body { position: relative; z-index: 1; }

        .agent-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; }
        @media (max-width: 600px) { .agent-grid { grid-template-columns: 1fr; } }
        .agent-card { background: rgba(255,255,255,0.03); border: 1px solid var(--void-border); border-radius: 12px; padding: 1rem; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; min-width: 0; }
        .agent-card:hover { background: rgba(0,212,255,0.05); border-color: rgba(0,212,255,0.3); transform: translateY(-2px); }
        .agent-card.active { background: rgba(0,212,255,0.08); border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,212,255,0.15); }
        .agent-card.active::after { content: '✓'; position: absolute; top: 8px; right: 8px; width: 18px; height: 18px; background: var(--neon-cyan); color: var(--void-black); border-radius: 50%; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
        .agent-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; }
        .agent-icon svg { width: 16px; height: 16px; color: white; }
        .agent-name { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .agent-price { font-size: 0.75rem; color: var(--neon-cyan); font-family: 'JetBrains Mono', monospace; margin-bottom: 0.5rem; }
        .agent-stats { display: flex; flex-direction: column; gap: 0.4rem; }
        .stat-row { display: flex; align-items: center; gap: 0.5rem; }
        .stat-row-label { font-size: 0.65rem; color: var(--text-muted); min-width: 35px; }
        .stars { display: flex; gap: 2px; }
        .star { width: 10px; height: 10px; }
        .star.filled path { fill: var(--neon-amber); }
        .star.empty path { fill: rgba(255,255,255,0.1); }
        .conf-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; min-width: 0; }
        .conf-bar-fill { height: 100%; background: var(--gradient-primary); border-radius: 2px; transition: width 0.3s ease; }
        .agent-addr { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-muted); margin-top: 0.5rem; cursor: pointer; transition: color 0.2s; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; width: 100%; }
        .agent-addr:hover { color: var(--neon-cyan); }

        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.4rem; font-weight: 500; }
        .form-input { width: 100%; padding: 0.75rem 1rem; background: rgba(0,0,0,0.3); border: 1px solid var(--void-border); border-radius: 10px; color: var(--text-primary); font-size: 0.9rem; font-family: inherit; transition: all 0.2s ease; }
        .form-input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
        .form-input::placeholder { color: var(--text-muted); }
        textarea.form-input { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

        .payout-preview { background: linear-gradient(135deg, rgba(0,212,255,0.05), rgba(77,159,255,0.05)); border: 1px solid rgba(0,212,255,0.15); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .payout-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .payout-row:last-child { border-bottom: none; }
        .payout-key { font-size: 0.75rem; color: var(--text-secondary); }
        .payout-val { font-size: 0.8rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        .payout-val.accent { color: var(--neon-cyan); }
        .payout-val.success { color: var(--neon-green); }
        .payout-val.warning { color: var(--neon-amber); }
        .conf-track { margin-top: 0.75rem; }
        .conf-track-header { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.4rem; }
        .conf-track-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; position: relative; overflow: hidden; }
        .conf-track-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
        .conf-track-marker { position: absolute; top: -2px; width: 2px; height: 10px; background: var(--neon-amber); border-radius: 1px; }
        .payout-note { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.05); }

        .success-state { background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(0,212,255,0.05)); border: 1px solid rgba(16,185,129,0.3); border-radius: 12px; padding: 1.5rem; text-align: center; animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes pop-in { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .success-icon { width: 50px; height: 50px; border-radius: 50%; background: var(--gradient-success); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; animation: success-pulse 2s ease-out infinite; }
        @keyframes success-pulse { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 70% { box-shadow: 0 0 0 15px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }
        .success-title { font-size: 1.1rem; font-weight: 700; color: var(--neon-green); margin-bottom: 0.5rem; }
        .success-subtitle { font-size: 0.8rem; color: var(--text-secondary); }
        .error-state { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 1rem; display: flex; align-items: center; gap: 0.75rem; color: var(--neon-red); font-size: 0.85rem; }

        .tx-pill { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; margin-top: 1rem; background: rgba(0,0,0,0.3); border: 1px solid var(--void-border); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); cursor: pointer; transition: all 0.2s; min-width: 0; }
        .tx-pill span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .tx-pill:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }

        .history-list { display: flex; flex-direction: column; gap: 0.6rem; max-height: 280px; overflow-y: auto; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 2px; }
        .history-empty { text-align: center; color: var(--text-muted); padding: 2rem; font-size: 0.85rem; }
        .history-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(255,255,255,0.03); border: 1px solid var(--void-border); border-radius: 10px; transition: all 0.2s; min-width: 0; overflow: hidden; }
        .history-item:hover { background: rgba(255,255,255,0.05); }
        .history-info { flex: 1; min-width: 0; }
        .history-id { font-size: 0.8rem; font-weight: 600; color: var(--text-primary); }
        .history-meta { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.15rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-amount { font-size: 0.8rem; font-weight: 600; color: var(--neon-cyan); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
        .history-status { font-size: 0.6rem; font-weight: 600; padding: 0.25rem 0.6rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; white-space: nowrap; }
        .history-status.pending { background: rgba(245,158,11,0.15); color: var(--neon-amber); }
        .history-status.released { background: rgba(16,185,129,0.15); color: var(--neon-green); }
        .history-status.refunded { background: rgba(239,68,68,0.15); color: var(--neon-red); }
        .history-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }
        .history-btn { width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.05); border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .history-btn:hover { background: rgba(0,212,255,0.1); color: var(--neon-cyan); }

        .log-box { max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); border: 1px solid var(--void-border); border-radius: 10px; padding: 1rem; }
        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 2px; }
        .log-item { display: flex; gap: 0.75rem; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.75rem; }
        .log-item:last-child { border-bottom: none; }
        .log-time { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
        .log-message { color: var(--text-secondary); word-break: break-all; }
        .log-message.success { color: var(--neon-green); }
        .log-message.error { color: var(--neon-red); }
        .log-link { color: var(--neon-cyan); text-decoration: none; margin-left: auto; flex-shrink: 0; }
        .log-link:hover { text-decoration: underline; }
        .log-empty { text-align: center; color: var(--text-muted); padding: 1.5rem; font-size: 0.85rem; }

        .net-select { position: relative; }
        .net-trigger { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--void-border); border-radius: 10px; cursor: pointer; font-size: 0.8rem; color: var(--text-secondary); transition: all 0.2s; }
        .net-trigger:hover { border-color: rgba(0,212,255,0.3); color: var(--text-primary); }
        .net-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .net-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: var(--void-card); border: 1px solid var(--void-border); border-radius: 12px; padding: 0.5rem; min-width: 200px; z-index: 200; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: dropdown-in 0.2s ease; }
        @keyframes dropdown-in { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .net-option { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem; color: var(--text-secondary); transition: all 0.15s; }
        .net-option:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .net-option.active { color: var(--neon-cyan); background: rgba(0,212,255,0.08); }

        .toasts { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.25rem; background: var(--void-card); border: 1px solid var(--void-border); border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: toast-in 0.3s ease; max-width: 350px; }
        @keyframes toast-in { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        .toast.success { border-color: rgba(16,185,129,0.3); }
        .toast.error { border-color: rgba(239,68,68,0.3); }
        .toast-icon { width: 20px; height: 20px; flex-shrink: 0; }
        .toast.success .toast-icon { color: var(--neon-green); }
        .toast.error .toast-icon { color: var(--neon-red); }
        .toast-message { font-size: 0.85rem; color: var(--text-primary); }

        .footer { margin-top: 3rem; padding: 2rem; background: var(--void-card); border: 1px solid var(--void-border); border-radius: 16px; text-align: center; }
        .footer-content { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 1rem; font-size: 0.75rem; color: var(--text-muted); }
        .footer-divider { color: var(--void-border); }
        .footer-link { color: var(--neon-cyan); text-decoration: none; font-family: 'JetBrains Mono', monospace; }
        .footer-link:hover { text-decoration: underline; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: skeleton-shimmer 1.5s infinite; border-radius: 4px; }
        @keyframes skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .copy-btn { cursor: pointer; display: inline-flex; align-items: center; gap: 0.25rem; transition: color 0.2s; }
        .copy-btn:hover { color: var(--neon-cyan); }
        @media (max-width: 768px) { .app { padding: 1rem; } .nav { flex-direction: column; gap: 1rem; padding: 1rem; } .nav-actions { width: 100%; justify-content: center; } .toasts { left: 1rem; right: 1rem; } .toast { max-width: 100%; } }

function useCopy(timeout = 1600) {
    const [copied, setCopied] = useState(false);
    const timerRef = useRef(null);
    const copy = useCallback(text => {
        navigator.clipboard.writeText(text).then(() => {
            setCopied(true);
            clearTimeout(timerRef.current);
            timerRef.current = setTimeout(() => setCopied(false), timeout);
        }).catch(() => {});
    }, [timeout]);
    useEffect(() => () => clearTimeout(timerRef.current), []);
    return [copied, copy];
}

const CopyBtn = memo(function CopyBtn({ text, children, className = '', style = {} }) {
    const [copied, copy] = useCopy();
    return (
        <span className={`copy-btn ${className}`} style={{ color: copied ? '#10B981' : 'inherit', ...style }}
              onClick={e => { e.stopPropagation(); copy(text); }} title={copied ? 'Copied!' : 'Copy'}>
            {children}
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                {copied ? <polyline points="20 6 9 17 4 12"/> : <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>}
            </svg>
        </span>
    );
});

const Stars = memo(function Stars({ score }) {
    return (
        <div className="stars">
            {[1,2,3,4,5].map(i => (
                <svg key={i} className={`star ${score >= i ? 'filled' : 'empty'}`} viewBox="0 0 12 12">
                    <path d="M6 1l1.5 4h4L8.5 7.5l1 4L6 9l-3.5 2.5 1-4L.5 5h4z" strokeWidth="0"/>
                </svg>
            ))}
        </div>
    );
});

const Toast = memo(function Toast({ message, type, onClose }) {
    useEffect(() => { const t = setTimeout(onClose, 5000); return () => clearTimeout(t); }, [onClose]);
    return (
        <div className={`toast ${type}`}>
            <svg className="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                {type === 'success'
                    ? <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>
                    : <><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>
                }
            </svg>
            <span className="toast-message">{message}</span>
        </div>
    );
});

function Splash() {
    return (
        <div className="splash">
            <div className="aurora-blob blob-1"/>
            <div className="aurora-blob blob-2"/>
            <div className="aurora-blob blob-3"/>
            <div className="splash-content">
                <div className="splash-hello">
                    <div className="splash-hello-inner">
                        {[...HELLOS, HELLOS[0]].map((word, i) => (
                            <div key={i} className="splash-hello-word">{word}</div>
                        ))}
                    </div>
                </div>
                <div className="splash-logo">
                    <img src={LOGO_SRC} alt="ProofPayX" />
                </div>
                <div className="splash-subtitle">Stripe for AI agents — but trustless</div>
                <div className="splash-bar"><div className="splash-fill"/></div>
            </div>
        </div>
    );
}

const StatsBar = memo(function StatsBar({ txCount }) {
    const [animated, setAnimated] = useState(false);
    const [stats, setStats] = useState({ success: 0, time: 0, gas: '0.000000', agents: 0 });
    useEffect(() => {
        const t = setTimeout(() => {
            setAnimated(true);
            let s=0,tm=0,g=0,a=0;
            const si=setInterval(()=>{s+=5;if(s>=100){s=100;clearInterval(si);}setStats(p=>({...p,success:s}));},30);
            const ti=setInterval(()=>{tm+=0.4;if(tm>=4){tm=4;clearInterval(ti);}setStats(p=>({...p,time:Math.round(tm*10)/10}));},50);
            const gi=setInterval(()=>{g+=0.0000003;if(g>=0.000003){g=0.000003;clearInterval(gi);}setStats(p=>({...p,gas:g.toFixed(7).slice(0,9)}));},60);
            const ai=setInterval(()=>{a++;if(a>=3)clearInterval(ai);setStats(p=>({...p,agents:a}));},200);
        }, 800);
        return () => clearTimeout(t);
    }, []);
    return (
        <div className="stats-bar">
            <div className="stat-card"><div className="stat-icon green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div className="stat-content"><div className="stat-value"><span>{animated?stats.success:0}%</span></div><div className="stat-label">Success Rate</div></div></div>

            <div className="stat-card"><div className="stat-icon amber"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div className="stat-content"><div className="stat-value"><span>{animated?stats.agents:0}</span></div><div className="stat-label">Live Agents</div></div></div>

});

function EscrowForm({ contract, onSuccess, onLog, selectedAgent, addToast }) {
    const [agentAddr,setAgentAddr]=useState('');
    const [amount,setAmount]=useState('');
    const [minConf,setMinConf]=useState('80');
    const [result,setResult]=useState('');
    const [loading,setLoading]=useState(false);
    const [status,setStatus]=useState('idle');
    const [txHash,setTxHash]=useState('');
    const [escrowNum,setEscrowNum]=useState(null);
    const [copied,copy]=useCopy();

    useEffect(() => { if (selectedAgent) { setAgentAddr(selectedAgent.address); setAmount(selectedAgent.price); } }, [selectedAgent]);

    const handleSubmit = async e => {
        e.preventDefault();
        if (!contract||!agentAddr||!amount||!result) return;
        setLoading(true); setStatus('processing'); onLog('Creating escrow transaction...');
        try {
            const hashlock=ethers.keccak256(ethers.toUtf8Bytes(result));
            const tx=await contract.createEscrow(agentAddr,hashlock,parseInt(minConf),3600,{value:ethers.parseEther(amount)});
            setTxHash(tx.hash); onLog(`TX sent: ${tx.hash.slice(0,14)}...`,tx.hash);
            await tx.wait();
            const counter=await contract.escrowCounter();
            const id=Number(counter)-1;
            setEscrowNum(id); setStatus('success');
            onLog(`SUCCESS Escrow #${id} created!`,tx.hash,true);
            addToast(`Escrow #${id} created!`,'success');
            onSuccess({id,agent:selectedAgent?.name||agentAddr.slice(0,8)+'...',amount:`${amount} OKB`,minConf,txHash:tx.hash,time:new Date().toLocaleTimeString(),status:'pending'});
            setTimeout(()=>{setStatus('idle');setResult('');setEscrowNum(null);setTxHash('');},5000);
        } catch(err) {
            setStatus('error'); onLog(`FAILED: ${err.message}`,null,false,true);
            addToast(err.message||'Failed','error');
            setTimeout(()=>setStatus('idle'),3000);
        } finally { setLoading(false); }
    };

    return (
        <div className="card">
            <div className="card-header"><div className="card-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/></svg>Create Escrow</div></div>
            <form onSubmit={handleSubmit}>
                <div className="form-group"><label className="form-label">Agent Address</label><input type="text" className="form-input" value={agentAddr} onChange={e=>setAgentAddr(e.target.value)} placeholder="0x..."/></div>
                <div className="form-row">
                    <div className="form-group"><label className="form-label">Amount (OKB)</label><input type="number" step="0.001" className="form-input" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.01"/></div>
                    <div className="form-group"><label className="form-label">Min Confidence %</label><input type="number" min="0" max="100" className="form-input" value={minConf} onChange={e=>setMinConf(e.target.value)} placeholder="80"/></div>
                </div>
                <PayoutPreview amount={amount} minConf={minConf} agentConf={selectedAgent?.confidence}/>
                <div className="form-group"><label className="form-label">Expected Result <span style={{color:'var(--text-muted)',fontWeight:400}}>(hashed on-chain)</span></label><textarea className="form-input" value={result} onChange={e=>setResult(e.target.value)} placeholder={selectedAgent?.placeholder||'e.g. ETH price prediction: 3500'} rows="2"/></div>
                {status==='success' && <div className="success-state"><div className="success-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg></div><div className="success-title">Escrow #{escrowNum} Created!</div><div className="success-subtitle">Payment locked · Agent notified · Awaiting delivery</div></div>}
                {status==='error' && <div className="error-state"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Transaction failed</div>}
                {(status==='idle'||status==='processing') && <button type="submit" className="btn btn-primary" style={{width:'100%'}} disabled={loading||!contract||!agentAddr||!amount||!result}>{loading?<><div className="spinner"/>Processing...</>:<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Lock Payment</>}</button>}
                {txHash && <div className="tx-pill" onClick={()=>copy(txHash)}><span>TX: {txHash.slice(0,20)}...{txHash.slice(-6)}</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{color:copied?'#10B981':'currentColor',flexShrink:0}}>{copied?<polyline points="20 6 9 17 4 12"/>:<><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>}</svg></div>}
            </form>
        </div>
    );
}

function VerifyForm({ contract, onLog, addToast, onRelease }) {
    const [escrowId,setEscrowId]=useState('');
    const [actual,setActual]=useState('');
    const [conf,setConf]=useState('');
    const [loading,setLoading]=useState(false);
    const [status,setStatus]=useState('idle');
    const [txHash,setTxHash]=useState('');
    const [copied,copy]=useCopy();

    const handleSubmit = async e => {
        e.preventDefault();
        if (!contract||!escrowId||!actual||!conf) return;
        setLoading(true); setStatus('processing'); onLog(`Verifying escrow #${escrowId}...`);
        try {
            const tx=await contract.verifyAndRelease(parseInt(escrowId),ethers.toUtf8Bytes(actual),parseInt(conf));
            setTxHash(tx.hash); onLog(`Verification TX: ${tx.hash.slice(0,14)}...`,tx.hash);
            await tx.wait();
            setStatus('success');
            onLog(`SUCCESS Payment released for #${escrowId}!`,tx.hash,true);
            addToast(`Payment released for Escrow #${escrowId}!`,'success');
            onRelease(parseInt(escrowId),tx.hash);
            setTimeout(()=>{setStatus('idle');setActual('');setConf('');setTxHash('');},5000);
        } catch(err) {
            setStatus('error'); onLog(`FAILED: ${err.message}`,null,false,true);
            addToast(err.message||'Verification failed','error');
            setTimeout(()=>setStatus('idle'),3000);
        } finally { setLoading(false); }
    };

    return (
        <div className="card">
            <div className="card-header"><div className="card-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>Verify and Release</div></div>
            <form onSubmit={handleSubmit}>
                <div className="form-group"><label className="form-label">Escrow ID</label><input type="number" className="form-input" value={escrowId} onChange={e=>setEscrowId(e.target.value)} placeholder="0"/></div>
                <div className="form-group"><label className="form-label">Actual Delivered Data</label><textarea className="form-input" value={actual} onChange={e=>setActual(e.target.value)} placeholder="e.g. ETH price prediction: 3482 (delivered result)" rows="3"/></div>
                <div className="form-group"><label className="form-label">Confidence %</label><input type="number" min="0" max="100" className="form-input" value={conf} onChange={e=>setConf(e.target.value)} placeholder="85"/></div>
                {status==='success' && <div className="success-state"><div className="success-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg></div><div className="success-title">Payment Released!</div><div className="success-subtitle">Agent paid · Proof stored on-chain</div></div>}
                {status==='error' && <div className="error-state"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Verification failed</div>}
                {(status==='idle'||status==='processing') && <button type="submit" className="btn btn-success" style={{width:'100%'}} disabled={loading||!contract||!escrowId||!actual||!conf}>{loading?<><div className="spinner"/>Verifying...</>:<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>Verify and Release</>}</button>}
                {txHash && <div className="tx-pill" onClick={()=>copy(txHash)}><span>TX: {txHash.slice(0,20)}...{txHash.slice(-6)}</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{color:copied?'#10B981':'currentColor',flexShrink:0}}>{copied?<polyline points="20 6 9 17 4 12"/>:<><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>}</svg></div>}
            </form>
        </div>
    );
}

function App() {
    const [contract,setContract]=useState(null);

    const [selectedAgent,setAgent]=useState(null);
    const [logs,setLogs]=useState([]);
    const [toasts,setToasts]=useState([]);
    const [history,setHistory]=useState([]);
    const [network,setNetwork]=useState('xlayer-test');
    const [agents,setAgents]=useState([]);
    const [loadingAgents,setLoading]=useState(true);

    const addToast=useCallback((msg,type)=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);},[]);
    const removeToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
    const addLog=useCallback((message,txHash,success,fail)=>{const time=new Date().toLocaleTimeString();setLogs(p=>[{time,message,txHash,success,fail},...p].slice(0,25));},[]);

    const connectWallet = async () => {
        try {
            const prov=window.okxwallet||window.ethereum;
            if (!prov) { addToast('No wallet found. Install OKX Wallet or MetaMask.','error'); return; }
            await prov.request({method:'eth_requestAccounts'});
            const ep=new ethers.BrowserProvider(prov);
            const s=await ep.getSigner();
            const addr=await s.getAddress();
            setContract(new ethers.Contract(CONTRACT_ADDRESS,CONTRACT_ABI,s));
            setAddress(addr);
            addLog(`Wallet connected: ${addr}`);
            addToast('Wallet connected!','success');
            setLoading(true);
            try {
                const reg=new ethers.Contract(REGISTRY_ADDRESS,REGISTRY_ABI,s);
                const raw=await reg.getActiveAgents();
                if (raw.length>0) {
                    const getIcon=name=>{
                        const n=name.toLowerCase();
                        if(n.includes('eth')||n.includes('predict'))return()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
                        if(n.includes('sentiment'))return()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>;
                        return()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>;
                    };
                    setAgents(raw.map((a,i)=>({
                        name:a.name,price:ethers.formatEther(a.price),symbol:'OKB',
                        address:a.agentAddress,description:a.description,
                        reputation:parseFloat((4.5+i*0.15).toFixed(1)),
                        confidence:Math.min(96,83+i*6),
                        placeholder:`e.g. Result from ${a.name}`,
                        Icon:getIcon(a.name),
                    })));
                }
            } catch(err){console.error("Registry fetch failed:",err);}
            setLoading(false);
        } catch(err){
            addToast(err.message||'Failed to connect','error');
            addLog(`Connection failed: ${err.message}`,null,false,true);
        }
    };

    const disconnectWallet=()=>{setContract(null);setAddress('');setAgents([]);addLog('Wallet disconnected');addToast('Wallet disconnected','success');};
    const handleEscrowSuccess=useCallback(data=>setHistory(p=>[data,...p]),[]);
    const handleRelease=useCallback((id,txHash)=>setHistory(p=>p.map(h=>h.id===id?{...h,status:'released',txHash}:h)),[]);
    const curNet=NETWORKS.find(n=>n.id===network)||NETWORKS[0];

    return (
        <>
            <Splash/>
            <div className="aurora"><div className="aurora-blob blob-1"/><div className="aurora-blob blob-2"/><div className="aurora-blob blob-3"/></div>
            <div className="grid-overlay"/>
            <div className="toasts">{toasts.map(t=><Toast key={t.id} message={t.msg} type={t.type} onClose={()=>removeToast(t.id)}/>)}</div>
            <div className="app">
                <nav className="nav">
                    <div className="nav-brand">
                        <div className="nav-logo">
                            <img src={LOGO_SRC} alt="ProofPayX"/>
                        </div>
                        <div>
                            <div className="nav-title">ProofPayX</div>
                            <div className="nav-tagline">Stripe for AI agents — but trustless</div>
                        </div>
                    </div>
                    <div className="nav-actions">
                        <NetSwitcher network={network} setNetwork={setNetwork}/>
                        {address ? (
                            <><CopyBtn text={address} className="btn btn-secondary"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>{address.slice(0,6)}...{address.slice(-4)}</CopyBtn><button className="btn btn-danger" onClick={disconnectWallet}>Disconnect</button></>
                        ) : (
                            <button className="btn btn-primary" onClick={connectWallet}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M20 12v4H6a2 2 0 0 0-2 2c0 1.1.9 2 2 2h12v-4"/><path d="M20 12h-4"/></svg>Connect Wallet</button>
                        )}
                    </div>
                </nav>
                <StatsBar txCount={history.length}/>
                <div className="main-grid">
                    <div className="col">
                        <div className="card">
                            <div className="card-header"><div className="card-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Available Agents</div><span className="card-badge">{loadingAgents?'Loading...':`${agents.length} agents`}</span></div>
                            <div className="agent-grid">
                                {loadingAgents ? [1,2,3].map(i=><AgentSkeleton key={i}/>)
                                : agents.length===0 ? <div style={{textAlign:'center',padding:'1rem',color:'var(--text-muted)'}}>No agents registered yet. Connect wallet to load.</div>
                                : agents.map(a=><AgentCard key={a.address} agent={a} isSelected={selectedAgent?.address===a.address} onClick={()=>{setAgent(a);addLog(`Selected agent: ${a.name}`);}}/>)}
                            </div>
                        </div>
                        <EscrowForm contract={contract} onSuccess={handleEscrowSuccess} onLog={addLog} selectedAgent={selectedAgent} addToast={addToast}/>
                        <EscrowHistory history={history} network={network}/>
                    </div>
                    <div className="col">
                        <VerifyForm contract={contract} onLog={addLog} addToast={addToast} onRelease={handleRelease}/>
                        <TxLog logs={logs}/>
                    </div>
                </div>
                <footer className="footer">
                    <div className="footer-content">
                        <span>{curNet.name}</span><span className="footer-divider">·</span>
                        <span>Contract: <CopyBtn text={CONTRACT_ADDRESS} className="footer-link">{CONTRACT_ADDRESS.slice(0,6)}...{CONTRACT_ADDRESS.slice(-4)}</CopyBtn></span><span className="footer-divider">·</span>
                        <span>Registry: <CopyBtn text={REGISTRY_ADDRESS} className="footer-link">{REGISTRY_ADDRESS.slice(0,6)}...{REGISTRY_ADDRESS.slice(-4)}</CopyBtn></span><span className="footer-divider">·</span>
                        <a href={EXPLORER_BASE} target="_blank" rel="noopener noreferrer" className="footer-link">OKLink Explorer ↗</a>
                    </div>
                </footer>
            </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
