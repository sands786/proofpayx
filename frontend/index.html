<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProofPayX - Trustless AI Payments</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cyan: #22d3ee;
            --cyan-dim: rgba(34,211,238,0.12);
            --cyan-border: rgba(34,211,238,0.3);
            --blue: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --surface: rgba(15,15,20,0.9);
            --surface-2: rgba(24,24,32,0.85);
            --surface-3: rgba(32,32,44,0.6);
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(34,211,238,0.35);
            --text-1: #f1f5f9;
            --text-2: #94a3b8;
            --text-3: #475569;
            --bg: #06070d;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Aurora ── */
        .aurora {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }

        /* Moving aurora strip — the main animated background effect */
        .aurora-strip {
            position: absolute;
            inset: -10px;
            opacity: 0.55;
            filter: blur(12px);
            background-image:
                repeating-linear-gradient(100deg, #06070d 0%, #06070d 7%, transparent 10%, transparent 12%, #06070d 16%),
                repeating-linear-gradient(100deg, #1d4ed8 10%, #a5b4fc 15%, #93c5fd 20%, #ddd6fe 25%, #60a5fa 30%);
            background-size: 300%, 200%;
            background-position: 50% 50%, 50% 50%;
            animation: aurora-move 60s linear infinite;
        }
        .aurora-strip::after {
            content: '';
            position: absolute; inset: 0;
            background-image:
                repeating-linear-gradient(100deg, #06070d 0%, #06070d 7%, transparent 10%, transparent 12%, #06070d 16%),
                repeating-linear-gradient(100deg, #1d4ed8 10%, #a5b4fc 15%, #93c5fd 20%, #ddd6fe 25%, #60a5fa 30%);
            background-size: 200%, 100%;
            background-attachment: fixed;
            mix-blend-mode: difference;
            animation: aurora-move 60s linear infinite;
        }
        .aurora-mask {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 80% 10%, transparent 20%, #06070d 75%);
        }

        /* Soft glowing blobs underneath */
        .aurora-blob {
            position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.22;
            animation: drift 18s ease-in-out infinite alternate;
        }
        .aurora-blob:nth-child(1) { width: 650px; height: 650px; background: #1d4ed8; top: -220px; left: -120px; animation-delay: 0s; }
        .aurora-blob:nth-child(2) { width: 520px; height: 520px; background: #0e7490; top: 80px; right: -120px; animation-delay: -6s; }
        .aurora-blob:nth-child(3) { width: 420px; height: 420px; background: #6d28d9; bottom: -80px; left: 32%; animation-delay: -12s; }

        @keyframes aurora-move {
            from { background-position: 50% 50%, 50% 50%; }
            to   { background-position: 350% 50%, 350% 50%; }
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(45px, 35px) scale(1.1); }
        }

        /* grid dots overlay */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        /* ── Layout ── */
        /* ── Splash screen ── */
        .splash {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #06070d;
            animation: splash-exit 0.8s cubic-bezier(0.4,0,0.2,1) 3.8s both;
            pointer-events: none;
            overflow: hidden;
        }
        .splash-aurora {
            position: absolute; inset: -10px; opacity: 0.55; filter: blur(12px);
            background-image:
                repeating-linear-gradient(100deg, #06070d 0%, #06070d 7%, transparent 10%, transparent 12%, #06070d 16%),
                repeating-linear-gradient(100deg, #1d4ed8 10%, #a5b4fc 15%, #93c5fd 20%, #ddd6fe 25%, #60a5fa 30%);
            background-size: 300%, 200%;
            animation: aurora-move 60s linear infinite;
        }
        .splash-aurora::after {
            content: ''; position: absolute; inset: 0;
            background-image:
                repeating-linear-gradient(100deg, #06070d 0%, #06070d 7%, transparent 10%, transparent 12%, #06070d 16%),
                repeating-linear-gradient(100deg, #1d4ed8 10%, #a5b4fc 15%, #93c5fd 20%, #ddd6fe 25%, #60a5fa 30%);
            background-size: 200%, 100%; background-attachment: fixed;
            mix-blend-mode: difference; animation: aurora-move 60s linear infinite;
        }
        .splash-blob-1 { position: absolute; width: 650px; height: 650px; background: #1d4ed8; border-radius: 50%; filter: blur(90px); opacity: 0.22; top: -220px; left: -120px; animation: drift 18s ease-in-out infinite alternate; }
        .splash-blob-2 { position: absolute; width: 520px; height: 520px; background: #0e7490; border-radius: 50%; filter: blur(90px); opacity: 0.22; top: 80px; right: -120px; animation: drift 18s ease-in-out infinite alternate; animation-delay: -6s; }
        .splash-blob-3 { position: absolute; width: 420px; height: 420px; background: #6d28d9; border-radius: 50%; filter: blur(90px); opacity: 0.22; bottom: -80px; left: 32%; animation: drift 18s ease-in-out infinite alternate; animation-delay: -12s; }
        .splash-mask-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 10%, transparent 20%, #06070d 75%); }
        .splash-dots { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px); background-size: 28px 28px; }

        .splash-content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; gap: 1.2rem; text-align: center;
        }
        .splash-logo {
            opacity: 0; transform: scale(0.5);
            animation: splash-pop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
        }
        .splash-badge {
            width: 92px; height: 92px; border-radius: 26px;
            background: linear-gradient(135deg, rgba(34,211,238,0.14), rgba(59,130,246,0.14));
            border: 1.5px solid rgba(34,211,238,0.38);
            display: flex; align-items: center; justify-content: center;
            animation: badge-pulse 2.2s ease-in-out 1s infinite alternate;
        }
        @keyframes badge-pulse {
            from { box-shadow: 0 0 28px rgba(34,211,238,0.14); }
            to   { box-shadow: 0 0 60px rgba(34,211,238,0.38), 0 0 100px rgba(59,130,246,0.18); }
        }
        .splash-name {
            opacity: 0; transform: translateY(20px);
            animation: splash-up 0.6s ease 0.9s both;
            font-size: 3.8rem; font-weight: 700; letter-spacing: -0.025em;
            background: linear-gradient(90deg, #22d3ee, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .splash-line {
            opacity: 0; transform: translateY(14px);
            animation: splash-up 0.55s ease 1.4s both;
            font-size: 1.05rem; color: #94a3b8;
        }
        .splash-line em { color: #22d3ee; font-style: normal; font-weight: 600; }
        .splash-progress {
            opacity: 0;
            animation: splash-up 0.4s ease 1.85s both;
            width: 160px; height: 2px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden;
        }
        .splash-fill {
            height: 100%; width: 0;
            background: linear-gradient(90deg, #22d3ee, #3b82f6);
            border-radius: 2px;
            animation: fill-bar 1.9s cubic-bezier(0.4,0,0.6,1) 2s both;
        }

        @keyframes splash-pop  { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }
        @keyframes splash-up   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fill-bar    { from { width:0; } to { width:100%; } }
        @keyframes splash-exit {
            0%   { opacity:1; transform:scale(1); }
            100% { opacity:0; transform:scale(1.05); visibility:hidden; }
        }

        .app {
            position: relative; z-index: 10; max-width: 1180px; margin: 0 auto; padding: 2rem 1.5rem;
            opacity: 0; animation: app-in 0.65s ease 4.3s both;
        }
        @keyframes app-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

        /* ── Header ── */
        .header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown 0.7s ease both; }
        .logo-row { display: inline-flex; align-items: center; gap: 0.9rem; margin-bottom: 0.6rem; }
        .logo-badge {
            width: 52px; height: 52px; border-radius: 14px;
            background: linear-gradient(135deg, rgba(34,211,238,0.15), rgba(59,130,246,0.15));
            border: 1px solid var(--cyan-border);
            display: flex; align-items: center; justify-content: center;
        }
        h1 {
            font-size: 2.8rem; font-weight: 700; letter-spacing: -0.02em;
            background: linear-gradient(90deg, #22d3ee 0%, #60a5fa 50%, #a78bfa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .tagline { font-size: 1rem; color: var(--text-2); }
        .tagline em { color: var(--cyan); font-style: normal; font-weight: 600; }

        /* ── Wallet bar ── */
        .wallet-bar { display: flex; justify-content: center; margin-bottom: 2rem; animation: fadeUp 0.7s 0.15s ease both; }
        .btn-wallet {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.65rem 1.35rem;
            background: linear-gradient(90deg, #0891b2, #2563eb);
            color: #fff; border: none; border-radius: 999px;
            font-family: inherit; font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-wallet:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(6,182,212,0.35); }
        .wallet-info { display: flex; align-items: center; gap: 0.75rem; }
        .wallet-pill {
            display: inline-flex; align-items: center; gap: 0.45rem;
            padding: 0.45rem 0.9rem;
            background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
            border-radius: 999px; color: #34d399;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
        }
        .btn-disconnect {
            padding: 0.45rem 0.9rem; background: transparent; font-family: inherit;
            border: 1px solid rgba(239,68,68,0.3); color: #f87171;
            border-radius: 999px; cursor: pointer; font-size: 0.82rem; transition: background 0.2s;
        }
        .btn-disconnect:hover { background: rgba(239,68,68,0.08); }

        /* ── Main grid ── */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .col { display: flex; flex-direction: column; gap: 1.25rem; }

        /* ── Card ── */
        .card {
            background: var(--surface-2); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 18px; padding: 1.4rem;
            animation: fadeUp 0.6s ease both;
        }
        .card-head {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.95rem; font-weight: 600; color: var(--text-1); margin-bottom: 1.1rem;
        }
        .card-head svg { width: 17px; height: 17px; color: var(--cyan); flex-shrink: 0; }

        /* ── Agent grid ── */
        .agent-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 0.65rem; }
        @media (max-width: 480px) { .agent-grid { grid-template-columns: 1fr; } }

        .agent-tile {
            background: var(--surface-3); border: 1.5px solid var(--border);
            border-radius: 12px; padding: 0.75rem; cursor: pointer; min-width: 0;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; position: relative;
        }
        .agent-tile:hover { border-color: var(--cyan-border); box-shadow: 0 6px 20px rgba(34,211,238,0.08); }
        .agent-tile.active { border-color: var(--cyan); background: var(--cyan-dim); box-shadow: 0 0 0 3px rgba(34,211,238,0.1); }
        .agent-tile.active::after {
            content: "✓"; position: absolute; top: 6px; right: 6px;
            width: 17px; height: 17px; line-height: 17px; text-align: center;
            background: var(--cyan); color: #06070d; border-radius: 50%; font-size: 10px; font-weight: 700;
        }
        .agent-icon-wrap {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, rgba(34,211,238,0.18), rgba(59,130,246,0.18));
            border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem;
        }
        .agent-icon-wrap svg { width: 15px; height: 15px; color: var(--cyan); }
        .agent-name  { font-size: 0.75rem; font-weight: 600; color: var(--text-1); margin-bottom: 0.15rem; }
        .agent-price { font-size: 0.68rem; color: var(--cyan); font-weight: 500; margin-bottom: 0.35rem; }

        /* ── Reputation bar ── */
        .rep-row { display: flex; align-items: center; gap: 0.35rem; margin-bottom: 0.3rem; }
        .stars { display: flex; gap: 1px; }
        .star { width: 9px; height: 9px; }
        .star.full path { fill: var(--amber); }
        .star.empty path { fill: rgba(255,255,255,0.15); }
        .rep-score { font-size: 0.63rem; color: var(--text-2); font-family: 'JetBrains Mono', monospace; }

        /* confidence mini bar */
        .conf-bar-wrap { display: flex; align-items: center; gap: 0.35rem; }
        .conf-label { font-size: 0.58rem; color: var(--text-3); white-space: nowrap; }
        .conf-bar-bg { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
        .conf-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--cyan), var(--blue)); }

        .agent-addr { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; margin-top: 0.3rem; }

        /* ── Form ── */
        .form-group { margin-bottom: 0.85rem; }
        .form-label { display: block; font-size: 0.75rem; color: var(--text-2); margin-bottom: 0.3rem; font-weight: 500; }
        .form-input {
            width: 100%; padding: 0.6rem 0.85rem;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 9px; color: var(--text-1); font-size: 0.85rem;
            transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit;
        }
        .form-input:focus { outline: none; border-color: rgba(34,211,238,0.5); box-shadow: 0 0 0 3px rgba(34,211,238,0.08); }
        .form-input::placeholder { color: var(--text-3); }
        textarea.form-input { resize: vertical; min-height: 72px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
        @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

        /* ── WOW: Live Payout Preview ── */
        .payout-preview {
            background: linear-gradient(135deg, rgba(6,182,212,0.06), rgba(59,130,246,0.06));
            border: 1px solid rgba(34,211,238,0.18);
            border-radius: 11px; padding: 0.9rem 1rem; margin-bottom: 0.85rem;
            transition: all 0.4s ease;
        }
        .payout-preview.live { border-color: rgba(34,211,238,0.4); background: linear-gradient(135deg, rgba(6,182,212,0.1), rgba(59,130,246,0.1)); }
        .payout-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
        .payout-row:last-child { margin-bottom: 0; }
        .payout-key { font-size: 0.72rem; color: var(--text-2); }
        .payout-val { font-size: 0.78rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--text-1); }
        .payout-val.accent { color: var(--cyan); }
        .payout-val.success { color: #34d399; }
        .payout-val.warn { color: var(--amber); }
        .conf-slider-wrap { margin-top: 0.55rem; }
        .conf-slider-label { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--text-2); margin-bottom: 0.3rem; }
        .conf-track { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; position: relative; }
        .conf-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease, background 0.4s ease; }
        .threshold-marker {
            position: absolute; top: -2px; width: 2px; height: 9px; background: rgba(245,158,11,0.7); border-radius: 1px;
            transition: left 0.4s ease;
        }
        .payout-note { font-size: 0.65rem; color: var(--text-3); margin-top: 0.45rem; text-align: center; }

        /* ── Buttons ── */
        .btn-primary {
            width: 100%; padding: 0.8rem;
            background: linear-gradient(90deg, #0891b2, #2563eb);
            color: #fff; border: none; border-radius: 10px;
            font-family: inherit; font-weight: 600; font-size: 0.88rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            margin-top: 0.4rem; transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            position: relative; overflow: hidden;
        }
        .btn-primary::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
            opacity: 0; transition: opacity 0.2s;
        }
        .btn-primary:hover:not(:disabled)::before { opacity: 1; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(6,182,212,0.28); }
        .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; }
        .btn-verify { background: linear-gradient(90deg, #059669, #0891b2); }
        .btn-verify:hover:not(:disabled) { box-shadow: 0 10px 28px rgba(16,185,129,0.28); }

        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.75s linear infinite; flex-shrink: 0; }

        /* ── Success blast ── */
        .success-blast {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 0.5rem; padding: 1.1rem;
            background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(6,182,212,0.08));
            border: 1px solid rgba(16,185,129,0.35); border-radius: 10px;
            margin-top: 0.4rem; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .blast-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #059669, #06b6d4);
            display: flex; align-items: center; justify-content: center;
            animation: pulse-ring 1.5s ease-out infinite;
        }
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
            70%  { box-shadow: 0 0 0 12px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }
        .blast-title { font-size: 0.9rem; font-weight: 700; color: #34d399; }
        .blast-sub { font-size: 0.72rem; color: var(--text-2); text-align: center; }

        .status-error {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 0.9rem; background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25); border-radius: 9px;
            color: #f87171; font-size: 0.82rem; margin-top: 0.4rem;
        }

        .tx-pill {
            display: block; padding: 0.5rem 0.75rem; margin-top: 0.65rem;
            background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            border-radius: 8px; font-family: 'JetBrains Mono', monospace;
            font-size: 0.63rem; color: var(--text-3); text-align: center; word-break: break-all;
        }

        /* ── Log ── */
        .log-box {
            max-height: 190px; overflow-y: auto;
            background: rgba(0,0,0,0.35); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.8rem;
        }
        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .log-item { font-size: 0.75rem; padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .log-item:last-child { border-bottom: none; }
        .log-t { color: var(--text-3); font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; margin-right: 0.35rem; }
        .log-m { color: var(--text-2); }
        .log-m.success { color: #34d399; }
        .log-m.fail    { color: #f87171; }
        .log-link { color: var(--cyan); text-decoration: underline; margin-left: 0.35rem; font-size: 0.65rem; }
        .log-empty { text-align: center; color: var(--text-3); padding: 1.5rem; font-size: 0.82rem; }

        /* ── Toast ── */
        .toasts { position: fixed; top: 1rem; right: 1rem; z-index: 999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast {
            padding: 0.8rem 1.1rem; background: rgba(10,10,18,0.97); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            display: flex; align-items: center; gap: 0.65rem;
            box-shadow: 0 16px 40px rgba(0,0,0,0.4); max-width: 340px;
            animation: slideRight 0.3s ease both;
        }
        .toast.ok  { border-color: rgba(16,185,129,0.35); }
        .toast.err { border-color: rgba(239,68,68,0.35); }
        .toast svg { width: 16px; height: 16px; flex-shrink: 0; }
        .toast.ok  svg { color: #34d399; }
        .toast.err svg { color: #f87171; }
        .toast span { font-size: 0.82rem; color: var(--text-1); }

        /* ── Footer ── */
        .footer { text-align: center; color: var(--text-3); font-size: 0.72rem; padding: 2rem 0 1rem; }

        /* ── Animations ── */
        @keyframes fadeDown  { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: translateY(0); } }
        @keyframes fadeUp    { from { opacity:0; transform: translateY(16px);  } to { opacity:1; transform: translateY(0); } }
        @keyframes spin      { to { transform: rotate(360deg); } }
        @keyframes slideRight{ from { opacity:0; transform: translateX(60px); } to { opacity:1; transform: translateX(0); } }
        @keyframes popIn     { from { opacity:0; transform: scale(0.85); } to { opacity:1; transform: scale(1); } }
        @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

const CONTRACT_ADDRESS = "0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6";
const CONTRACT_ABI = [

const AGENTS = [

/* ── Star rating ── */
function Stars({ score }) {
    return (
        <div className="stars">
            {[1,2,3,4,5].map(i => {
                const full = score >= i;
                return (
                    <svg key={i} className={`star ${full ? 'full' : 'empty'}`} viewBox="0 0 12 12">
                        <path d="M6 1l1.3 3.9H11L8.2 7.1l1 3.8L6 8.7l-3.2 2.2 1-3.8L1 4.9h3.7z" strokeWidth="0"/>
                    </svg>
                );
            })}
        </div>
    );
}

/* ── Toast ── */
function Toast({ message, type, onClose }) {
    useEffect(() => { const t = setTimeout(onClose, 5000); return () => clearTimeout(t); }, [onClose]);
    return (
        <div className={`toast ${type === 'success' ? 'ok' : 'err'}`}>
            {type === 'success'
                ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            }
            <span>{message}</span>
        </div>
    );
}

/* ── Live Payout Preview ── */
function PayoutPreview({ amount, minConf, agentConf }) {
    const amtNum = parseFloat(amount) || 0;
    const minPct = parseInt(minConf) || 80;
    const histPct = agentConf || 88;
    const willRelease = histPct >= minPct;
    const payout = willRelease ? amtNum : 0;
    const fillColor = willRelease ? 'linear-gradient(90deg,#10b981,#06b6d4)' : 'linear-gradient(90deg,#f59e0b,#ef4444)';
    const thresholdLeft = `${minPct}%`;

    return (
        <div className={`payout-preview ${amtNum > 0 ? 'live' : ''}`}>
            <div className="payout-row">
                <span className="payout-key">Locked amount</span>
                <span className="payout-val accent">{amtNum > 0 ? `${amtNum} OKB` : '—'}</span>
            </div>
            <div className="payout-row">
                <span className="payout-key">Min confidence</span>
                <span className="payout-val">{minPct}%</span>
            </div>
            <div className="payout-row">
                <span className="payout-key">Agent avg confidence</span>
                <span className={`payout-val ${willRelease ? 'success' : 'warn'}`}>{histPct}%</span>
            </div>
            <div className="payout-row">
                <span className="payout-key">Expected payout</span>
                <span className={`payout-val ${willRelease ? 'success' : 'warn'}`}>
                    {amtNum > 0 ? (willRelease ? `${payout} OKB ✓` : 'Refunded') : '—'}
                </span>
            </div>
            <div className="conf-slider-wrap">
                <div className="conf-slider-label">
                    <span>Confidence history</span>
                    <span>{histPct}%</span>
                </div>
                <div className="conf-track">
                    <div className="conf-fill" style={{ width: `${histPct}%`, background: fillColor }}></div>
                    <div className="threshold-marker" style={{ left: thresholdLeft }}></div>
                </div>
            </div>
            <div className="payout-note">
                {willRelease
                    ? `Agent historically meets your ${minPct}% threshold — payout likely`
                    : `Agent avg (${histPct}%) is below your ${minPct}% threshold — payment may be refunded`
                }
            </div>
        </div>
    );
}

/* ── Agent tile ── */
function AgentTile({ agent, isSelected, onClick }) {
    return (
        <div className={`agent-tile${isSelected ? ' active' : ''}`} onClick={onClick}>

                <div className="conf-bar-bg"><div className="conf-bar-fill" style={{ width: `${agent.confidence}%` }}></div></div>
                <span className="conf-label">{agent.confidence}%</span>
            </div>
            <div className="agent-addr">{agent.address}</div>
        </div>
    );
}

/* ── Escrow Form ── */
function EscrowForm({ contract, onSuccess, onLog, selectedAgent, addToast }) {
    const [agentAddr, setAgentAddr] = useState('');
    const [amount, setAmount]       = useState('');
    const [minConf, setMinConf]     = useState('80');
    const [result, setResult]       = useState('');
    const [loading, setLoading]     = useState(false);
    const [status, setStatus]       = useState('idle');
    const [txHash, setTxHash]       = useState('');
    const [escrowNum, setEscrowNum] = useState(null);

    useEffect(() => {
        if (selectedAgent) {
            setAgentAddr(selectedAgent.address);
            setAmount(selectedAgent.price);
        }
    }, [selectedAgent]);

    const handleSubmit = async (e) => {
        e.preventDefault();
        if (!contract || !agentAddr || !amount || !result) return;
        setLoading(true); setStatus('processing');
        onLog('Creating escrow transaction...');
        try {
            const hashlock = ethers.keccak256(ethers.toUtf8Bytes(result));
            const tx = await contract.createEscrow(agentAddr, hashlock, parseInt(minConf), 3600, { value: ethers.parseEther(amount) });
            setTxHash(tx.hash);
            onLog(`TX sent: ${tx.hash.slice(0,14)}...`, tx.hash);
            await tx.wait();
            const counter = await contract.escrowCounter();
            const id = Number(counter) - 1;
            setEscrowNum(id);
            setStatus('success');
            onLog(`SUCCESS Escrow #${id} created!`, tx.hash, true);
            addToast(`Escrow #${id} created successfully!`, 'success');
            onSuccess(id, tx.hash);
            setTimeout(() => { setStatus('idle'); setResult(''); setEscrowNum(null); }, 5000);
        } catch (err) {
            setStatus('error');
            onLog(`FAILED: ${err.message}`, null, false, true);
            addToast(err.message || 'Failed to create escrow', 'error');
            setTimeout(() => setStatus('idle'), 3000);
        } finally { setLoading(false); }
    };

    const placeholder = selectedAgent?.placeholder || 'e.g. ETH price prediction: 3500';

    return (
        <div className="card">
            <div className="card-head">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="2" y="7" width="20" height="14" rx="2"/>
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                    <circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/>
                </svg>
                Create Escrow
            </div>
            <form onSubmit={handleSubmit}>
                <div className="form-group">
                    <label className="form-label">Agent Address</label>
                    <input type="text" className="form-input" value={agentAddr} onChange={e => setAgentAddr(e.target.value)} placeholder="0x..." />
                </div>
                <div className="form-row">
                    <div className="form-group">
                        <label className="form-label">Amount (OKB)</label>
                        <input type="number" step="0.001" className="form-input" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.01" />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Min Confidence %</label>
                        <input type="number" min="0" max="100" className="form-input" value={minConf} onChange={e => setMinConf(e.target.value)} placeholder="80" />
                    </div>
                </div>

                {/* WOW: Live payout preview */}
                <PayoutPreview amount={amount} minConf={minConf} agentConf={selectedAgent?.confidence} />

                <div className="form-group">
                    <label className="form-label">Expected Result <span style={{color:'var(--text-3)',fontWeight:400}}>(hashed on-chain)</span></label>
                    <textarea className="form-input" value={result} onChange={e => setResult(e.target.value)} placeholder={placeholder} rows="2" />
                </div>

                {status === 'success' && (
                    <div className="success-blast">
                        <div className="blast-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                        <div className="blast-title">Escrow #{escrowNum} Created!</div>
                        <div className="blast-sub">Payment locked · Agent notified · Awaiting delivery</div>
                    </div>
                )}
                {status === 'error' && (
                    <div className="status-error">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        Transaction failed
                    </div>
                )}
                {(status === 'idle' || status === 'processing') && (
                    <button type="submit" className="btn-primary" disabled={loading || !contract || !agentAddr || !amount || !result}>
                        {loading
                            ? <><div className="spinner"/> Processing...</>
                            : <><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Lock Payment</>
                        }
                    </button>
                )}
                {txHash && <div className="tx-pill">TX: {txHash.slice(0,22)}...{txHash.slice(-8)}</div>}
            </form>
        </div>
    );
}

/* ── Verify Form ── */
function VerifyForm({ contract, onLog, addToast }) {
    const [escrowId, setEscrowId] = useState('');
    const [actual, setActual]     = useState('');
    const [conf, setConf]         = useState('');
    const [loading, setLoading]   = useState(false);
    const [status, setStatus]     = useState('idle');
    const [txHash, setTxHash]     = useState('');

    const handleSubmit = async (e) => {
        e.preventDefault();
        if (!contract || !escrowId || !actual || !conf) return;
        setLoading(true); setStatus('processing');
        onLog(`Verifying escrow #${escrowId}...`);
        try {
            const tx = await contract.verifyAndRelease(parseInt(escrowId), ethers.toUtf8Bytes(actual), parseInt(conf));
            setTxHash(tx.hash);
            onLog(`Verification TX sent: ${tx.hash.slice(0,14)}...`, tx.hash);
            await tx.wait();
            setStatus('success');
            onLog(`SUCCESS Payment released for Escrow #${escrowId}!`, tx.hash, true);
            addToast(`Payment released for Escrow #${escrowId}!`, 'success');
            setTimeout(() => { setStatus('idle'); setActual(''); setConf(''); }, 5000);
        } catch (err) {
            setStatus('error');
            onLog(`FAILED: ${err.message}`, null, false, true);
            addToast(err.message || 'Verification failed', 'error');
            setTimeout(() => setStatus('idle'), 3000);
        } finally { setLoading(false); }
    };

    return (
        <div className="card">
            <div className="card-head">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <polyline points="9 12 11 14 15 10"/>
                </svg>
                Verify and Release
            </div>
            <form onSubmit={handleSubmit}>
                <div className="form-group">
                    <label className="form-label">Escrow ID</label>
                    <input type="number" className="form-input" value={escrowId} onChange={e => setEscrowId(e.target.value)} placeholder="0" />
                </div>
                <div className="form-group">
                    <label className="form-label">Actual Delivered Data</label>
                    <textarea className="form-input" value={actual} onChange={e => setActual(e.target.value)} placeholder="e.g. ETH price prediction: 3482 (delivered result)" rows="3" />
                </div>
                <div className="form-group">
                    <label className="form-label">Confidence %</label>
                    <input type="number" min="0" max="100" className="form-input" value={conf} onChange={e => setConf(e.target.value)} placeholder="85" />
                </div>
                {status === 'success' && (
                    <div className="success-blast">
                        <div className="blast-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                        <div className="blast-title">Payment Released!</div>
                        <div className="blast-sub">Agent has been paid · Proof stored on-chain</div>
                    </div>
                )}
                {status === 'error' && (
                    <div className="status-error">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        Verification failed
                    </div>
                )}
                {(status === 'idle' || status === 'processing') && (
                    <button type="submit" className="btn-primary btn-verify" disabled={loading || !contract || !escrowId || !actual || !conf}>
                        {loading
                            ? <><div className="spinner"/> Verifying...</>
                            : <><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg> Verify and Release</>
                        }
                    </button>
                )}
                {txHash && <div className="tx-pill">TX: {txHash.slice(0,22)}...{txHash.slice(-8)}</div>}
            </form>
        </div>
    );
}

/* ── Transaction Log ── */
function TxLog({ logs }) {
    return (
        <div className="card">
            <div className="card-head">

                        </div>

            </div>
        </div>

}

            const addr = await signer.getAddress();
            setContract(new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer));
            setAddress(addr);
            addLog(`Wallet connected: ${addr}`);

                                <line x1="17" y1="19.5" x2="17" y2="23.5" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                                <line x1="10.5" y1="17" x2="14.5" y2="17" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                                <line x1="19.5" y1="17" x2="23.5" y2="17" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                            </svg>
                        </div>
                        <h1>ProofPayX</h1>
                    </div>
                    <p className="tagline">Stripe for AI agents — but <em>trustless</em></p>
                </header>

                {/* Wallet */}
                <div className="wallet-bar">
                    {address ? (
                        <div className="wallet-info">
                            <div className="wallet-pill">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                {address.slice(0,6)}...{address.slice(-4)}
                            </div>
                            <button className="btn-disconnect" onClick={disconnectWallet}>Disconnect</button>
                        </div>
                    ) : (
                        <button className="btn-wallet" onClick={connectWallet}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/>
                                <path d="M20 12v4H6a2 2 0 0 0-2 2c0 1.1.9 2 2 2h12v-4"/>
                                <path d="M20 12h-4"/>
                            </svg>
                            Connect OKX Wallet
                        </button>
                    )}
                </div>

                {/* Main */}
                <div className="main-grid">
                    <div className="col">
                        {/* Agents */}
                        <div className="card">
                            <div className="card-head">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                                </svg>
                                Available Agents
                            </div>
                            <div className="agent-grid">
                                {AGENTS.map(a => (
                                    <AgentTile
                                        key={a.name} agent={a}
                                        isSelected={selectedAgent?.name === a.name}
                                        onClick={() => { setAgent(a); addLog(`Selected agent: ${a.name}`); }}
                                    />
                                ))}
                            </div>
                        </div>

                        <EscrowForm contract={contract} onSuccess={() => {}} onLog={addLog} selectedAgent={selectedAgent} addToast={addToast} />
                    </div>

                    <div className="col">
                        <VerifyForm contract={contract} onLog={addLog} addToast={addToast} />
                        <TxLog logs={logs} />
                    </div>
                </div>

                <div className="footer">
                    X Layer Testnet · Contract: {CONTRACT_ADDRESS.slice(0,6)}...{CONTRACT_ADDRESS.slice(-4)}
                </div>
            </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
