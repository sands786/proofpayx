<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProofPayX — Trustless AI Payments</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
        }
        
        /* Aurora Background */
        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            z-index: -2;
        }
        
        .aurora::before {
            content: '';
            position: absolute;
            width: 60%;
            height: 60%;
            top: -30%;
            left: -20%;
            background: radial-gradient(circle, rgba(0, 255, 200, 0.15), transparent 70%);
            filter: blur(60px);
            animation: aurora1 20s ease infinite;
        }
        
        .aurora::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 50%;
            bottom: -20%;
            right: -20%;
            background: radial-gradient(circle, rgba(100, 0, 255, 0.15), transparent 70%);
            filter: blur(60px);
            animation: aurora2 25s ease infinite;
        }
        
        @keyframes aurora1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(5%, 5%); }
        }
        
        @keyframes aurora2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-5%, -5%); }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffcc, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-top: 0.5rem;
        }
        
        .subtitle span {
            color: #00ffcc;
        }
        
        /* Wallet Section */
        .wallet-section {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .wallet-btn {
            background: linear-gradient(135deg, #00ffcc, #0066ff);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .wallet-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3);
        }
        
        .wallet-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .wallet-badge {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            color: #00ffcc;
        }
        
        .disconnect-btn {
            background: transparent;
            border: 1px solid rgba(255, 68, 68, 0.5);
            color: #ff4444;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .disconnect-btn:hover {
            background: rgba(255, 68, 68, 0.1);
        }
        
        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Cards */
        .card {
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
        }
        
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #00ffcc;
        }
        
        /* Agent Grid */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 640px) {
            .agent-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .agent-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .agent-card:hover {
            border-color: #00ffcc;
            transform: translateY(-2px);
        }
        
        .agent-card.selected {
            background: rgba(0, 255, 204, 0.1);
            border-color: #00ffcc;
        }
        
        .agent-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .agent-price {
            font-size: 0.875rem;
            color: #888;
        }
        
        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            font-size: 0.875rem;
            color: #888;
            margin-bottom: 0.5rem;
        }
        
        .form-input, .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
        }
        
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #00ffcc;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #00ffcc, #0066ff);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status-success {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            border-radius: 8px;
            color: #22c55e;
            text-align: center;
            font-size: 0.875rem;
        }
        
        .status-error {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 8px;
            color: #ef4444;
            text-align: center;
            font-size: 0.875rem;
        }
        
        .tx-hash {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #888;
            word-break: break-all;
            text-align: center;
        }
        
        .tx-link {
            color: #00ffcc;
            text-decoration: none;
        }
        
        .tx-link:hover {
            text-decoration: underline;
        }
        
        /* Log */
        .log-container {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 0.5rem;
        }
        
        .log-entry {
            font-size: 0.75rem;
            padding: 0.5rem;
            border-bottom: 1px solid rgba(0, 255, 204, 0.1);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .log-time {
            color: #888;
            margin-right: 0.5rem;
        }
        
        .log-message {
            color: #ccc;
        }
        
        .log-link {
            color: #00ffcc;
            text-decoration: none;
            margin-left: 0.5rem;
        }
        
        .footer {
            text-align: center;
            color: #666;
            font-size: 0.75rem;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 255, 204, 0.1);
        }
    </style>
</head>
<body>
    <div class="aurora"></div>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔒 ProofPayX</h1>
            <p class="subtitle">Stripe for AI agents — but <span>trustless</span></p>
        </div>
        
        <!-- Wallet Section -->
        <div class="wallet-section" id="walletSection"></div>
        
        <!-- Main Grid -->
        <div class="grid">
            <!-- Left Column -->
            <div>
                <!-- Agents -->
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div class="card-title">🤖 Available Agents</div>
                    <div class="agent-grid" id="agentGrid"></div>
                </div>
                
                <!-- Create Escrow -->
                <div class="card">
                    <div class="card-title">💰 Create Escrow</div>
                    <div>
                        <div class="form-group">
                            <label class="form-label">Agent Address</label>
                            <input type="text" id="agentAddress" class="form-input" placeholder="0x...">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Amount (OKB)</label>
                                <input type="number" id="amount" class="form-input" step="0.001" placeholder="0.01">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Min Confidence %</label>
                                <input type="number" id="minConfidence" class="form-input" value="80">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Expected Result</label>
                            <textarea id="resultData" class="form-textarea" placeholder="Enter the expected result data..."></textarea>
                        </div>
                        <button id="createBtn" class="submit-btn">🔒 Lock Payment</button>
                        <div id="createResult"></div>
                    </div>
                </div>
            </div>
            
            <!-- Right Column -->
            <div>
                <!-- Verify & Release -->
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div class="card-title">🔓 Verify & Release</div>
                    <div>
                        <div class="form-group">
                            <label class="form-label">Escrow ID</label>
                            <input type="number" id="escrowId" class="form-input" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Actual Delivered Data</label>
                            <textarea id="actualData" class="form-textarea" placeholder="Enter the actual result data (must match exactly)"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confidence %</label>
                            <input type="number" id="verifyConfidence" class="form-input" placeholder="85">
                        </div>
                        <button id="verifyBtn" class="submit-btn" style="background: linear-gradient(135deg, #22c55e, #16a34a);">✅ Verify & Release</button>
                        <div id="verifyResult"></div>
                    </div>
                </div>
                
                <!-- Transaction Log -->
                <div class="card">
                    <div class="card-title">📋 Transaction Log</div>
                    <div class="log-container" id="logContainer">
                        <div class="log-entry"><span class="log-time">[--:--:--]</span><span class="log-message">Ready. Connect your wallet to start.</span></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            X Layer Testnet | Contract: 0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6
        </div>
    </div>
    
    <script>
        const CONTRACT_ADDRESS = "0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6";
        const CONTRACT_ABI = [
            "function createEscrow(address _agent, bytes32 _hashlock, uint8 _minConfidence, uint256 _durationSeconds) external payable returns (uint256)",
            "function verifyAndRelease(uint256 _id, bytes memory _proof, uint8 _confidence) external",
            "function escrowCounter() view returns (uint256)"
        ];
        
        const AGENTS = [
            { name: "📈 ETH Predictor", price: 0.01, address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb" },
            { name: "📊 Sentiment Analyst", price: 0.005, address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb" },
            { name: "🔒 Code Auditor", price: 0.02, address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb" }
        ];
        
        let provider, signer, contract;
        let currentAddress = null;
        
        function addLog(message, txHash = null) {
            const logContainer = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            let html = `<span class="log-time">[${time}]</span><span class="log-message">${message}</span>`;
            if (txHash) {
                html += `<a href="https://www.okx.com/web3/explorer/xlayer-testnet/tx/${txHash}" target="_blank" class="log-link">View TX ↗</a>`;
            }
            entry.innerHTML = html;
            logContainer.insertBefore(entry, logContainer.firstChild);
            if (logContainer.children.length > 20) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }
        
        function updateWalletUI() {
            const walletSection = document.getElementById('walletSection');
            if (currentAddress) {
                walletSection.innerHTML = `
                    <div class="wallet-info">
                        <div class="wallet-badge">✅ ${currentAddress.slice(0,6)}...${currentAddress.slice(-4)}</div>
                        <button class="disconnect-btn" id="disconnectBtn">Disconnect</button>
                    </div>
                `;
                document.getElementById('disconnectBtn').onclick = disconnectWallet;
            } else {
                walletSection.innerHTML = `<button class="wallet-btn" id="connectBtn">🔌 Connect OKX Wallet</button>`;
                document.getElementById('connectBtn').onclick = connectWallet;
            }
        }
        
        async function connectWallet() {
            const ethProvider = window.okxwallet || window.ethereum;
            if (!ethProvider) {
                addLog("❌ OKX Wallet not installed");
                alert("Please install OKX Wallet");
                return;
            }
            try {
                const accounts = await ethProvider.request({ method: "eth_requestAccounts" });
                provider = new ethers.BrowserProvider(ethProvider);
                signer = await provider.getSigner();
                currentAddress = await signer.getAddress();
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                addLog(`✅ Wallet connected: ${currentAddress.slice(0,6)}...${currentAddress.slice(-4)}`);
                updateWalletUI();
            } catch (err) {
                addLog(`❌ Connection failed: ${err.message}`);
            }
        }
        
        async function disconnectWallet() {
            currentAddress = null;
            provider = null;
            signer = null;
            contract = null;
            addLog("🔌 Wallet disconnected");
            updateWalletUI();
        }
        
        function renderAgents() {
            const agentGrid = document.getElementById('agentGrid');
            agentGrid.innerHTML = AGENTS.map((agent, idx) => `
                <div class="agent-card" data-idx="${idx}">
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-price">💰 ${agent.price} OKB</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.agent-card').forEach(card => {
                card.onclick = () => {
                    const idx = parseInt(card.dataset.idx);
                    const agent = AGENTS[idx];
                    document.getElementById('agentAddress').value = agent.address;
                    document.getElementById('amount').value = agent.price;
                    document.getElementById('minConfidence').value = 80;
                    addLog(`Selected agent: ${agent.name}`);
                };
            });
        }
        
        async function createEscrow() {
            if (!contract) { alert("Connect wallet first"); return; }
            const agent = document.getElementById('agentAddress').value;
            const amount = document.getElementById('amount').value;
            const minConf = document.getElementById('minConfidence').value;
            const data = document.getElementById('resultData').value;
            if (!agent || !amount || !data) { alert("Fill all fields"); return; }
            
            const resultDiv = document.getElementById('createResult');
            resultDiv.innerHTML = '<div class="tx-hash">⏳ Processing transaction...</div>';
            
            try {
                const hashlock = ethers.keccak256(ethers.toUtf8Bytes(data));
                const tx = await contract.createEscrow(agent, hashlock, parseInt(minConf), 3600, {
                    value: ethers.parseEther(amount)
                });
                resultDiv.innerHTML = `<div class="tx-hash">⏳ Waiting for confirmation... TX: ${tx.hash.slice(0,16)}...</div>`;
                await tx.wait();
                const counter = await contract.escrowCounter();
                const escrowId = Number(counter) - 1;
                resultDiv.innerHTML = `<div class="status-success">✅ Escrow #${escrowId} created successfully!</div>`;
                addLog(`✅ Escrow #${escrowId} created for ${amount} OKB`, tx.hash);
                document.getElementById('escrowId').value = escrowId;
                document.getElementById('resultData').value = '';
                setTimeout(() => resultDiv.innerHTML = '', 5000);
            } catch (err) {
                resultDiv.innerHTML = `<div class="status-error">❌ Error: ${err.message}</div>`;
                addLog(`❌ Create failed: ${err.message}`);
                setTimeout(() => resultDiv.innerHTML = '', 5000);
            }
        }
        
        async function verifyAndRelease() {
            if (!contract) { alert("Connect wallet first"); return; }
            const escrowId = document.getElementById('escrowId').value;
            const data = document.getElementById('actualData').value;
            const conf = document.getElementById('verifyConfidence').value;
            if (!escrowId || !data || !conf) { alert("Fill all fields"); return; }
            
            const resultDiv = document.getElementById('verifyResult');
            resultDiv.innerHTML = '<div class="tx-hash">⏳ Processing verification...</div>';
            
            try {
                const proofBytes = ethers.toUtf8Bytes(data);
                const tx = await contract.verifyAndRelease(parseInt(escrowId), proofBytes, parseInt(conf));
                resultDiv.innerHTML = `<div class="tx-hash">⏳ Waiting for confirmation... TX: ${tx.hash.slice(0,16)}...</div>`;
                await tx.wait();
                resultDiv.innerHTML = `<div class="status-success">✅ Payment released for Escrow #${escrowId}!</div>`;
                addLog(`✅ Escrow #${escrowId} completed with ${conf}% confidence`, tx.hash);
                document.getElementById('actualData').value = '';
                document.getElementById('verifyConfidence').value = '';
                setTimeout(() => resultDiv.innerHTML = '', 5000);
            } catch (err) {
                resultDiv.innerHTML = `<div class="status-error">❌ Error: ${err.message}</div>`;
                addLog(`❌ Verification failed: ${err.message}`);
                setTimeout(() => resultDiv.innerHTML = '', 5000);
            }
        }
        
        // Initialize
        renderAgents();
        updateWalletUI();
        
        document.getElementById('createBtn').onclick = createEscrow;
        document.getElementById('verifyBtn').onclick = verifyAndRelease;
        
        addLog("🟢 ProofPayX ready. Connect your wallet to start.");
    </script>
</body>
</html>
