<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 ProofPayX — Trustless AI Payments</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { font-size: 3rem; background: linear-gradient(90deg, #00ffcc, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0,255,204,0.2); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: #00ffcc; }
        .agent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
        .agent-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(0,255,204,0.2); border-radius: 12px; padding: 1rem; cursor: pointer; transition: all 0.2s; }
        .agent-card:hover { border-color: #00ffcc; transform: translateY(-2px); }
        .agent-card.selected { background: rgba(0,255,204,0.1); border-color: #00ffcc; }
        .agent-name { font-weight: 600; font-size: 1.1rem; }
        .agent-price { color: #00ffcc; font-size: 0.9rem; margin-top: 0.25rem; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.875rem; color: #888; margin-bottom: 0.5rem; }
        .form-input, .form-textarea { width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,204,0.3); border-radius: 8px; color: #fff; font-family: monospace; }
        .form-input:focus, .form-textarea:focus { outline: none; border-color: #00ffcc; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { width: 100%; padding: 0.75rem; background: linear-gradient(90deg, #00ffcc, #0066ff); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(0,255,204,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-success { padding: 0.75rem; background: rgba(34,197,94,0.1); border: 1px solid #22c55e; border-radius: 8px; color: #22c55e; text-align: center; margin-top: 0.5rem; }
        .status-error { padding: 0.75rem; background: rgba(239,68,68,0.1); border: 1px solid #ef4444; border-radius: 8px; color: #ef4444; text-align: center; margin-top: 0.5rem; }
        .tx-hash { margin-top: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.3); border-radius: 8px; font-size: 0.75rem; font-family: monospace; word-break: break-all; text-align: center; }
        .log-container { max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 0.5rem; }
        .log-entry { font-size: 0.75rem; padding: 0.5rem; border-bottom: 1px solid rgba(0,255,204,0.1); font-family: monospace; }
        .log-time { color: #888; margin-right: 0.5rem; }
        .log-link { color: #00ffcc; text-decoration: none; margin-left: 0.5rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } .agent-grid { grid-template-columns: 1fr; } }
        .wallet-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 50px; font-family: monospace; font-size: 0.875rem; color: #22c55e; }
        .disconnect-btn { padding: 0.5rem 1rem; background: transparent; border: 1px solid rgba(239,68,68,0.3); color: #ef4444; border-radius: 50px; cursor: pointer; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .footer { text-align: center; color: #666; font-size: 0.75rem; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(0,255,204,0.1); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><h1>🔒 ProofPayX</h1><p style="color:#888;">Stripe for AI agents — but <span style="color:#00ffcc;">trustless</span></p></div>
        <div id="walletArea"></div>
    </div>

    <div class="grid-2">
        <!-- Left Column -->
        <div>
            <!-- Agents -->
            <div class="card">
                <div class="card-title">🤖 Available Agents</div>
                <div id="agentGrid" class="agent-grid"></div>
            </div>

            <!-- Create Escrow -->
            <div class="card">
                <div class="card-title">💰 Create Escrow</div>
                <div class="form-group"><label class="form-label">Agent Address</label><input type="text" id="agentAddress" class="form-input" placeholder="0x..."></div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Amount (OKB)</label><input type="number" id="amount" class="form-input" step="0.001" placeholder="0.01"></div>
                    <div class="form-group"><label class="form-label">Min Confidence %</label><input type="number" id="minConfidence" class="form-input" value="80"></div>
                </div>
                <div class="form-group"><label class="form-label">Expected Result (will be hashed)</label><textarea id="resultData" class="form-textarea" rows="3" placeholder="Enter expected result data..."></textarea></div>
                <button id="createBtn" class="btn">🔒 Lock Payment</button>
                <div id="createResult"></div>
            </div>
        </div>

        <!-- Right Column -->
        <div>
            <!-- Verify & Release -->
            <div class="card">
                <div class="card-title">🔓 Verify & Release</div>
                <div class="form-group"><label class="form-label">Escrow ID</label><input type="number" id="escrowId" class="form-input" placeholder="0"></div>
                <div class="form-group"><label class="form-label">Actual Delivered Data</label><textarea id="actualData" class="form-textarea" rows="3" placeholder="Enter actual result data (must match exactly)"></textarea></div>
                <div class="form-group"><label class="form-label">Confidence %</label><input type="number" id="verifyConfidence" class="form-input" placeholder="85"></div>
                <button id="verifyBtn" class="btn" style="background: linear-gradient(90deg, #22c55e, #16a34a);">✅ Verify & Release</button>
                <div id="verifyResult"></div>
            </div>

            <!-- Transaction Log -->
            <div class="card">
                <div class="card-title">📋 Transaction Log</div>
                <div id="logContainer" class="log-container"><div class="log-entry"><span class="log-time">[--:--:--]</span> Ready. Connect your wallet to start.</div></div>
            </div>
        </div>
    </div>

    <div class="footer">🔗 X Layer Testnet | Contract: 0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6</div>
</div>

<script>
    const CONTRACT_ADDRESS = "0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6";
    const CONTRACT_ABI = [
        "function createEscrow(address _agent, bytes32 _hashlock, uint8 _minConfidence, uint256 _durationSeconds) external payable returns (uint256)",
        "function verifyAndRelease(uint256 _id, bytes memory _proof, uint8 _confidence) external",
        "function escrowCounter() view returns (uint256)"
    ];
    
    const AGENTS = [
        { name: "📈 ETH Predictor", price: 0.01, address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb" },
        { name: "📊 Sentiment Analyst", price: 0.005, address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb" },
        { name: "🔒 Code Auditor", price: 0.02, address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb" }
    ];
    
    let provider, signer, contract;
    let currentAddress = null;
    
    function addLog(message, txHash = null) {
        const logDiv = document.getElementById('logContainer');
        const time = new Date().toLocaleTimeString();
        let html = `<div class="log-entry"><span class="log-time">[${time}]</span> ${message}`;
        if (txHash) html += `<a href="https://www.okx.com/web3/explorer/xlayer-testnet/tx/${txHash}" target="_blank" class="log-link">🔗 View TX</a>`;
        html += `</div>`;
        logDiv.insertAdjacentHTML('afterbegin', html);
        if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
    }
    
    function updateWalletUI() {
        const walletArea = document.getElementById('walletArea');
        if (currentAddress) {
            walletArea.innerHTML = `<div style="display:flex; gap:0.5rem; align-items:center;"><div class="wallet-badge">✅ ${currentAddress.slice(0,6)}...${currentAddress.slice(-4)}</div><button id="disconnectBtn" class="disconnect-btn">🔌 Disconnect</button></div>`;
            document.getElementById('disconnectBtn').onclick = disconnectWallet;
        } else {
            walletArea.innerHTML = `<button id="connectBtn" class="btn" style="width:auto; padding:0.5rem 1.5rem;">🔌 Connect OKX Wallet</button>`;
            document.getElementById('connectBtn').onclick = connectWallet;
        }
    }
    
    async function connectWallet() {
        const ethProvider = window.okxwallet || window.ethereum;
        if (!ethProvider) { alert("❌ Please install OKX Wallet"); return; }
        try {
            const accounts = await ethProvider.request({ method: "eth_requestAccounts" });
            provider = new ethers.BrowserProvider(ethProvider);
            signer = await provider.getSigner();
            currentAddress = await signer.getAddress();
            contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
            addLog(`✅ Wallet connected: ${currentAddress.slice(0,6)}...${currentAddress.slice(-4)}`);
            updateWalletUI();
        } catch (err) { addLog(`❌ Connection failed: ${err.message}`); }
    }
    
    async function disconnectWallet() {
        currentAddress = null;
        provider = null;
        signer = null;
        contract = null;
        addLog("🔌 Wallet disconnected");
        updateWalletUI();
    }
    
    function renderAgents() {
        const grid = document.getElementById('agentGrid');
        grid.innerHTML = AGENTS.map((agent, idx) => `
            <div class="agent-card" data-idx="${idx}">
                <div class="agent-name">${agent.name}</div>
                <div class="agent-price">💰 ${agent.price} OKB</div>
            </div>
        `).join('');
        document.querySelectorAll('.agent-card').forEach(card => {
            card.onclick = () => {
                const idx = parseInt(card.dataset.idx);
                const agent = AGENTS[idx];
                document.getElementById('agentAddress').value = agent.address;
                document.getElementById('amount').value = agent.price;
                document.getElementById('minConfidence').value = 80;
                addLog(`✅ Selected agent: ${agent.name}`);
                card.style.borderColor = '#00ffcc';
                setTimeout(() => card.style.borderColor = '', 500);
            };
        });
    }
    
    async function createEscrow() {
        if (!contract) { alert("🔌 Connect wallet first"); return; }
        const agent = document.getElementById('agentAddress').value;
        const amount = document.getElementById('amount').value;
        const minConf = document.getElementById('minConfidence').value;
        const data = document.getElementById('resultData').value;
        if (!agent || !amount || !data) { alert("❌ Fill all fields"); return; }
        
        const resultDiv = document.getElementById('createResult');
        resultDiv.innerHTML = '<div class="tx-hash">⏳ Processing transaction...</div>';
        
        try {
            const hashlock = ethers.keccak256(ethers.toUtf8Bytes(data));
            const tx = await contract.createEscrow(agent, hashlock, parseInt(minConf), 3600, {
                value: ethers.parseEther(amount)
            });
            resultDiv.innerHTML = `<div class="tx-hash">⏳ Waiting for confirmation... TX: ${tx.hash.slice(0,16)}...</div>`;
            await tx.wait();
            const counter = await contract.escrowCounter();
            const escrowId = Number(counter) - 1;
            resultDiv.innerHTML = `<div class="status-success">✅ Escrow #${escrowId} created successfully!</div>`;
            addLog(`✅ Escrow #${escrowId} created for ${amount} OKB`, tx.hash);
            document.getElementById('escrowId').value = escrowId;
            document.getElementById('resultData').value = '';
            setTimeout(() => resultDiv.innerHTML = '', 5000);
        } catch (err) {
            resultDiv.innerHTML = `<div class="status-error">❌ Error: ${err.message}</div>`;
            addLog(`❌ Create failed: ${err.message}`);
            setTimeout(() => resultDiv.innerHTML = '', 5000);
        }
    }
    
    async function verifyAndRelease() {
        if (!contract) { alert("🔌 Connect wallet first"); return; }
        const escrowId = document.getElementById('escrowId').value;
        const data = document.getElementById('actualData').value;
        const conf = document.getElementById('verifyConfidence').value;
        if (!escrowId || !data || !conf) { alert("❌ Fill all fields"); return; }
        
        const resultDiv = document.getElementById('verifyResult');
        resultDiv.innerHTML = '<div class="tx-hash">⏳ Processing verification...</div>';
        
        try {
            const proofBytes = ethers.toUtf8Bytes(data);
            const tx = await contract.verifyAndRelease(parseInt(escrowId), proofBytes, parseInt(conf));
            resultDiv.innerHTML = `<div class="tx-hash">⏳ Waiting for confirmation... TX: ${tx.hash.slice(0,16)}...</div>`;
            await tx.wait();
            resultDiv.innerHTML = `<div class="status-success">✅ Payment released for Escrow #${escrowId}!</div>`;
            addLog(`✅ Escrow #${escrowId} completed with ${conf}% confidence`, tx.hash);
            document.getElementById('actualData').value = '';
            document.getElementById('verifyConfidence').value = '';
            setTimeout(() => resultDiv.innerHTML = '', 5000);
        } catch (err) {
            resultDiv.innerHTML = `<div class="status-error">❌ Error: ${err.message}</div>`;
            addLog(`❌ Verification failed: ${err.message}`);
            setTimeout(() => resultDiv.innerHTML = '', 5000);
        }
    }
    
    renderAgents();
    updateWalletUI();
    document.getElementById('createBtn').onclick = createEscrow;
    document.getElementById('verifyBtn').onclick = verifyAndRelease;
    addLog("🟢 ProofPayX ready. Connect your wallet to start.");
</script>
</body>
</html>
