<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProofPayX - Stripe for AI agents — but trustless</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --void-black: #050508;
            --void-dark: #0A0A0F;
            --void-card: #111118;
            --void-border: rgba(255,255,255,0.06);
            --neon-cyan: #00D4FF;
            --neon-blue: #4D9FFF;
            --neon-purple: #A855F7;
            --neon-green: #10B981;
            --neon-amber: #F59E0B;
            --neon-red: #EF4444;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --gradient-primary: linear-gradient(135deg, #00D4FF 0%, #4D9FFF 100%);
            --gradient-success: linear-gradient(135deg, #10B981 0%, #00D4FF 100%);
            --gradient-glow: radial-gradient(ellipse at center, rgba(0,212,255,0.15) 0%, transparent 70%);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--void-black);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .aurora::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: blob-float 20s ease-in-out infinite;
        }

        .blob-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            left: -150px;
            background: linear-gradient(135deg, #00D4FF, #4D9FFF);
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            top: 20%;
            right: -200px;
            background: linear-gradient(135deg, #A855F7, #4D9FFF);
            animation-delay: -5s;
        }

        .blob-3 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: 30%;
            background: linear-gradient(135deg, #00D4FF, #10B981);
            animation-delay: -10s;
        }

        @keyframes blob-float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 10px) scale(1.02); }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: 
                linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px),
                linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
        }

        .splash {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--void-black);
            animation: splash-exit 0.8s cubic-bezier(0.4, 0, 0.2, 1) 4s forwards;
        }

        .splash-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            text-align: center;
        }

        .splash-logo {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logo-pulse 2s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(0,212,255,0.4);
        }

        @keyframes logo-pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(0,212,255,0.3); }
            50% { box-shadow: 0 0 80px rgba(0,212,255,0.6); }
        }

        .splash-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .splash-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .splash-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .splash-fill {
            height: 100%;
            width: 0;
            background: var(--gradient-primary);
            animation: fill-bar 3s ease 0.5s forwards;
        }

        @keyframes fill-bar { to { width: 100%; } }
        @keyframes splash-exit { 
            to { 
                opacity: 0; 
                transform: scale(1.05);
                visibility: hidden;
            } 
        }

        .app {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            opacity: 0;
            animation: app-in 0.6s ease 4.2s forwards;
        }

        @keyframes app-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: rgba(17,17,24,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--void-border);
            border-radius: 16px;
            margin-bottom: 2rem;
            position: sticky;
            top: 1rem;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-title {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tagline {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.65rem 1.25rem;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn:hover::before { opacity: 1; }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 20px rgba(0,212,255,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,212,255,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            border: 1px solid var(--void-border);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(0,212,255,0.3);
        }

        .btn-success {
            background: var(--gradient-success);
            color: white;
            box-shadow: 0 4px 20px rgba(16,185,129,0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(16,185,129,0.4);
        }

        .btn-danger {
            background: rgba(239,68,68,0.1);
            color: var(--neon-red);
            border: 1px solid rgba(239,68,68,0.3);
        }

        .btn-danger:hover {
            background: rgba(239,68,68,0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 900px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 500px) {
            .stats-bar { grid-template-columns: 1fr; }
        }

        .stat-card {
            background: var(--void-card);
            border: 1px solid var(--void-border);
            border-radius: 14px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(0,212,255,0.2);
            transform: translateY(-2px);
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon.cyan { background: rgba(0,212,255,0.1); color: var(--neon-cyan); }
        .stat-icon.green { background: rgba(16,185,129,0.1); color: var(--neon-green); }
        .stat-icon.purple { background: rgba(168,85,247,0.1); color: var(--neon-purple); }
        .stat-icon.amber { background: rgba(245,158,11,0.1); color: var(--neon-amber); }

        .stat-content {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-value span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 1100px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        .col {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--void-card);
            border: 1px solid var(--void-border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-glow);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .card:hover::before { opacity: 1; }

        .card:hover {
            border-color: rgba(0,212,255,0.15);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
            position: relative;
            z-index: 1;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-title svg {
            color: var(--neon-cyan);
        }

        .card-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.05);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }

        .card-body {
            position: relative;
            z-index: 1;
        }

        .agent-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        @media (max-width: 600px) {
            .agent-grid { grid-template-columns: 1fr; }
        }

        .agent-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--void-border);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .agent-card:hover {
            background: rgba(0,212,255,0.05);
            border-color: rgba(0,212,255,0.3);
            transform: translateY(-2px);
        }

        .agent-card.active {
            background: rgba(0,212,255,0.08);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0,212,255,0.15);
        }

        .agent-card.active::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background: var(--neon-cyan);
            color: var(--void-black);
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .agent-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
        }

        .agent-icon svg {
            width: 16px;
            height: 16px;
            color: white;
        }

        .agent-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .agent-price {
            font-size: 0.75rem;
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.5rem;
        }

        .agent-stats {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-row-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            min-width: 35px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            width: 10px;
            height: 10px;
        }

        .star.filled path { fill: var(--neon-amber); }
        .star.empty path { fill: rgba(255,255,255,0.1); }

        .conf-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .conf-bar-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .agent-addr {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .agent-addr:hover { color: var(--neon-cyan); }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--void-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 500px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .payout-preview {
            background: linear-gradient(135deg, rgba(0,212,255,0.05), rgba(77,159,255,0.05));
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .payout-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .payout-row:last-child {
            border-bottom: none;
        }

        .payout-key {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .payout-val {
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .payout-val.accent { color: var(--neon-cyan); }
        .payout-val.success { color: var(--neon-green); }
        .payout-val.warning { color: var(--neon-amber); }

        .conf-track {
            margin-top: 0.75rem;
        }

        .conf-track-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .conf-track-bar {
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .conf-track-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .conf-track-marker {
            position: absolute;
            top: -2px;
            width: 2px;
            height: 10px;
            background: var(--neon-amber);
            border-radius: 1px;
        }

        .payout-note {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .success-state {
            background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(0,212,255,0.05));
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop-in {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .success-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gradient-success);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            animation: success-pulse 2s ease-out infinite;
        }

        @keyframes success-pulse {
            0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }

        .success-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--neon-green);
            margin-bottom: 0.5rem;
        }

        .success-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .error-state {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--neon-red);
            font-size: 0.85rem;
        }

        .tx-pill {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1rem;
            margin-top: 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--void-border);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tx-pill:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 280px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(0,212,255,0.3);
            border-radius: 2px;
        }

        .history-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
            font-size: 0.85rem;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--void-border);
            border-radius: 10px;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-id {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .history-meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .history-amount {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--neon-cyan);

        .net-option {

        .toast.error { border-color: rgba(239,68,68,0.3); }

        .toast-icon {

            height: 20px;

        }

        .toast.success .toast-icon { color: var(--neon-green); }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, memo } = React;

const CONTRACT_ADDRESS = "0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6";
const CONTRACT_ABI = [
    "function createEscrow(address _agent, bytes32 _hashlock, uint8 _minConfidence, uint256 _durationSeconds) external payable returns (uint256)",
    "function verifyAndRelease(uint256 _id, bytes memory _proof, uint8 _confidence) external",
    "function escrowCounter() view returns (uint256)"
];
const REGISTRY_ADDRESS = "0x2b63B3c363b29B82E09d036167Ac212d4c7026d5";
const REGISTRY_ABI = [
    "function getActiveAgents() view returns ((address agentAddress, string name, string description, uint256 price, bool isActive, uint256 registeredAt)[])"
];

const EXPLORER_BASE = "https://www.oklink.com/xlayer-test/tx/";

const NETWORKS = [
    { id: 'xlayer-test', name: 'X Layer Testnet', color: '#00D4FF', explorer: EXPLORER_BASE },
    { id: 'sepolia', name: 'Sepolia', color: '#A855F7', explorer: 'https://sepolia.etherscan.io/tx/' },
    { id: 'mumbai', name: 'Polygon Mumbai', color: '#8B5CF6', explorer: 'https://mumbai.polygonscan.com/tx/' },
    { id: 'bnb-test', name: 'BNB Testnet', color: '#F59E0B', explorer: 'https://testnet.bscscan.com/tx/' },
];

function useCopy(timeout = 1600) {
    const [copied, setCopied] = useState(false);
    const timerRef = useRef(null);
    const copy = useCallback(text => {
        navigator.clipboard.writeText(text).then(() => {
            setCopied(true);
            clearTimeout(timerRef.current);
            timerRef.current = setTimeout(() => setCopied(false), timeout);
        }).catch(() => {});
    }, [timeout]);
    useEffect(() => () => clearTimeout(timerRef.current), []);
    return [copied, copy];
}

const CopyBtn = memo(function CopyBtn({ text, children, className = '', style = {} }) {
    const [copied, copy] = useCopy();
    return (
        <span className={`copy-btn ${className}`} style={{ color: copied ? '#10B981' : 'inherit', ...style }}
              onClick={e => { e.stopPropagation(); copy(text); }} title={copied ? 'Copied!' : 'Copy'}>
            {children}
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                {copied ? <polyline points="20 6 9 17 4 12"/> : <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>}
            </svg>
        </span>
    );
});

const Stars = memo(function Stars({ score }) {
    return (
        <div className="stars">
            {[1, 2, 3, 4, 5].map(i => (
                <svg key={i} className={`star ${score >= i ? 'filled' : 'empty'}`} viewBox="0 0 12 12">
                    <path d="M6 1l1.5 4h4L8.5 7.5l1 4L6 9l-3.5 2.5 1-4L.5 5h4z" strokeWidth="0"/>
                </svg>
            ))}
        </div>
    );
});

const Toast = memo(function Toast({ message, type, onClose }) {
    useEffect(() => { const t = setTimeout(onClose, 5000); return () => clearTimeout(t); }, [onClose]);
    return (
        <div className={`toast ${type}`}>
            <svg className="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                {type === 'success'
                    ? <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>
                    : <><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>
                }
            </svg>
            <span className="toast-message">{message}</span>
        </div>
    );
});

function Splash() {
    return (
        <div className="splash">
            <div className="aurora-blob blob-1"/>
            <div className="aurora-blob blob-2"/>
            <div className="aurora-blob blob-3"/>
            <div className="splash-content">
                <div className="splash-logo">
                    <svg width="50" height="50" viewBox="0 0 34 34" fill="none">
                        <path d="M17 2L4 7.5V17c0 6.6 5.6 12.8 13 14.5C24.4 29.8 30 23.6 30 17V7.5L17 2z" fill="white" fillOpacity="0.9" stroke="white" strokeWidth="1.5" strokeLinejoin="round"/>
                        <circle cx="17" cy="17" r="3" fill="#050508"/>
                        <line x1="17" y1="10" x2="17" y2="14" stroke="#050508" strokeWidth="1.5" strokeLinecap="round"/>
                        <line x1="17" y1="20" x2="17" y2="24" stroke="#050508" strokeWidth="1.5" strokeLinecap="round"/>
                        <line x1="10" y1="17" x2="14" y2="17" stroke="#050508" strokeWidth="1.5" strokeLinecap="round"/>
                        <line x1="20" y1="17" x2="24" y2="17" stroke="#050508" strokeWidth="1.5" strokeLinecap="round"/>
                    </svg>
                </div>
                <div className="splash-title">ProofPayX</div>
                <div className="splash-subtitle">Stripe for AI agents — but trustless</div>
                <div className="splash-bar"><div className="splash-fill"/></div>
            </div>
        </div>
    );
}

const StatsBar = memo(function StatsBar({ txCount }) {
    const [animated, setAnimated] = useState(false);
    const [stats, setStats] = useState({ success: 0, time: 0, gas: '0.000000', agents: 0 });

    useEffect(() => {
        const t = setTimeout(() => {
            setAnimated(true);
            let s = 0, tm = 0, g = 0, a = 0;
            const si = setInterval(() => {
                s += 5;
                if (s >= 100) { s = 100; clearInterval(si); }
                setStats(p => ({ ...p, success: s }));
            }, 30);
            const ti = setInterval(() => {
                tm += 0.4;
                if (tm >= 4) { tm = 4; clearInterval(ti); }
                setStats(p => ({ ...p, time: Math.round(tm * 10) / 10 }));
            }, 50);
            const gi = setInterval(() => {
                g += 0.0000003;
                if (g >= 0.000003) { g = 0.000003; clearInterval(gi); }
                setStats(p => ({ ...p, gas: g.toFixed(7).slice(0, 9) }));
            }, 60);
            const ai = setInterval(() => {
                a++;
                if (a >= 3) clearInterval(ai);
                setStats(p => ({ ...p, agents: a }));
            }, 200);
        }, 800);
        return () => clearTimeout(t);
    }, []);

    return (
        <div className="stats-bar">
            <div className="stat-card">
                <div className="stat-icon green">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div className="stat-content">
                    <div className="stat-value"><span>{animated ? stats.success : 0}%</span></div>
                    <div className="stat-label">Success Rate</div>
                </div>
            </div>
            <div className="stat-card">
                <div className="stat-icon cyan">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div className="stat-content">
                    <div className="stat-value">~<span>{animated ? stats.time : 0}</span>s</div>
                    <div className="stat-label">Avg Confirm</div>
                </div>
            </div>
            <div className="stat-card">
                <div className="stat-icon purple">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div className="stat-content">
                    <div className="stat-value">~<span>{animated ? stats.gas : '0.000000'}</span></div>
                    <div className="stat-label">OKB Gas / Escrow</div>
                </div>
            </div>
            <div className="stat-card">
                <div className="stat-icon amber">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <div className="stat-content">
                    <div className="stat-value"><span>{animated ? stats.agents : 0}</span></div>
                    <div className="stat-label">Live Agents</div>
                </div>
            </div>
        </div>
    );
});

const NetSwitcher = memo(function NetSwitcher({ network, setNetwork }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
        const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
    }, []);
    const cur = NETWORKS.find(n => n.id === network) || NETWORKS[0];
    return (
        <div ref={ref} className="net-select">
            <div className="net-trigger" onClick={() => setOpen(o => !o)}>
                <span className="net-dot" style={{ background: cur.color }}/>
                <span>{cur.name}</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ marginLeft: 'auto', transform: open ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }}><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            {open && (
                <div className="net-dropdown" onClick={e => e.stopPropagation()}>
                    {NETWORKS.map(n => (
                        <div key={n.id} className={`net-option ${network === n.id ? 'active' : ''}`}
                             onClick={() => { setNetwork(n.id); setOpen(false); }}>
                            <span className="net-dot" style={{ background: n.color }}/>
                            {n.name}
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
});

const PayoutPreview = memo(function PayoutPreview({ amount, minConf, agentConf }) {
    const amt = parseFloat(amount) || 0;
    const minPct = parseInt(minConf) || 80;
    const histPct = agentConf || 88;
    const ok = histPct >= minPct;
    return (
        <div className="payout-preview">
            <div className="payout-row">
                <span className="payout-key">Locked amount</span>
                <span className="payout-val accent">{amt > 0 ? `${amt} OKB` : '—'}</span>
            </div>
            <div className="payout-row">
                <span className="payout-key">Min confidence</span>
                <span className="payout-val">{minPct}%</span>
            </div>
            <div className="payout-row">
                <span className="payout-key">Agent confidence</span>
                <span className={`payout-val ${ok ? 'success' : 'warning'}`}>{histPct}%</span>
            </div>
            <div className="payout-row">
                <span className="payout-key">Expected payout</span>
                <span className={`payout-val ${ok ? 'success' : 'warning'}`}>{amt > 0 ? (ok ? `${amt} OKB ✓` : 'Refunded') : '—'}</span>
            </div>
            <div className="conf-track">
                <div className="conf-track-header">
                    <span>Confidence history</span>
                    <span>{histPct}%</span>
                </div>
                <div className="conf-track-bar">
                    <div className="conf-track-fill" style={{ width: `${histPct}%`, background: ok ? 'linear-gradient(90deg, #10B981, #00D4FF)' : 'linear-gradient(90deg, #F59E0B, #EF4444)' }}/>
                    <div className="conf-track-marker" style={{ left: `${minPct}%` }}/>
                </div>
            </div>
            <div className="payout-note">{ok ? `Agent meets your ${minPct}% threshold — payout likely` : `Agent avg (${histPct}%) below threshold — may refund`}</div>
        </div>
    );
});

const AgentCard = memo(function AgentCard({ agent, isSelected, onClick }) {
    return (
        <div className={`agent-card ${isSelected ? 'active' : ''}`} onClick={onClick}>
            <div className="agent-icon"><agent.Icon/></div>
            <div className="agent-name">{agent.name}</div>
            <div className="agent-price">{agent.price} OKB</div>
            <div className="agent-stats">
                <div className="stat-row">
                    <span className="stat-row-label">Rep</span>
                    <Stars score={agent.reputation}/>
                </div>
                <div className="stat-row">
                    <span className="stat-row-label">Conf</span>
                    <div className="conf-bar"><div className="conf-bar-fill" style={{ width: `${agent.confidence}%` }}/></div>
                </div>
            </div>
            <CopyBtn text={agent.address} className="agent-addr">{agent.address.slice(0, 8)}...{agent.address.slice(-6)}</CopyBtn>
        </div>
    );
});

const AgentSkeleton = memo(function AgentSkeleton() {
    return (
        <div className="agent-card">
            <div className="skeleton" style={{ width: 36, height: 36, borderRadius: 10, marginBottom: 12 }}/>
            <div className="skeleton" style={{ width: '70%', height: 14, marginBottom: 8 }}/>
            <div className="skeleton" style={{ width: '50%', height: 12, marginBottom: 12 }}/>
            <div className="skeleton" style={{ width: '90%', height: 8, marginBottom: 8 }}/>
            <div className="skeleton" style={{ width: '80%', height: 10 }}/>
        </div>
    );
});

const EscrowHistory = memo(function EscrowHistory({ history, network }) {
    const net = NETWORKS.find(n => n.id === network) || NETWORKS[0];
    return (
        <div className="card">
            <div className="card-header">
                <div className="card-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Escrow History
                </div>
                <span className="card-badge">{history.length} records</span>
            </div>
            <div className="history-list">
                {history.length === 0
                    ? <div className="history-empty">No escrows yet. Create one to get started.</div>
                    : history.map((h, i) => (
                        <div key={i} className="history-item">
                            <div className="history-info">
                                <div className="history-id">Escrow #{h.id}</div>
                                <div className="history-meta">{h.agent} · {h.time} · {h.minConf}% conf</div>
                            </div>
                            <span className="history-amount">{h.amount}</span>
                            <span className={`history-status ${h.status}`}>{h.status}</span>
                            <div className="history-actions">
                                {h.txHash && (
                                    <a className="history-btn" href={`${net.explorer}${h.txHash}`} target="_blank" rel="noopener noreferrer" title="View on Explorer">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                                    </a>
                                )}
                                <button className="history-btn" onClick={() => navigator.clipboard.writeText(h.txHash || String(h.id))} title="Copy">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                </button>
                            </div>
                        </div>
                    ))
                }
            </div>
        </div>
    );
});

const TxLog = memo(function TxLog({ logs }) {
    return (
        <div className="card">
            <div className="card-header">
                <div className="card-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Transaction Log
                </div>
                <span className="card-badge">{logs.length} events</span>
            </div>
            <div className="log-box">
                {logs.length === 0
                    ? <div className="log-empty">No transactions yet.</div>
                    : logs.map((l, i) => (
                        <div key={i} className="log-item">
                            <span className="log-time">[{l.time}]</span>
                            <span className={`log-message ${l.success ? 'success' : l.fail ? 'error' : ''}`}>{l.message}</span>
                            {l.txHash && <a href={`${EXPLORER_BASE}${l.txHash}`} target="_blank" rel="noopener noreferrer" className="log-link">↗ Explorer</a>}
                        </div>
                    ))
                }
            </div>
        </div>
    );
});

function EscrowForm({ contract, onSuccess, onLog, selectedAgent, addToast }) {
    const [agentAddr, setAgentAddr] = useState('');
    const [amount, setAmount] = useState('');
    const [minConf, setMinConf] = useState('80');
    const [result, setResult] = useState('');
    const [loading, setLoading] = useState(false);
    const [status, setStatus] = useState('idle');
    const [txHash, setTxHash] = useState('');
    const [escrowNum, setEscrowNum] = useState(null);
    const [copied, copy] = useCopy();

    useEffect(() => {
        if (selectedAgent) { setAgentAddr(selectedAgent.address); setAmount(selectedAgent.price); }
    }, [selectedAgent]);

    const handleSubmit = async e => {
        e.preventDefault();
        if (!contract || !agentAddr || !amount || !result) return;
        setLoading(true); setStatus('processing'); onLog('Creating escrow transaction...');
        try {
            const hashlock = ethers.keccak256(ethers.toUtf8Bytes(result));
            const tx = await contract.createEscrow(agentAddr, hashlock, parseInt(minConf), 3600, { value: ethers.parseEther(amount) });
            setTxHash(tx.hash); onLog(`TX sent: ${tx.hash.slice(0, 14)}...`, tx.hash);
            await tx.wait();
            const counter = await contract.escrowCounter();
            const id = Number(counter) - 1;
            setEscrowNum(id); setStatus('success');
            onLog(`SUCCESS Escrow #${id} created!`, tx.hash, true);
            addToast(`Escrow #${id} created!`, 'success');
            onSuccess({ id, agent: selectedAgent?.name || agentAddr.slice(0, 8) + '...', amount: `${amount} OKB`, minConf, txHash: tx.hash, time: new Date().toLocaleTimeString(), status: 'pending' });
            setTimeout(() => { setStatus('idle'); setResult(''); setEscrowNum(null); setTxHash(''); }, 5000);
        } catch (err) {
            setStatus('error'); onLog(`FAILED: ${err.message}`, null, false, true);
            addToast(err.message || 'Failed', 'error');
            setTimeout(() => setStatus('idle'), 3000);
        } finally { setLoading(false); }
    };

    return (
        <div className="card">
            <div className="card-header">
                <div className="card-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/></svg>
                    Create Escrow
                </div>
            </div>
            <form onSubmit={handleSubmit}>
                <div className="form-group">
                    <label className="form-label">Agent Address</label>
                    <input type="text" className="form-input" value={agentAddr} onChange={e => setAgentAddr(e.target.value)} placeholder="0x..." />
                </div>
                <div className="form-row">
                    <div className="form-group">
                        <label className="form-label">Amount (OKB)</label>
                        <input type="number" step="0.001" className="form-input" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.01" />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Min Confidence %</label>
                        <input type="number" min="0" max="100" className="form-input" value={minConf} onChange={e => setMinConf(e.target.value)} placeholder="80" />
                    </div>
                </div>
                <PayoutPreview amount={amount} minConf={minConf} agentConf={selectedAgent?.confidence} />
                <div className="form-group">
                    <label className="form-label">Expected Result <span style={{ color: 'var(--text-muted)', fontWeight: 400 }}>(hashed on-chain)</span></label>
                    <textarea className="form-input" value={result} onChange={e => setResult(e.target.value)} placeholder={selectedAgent?.placeholder || 'e.g. ETH price prediction: 3500'} rows="2" />
                </div>
                {status === 'success' && (
                    <div className="success-state">
                        <div className="success-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                        <div className="success-title">Escrow #{escrowNum} Created!</div>
                        <div className="success-subtitle">Payment locked · Agent notified · Awaiting delivery</div>
                    </div>
                )}
                {status === 'error' && (
                    <div className="error-state">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        Transaction failed
                    </div>
                )}
                {(status === 'idle' || status === 'processing') && (
                    <button type="submit" className="btn btn-primary" style={{ width: '100%' }} disabled={loading || !contract || !agentAddr || !amount || !result}>
                        {loading ? <><div className="spinner"/> Processing...</>
                            : <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Lock Payment</>
                        }
                    </button>
                )}
                {txHash && (
                    <div className="tx-pill" onClick={() => copy(txHash)}>
                        <span>TX: {txHash.slice(0, 20)}...{txHash.slice(-6)}</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: copied ? '#10B981' : 'currentColor' }}>
                            {copied ? <polyline points="20 6 9 17 4 12"/> : <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>}
                        </svg>
                    </div>
                )}
            </form>
        </div>
    );
}

function VerifyForm({ contract, onLog, addToast, onRelease }) {
    const [escrowId, setEscrowId] = useState('');
    const [actual, setActual] = useState('');
    const [conf, setConf] = useState('');
    const [loading, setLoading] = useState(false);
    const [status, setStatus] = useState('idle');
    const [txHash, setTxHash] = useState('');
    const [copied, copy] = useCopy();

    const handleSubmit = async e => {
        e.preventDefault();
        if (!contract || !escrowId || !actual || !conf) return;
        setLoading(true); setStatus('processing'); onLog(`Verifying escrow #${escrowId}...`);
        try {
            const tx = await contract.verifyAndRelease(parseInt(escrowId), ethers.toUtf8Bytes(actual), parseInt(conf));
            setTxHash(tx.hash); onLog(`Verification TX: ${tx.hash.slice(0, 14)}...`, tx.hash);
            await tx.wait();
            setStatus('success');
            onLog(`SUCCESS Payment released for #${escrowId}!`, tx.hash, true);
            addToast(`Payment released for Escrow #${escrowId}!`, 'success');
            onRelease(parseInt(escrowId), tx.hash);
            setTimeout(() => { setStatus('idle'); setActual(''); setConf(''); setTxHash(''); }, 5000);
        } catch (err) {
            setStatus('error'); onLog(`FAILED: ${err.message}`, null, false, true);
            addToast(err.message || 'Verification failed', 'error');
            setTimeout(() => setStatus('idle'), 3000);
        } finally { setLoading(false); }
    };

    return (
        <div className="card">
            <div className="card-header">
                <div className="card-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
                    Verify and Release
                </div>
            </div>
            <form onSubmit={handleSubmit}>
                <div className="form-group">
                    <label className="form-label">Escrow ID</label>
                    <input type="number" className="form-input" value={escrowId} onChange={e => setEscrowId(e.target.value)} placeholder="0" />
                </div>
                <div className="form-group">
                    <label className="form-label">Actual Delivered Data</label>
                    <textarea className="form-input" value={actual} onChange={e => setActual(e.target.value)} placeholder="e.g. ETH price prediction: 3482 (delivered result)" rows="3" />
                </div>
                <div className="form-group">
                    <label className="form-label">Confidence %</label>
                    <input type="number" min="0" max="100" className="form-input" value={conf} onChange={e => setConf(e.target.value)} placeholder="85" />
                </div>
                {status === 'success' && (
                    <div className="success-state">
                        <div className="success-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                        <div className="success-title">Payment Released!</div>
                        <div className="success-subtitle">Agent paid · Proof stored on-chain</div>
                    </div>
                )}
                {status === 'error' && (
                    <div className="error-state">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        Verification failed
                    </div>
                )}
                {(status === 'idle' || status === 'processing') && (
                    <button type="submit" className="btn btn-success" style={{ width: '100%' }} disabled={loading || !contract || !escrowId || !actual || !conf}>
                        {loading ? <><div className="spinner"/> Verifying...</>
                            : <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg> Verify and Release</>
                        }
                    </button>
                )}
                {txHash && (
                    <div className="tx-pill" onClick={() => copy(txHash)}>
                        <span>TX: {txHash.slice(0, 20)}...{txHash.slice(-6)}</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: copied ? '#10B981' : 'currentColor' }}>
                            {copied ? <polyline points="20 6 9 17 4 12"/> : <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>}
                        </svg>
                    </div>
                )}
            </form>
        </div>
    );
}

function App() {
    const [contract, setContract] = useState(null);
    const [address, setAddress] = useState('');
    const [selectedAgent, setAgent] = useState(null);
    const [logs, setLogs] = useState([]);
    const [toasts, setToasts] = useState([]);
    const [history, setHistory] = useState([]);
    const [network, setNetwork] = useState('xlayer-test');
    const [agents, setAgents] = useState([]);
    const [loadingAgents, setLoading] = useState(true);

    const addToast = useCallback((msg, type) => { const id = Date.now(); setToasts(p => [...p, { id, msg, type }]); }, []);
    const removeToast = useCallback(id => setToasts(p => p.filter(t => t.id !== id)), []);
    const addLog = useCallback((message, txHash, success, fail) => {
        const time = new Date().toLocaleTimeString();
        setLogs(p => [{ time, message, txHash, success, fail }, ...p].slice(0, 25));
    }, []);

    const connectWallet = async () => {
        try {
            const prov = window.okxwallet || window.ethereum;
            if (!prov) { addToast('No wallet found. Install OKX Wallet or MetaMask.', 'error'); return; }
            await prov.request({ method: 'eth_requestAccounts' });
            const ep = new ethers.BrowserProvider(prov);
            const s = await ep.getSigner();
            const addr = await s.getAddress();
            setContract(new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, s));
            setAddress(addr);
            addLog(`Wallet connected: ${addr}`);
            addToast('Wallet connected!', 'success');
            setLoading(true);
            try {
                const reg = new ethers.Contract(REGISTRY_ADDRESS, REGISTRY_ABI, s);
                const raw = await reg.getActiveAgents();
                if (raw.length > 0) {
                    const getIcon = name => {
                        const n = name.toLowerCase();
                        if (n.includes('eth') || n.includes('predict')) return () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
                        if (n.includes('sentiment')) return () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>;
                        return () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>;
                    };
                    setAgents(raw.map((a, i) => ({
                        name: a.name, price: ethers.formatEther(a.price), symbol: 'OKB',
                        address: a.agentAddress, description: a.description,
                        reputation: parseFloat((4.5 + i * 0.15).toFixed(1)),
                        confidence: Math.min(96, 83 + i * 6),
                        placeholder: `e.g. Result from ${a.name}`,
                        Icon: getIcon(a.name),
                    })));
                }
            } catch (err) { console.error("Registry fetch failed:", err); }
            setLoading(false);
        } catch (err) {
            addToast(err.message || 'Failed to connect', 'error');
            addLog(`Connection failed: ${err.message}`, null, false, true);
        }
    };

    const disconnectWallet = () => {
        setContract(null); setAddress('');
        setAgents([]);
        addLog('Wallet disconnected');
        addToast('Wallet disconnected', 'success');
    };

    const handleEscrowSuccess = useCallback(data => setHistory(p => [data, ...p]), []);
    const handleRelease = useCallback((id, txHash) => setHistory(p => p.map(h => h.id === id ? { ...h, status: 'released', txHash } : h)), []);
    const curNet = NETWORKS.find(n => n.id === network) || NETWORKS[0];

    return (
        <>
            <Splash/>
            <div className="aurora">
                <div className="aurora-blob blob-1"/>
                <div className="aurora-blob blob-2"/>
                <div className="aurora-blob blob-3"/>
            </div>
            <div className="grid-overlay"/>
            <div className="toasts">
                {toasts.map(t => <Toast key={t.id} message={t.msg} type={t.type} onClose={() => removeToast(t.id)}/>)}
            </div>
            <div className="app">
                <nav className="nav">
                    <div className="nav-brand">
                        <div className="nav-logo">
                            <svg width="22" height="22" viewBox="0 0 34 34" fill="none">
                                <path d="M17 2L4 7.5V17c0 6.6 5.6 12.8 13 14.5C24.4 29.8 30 23.6 30 17V7.5L17 2z" fill="white" fillOpacity="0.9" stroke="white" strokeWidth="1.5" strokeLinejoin="round"/>
                                <circle cx="17" cy="17" r="2.5" fill="#050508"/>
                                <line x1="17" y1="11" x2="17" y2="14" stroke="#050508" strokeWidth="1.5" strokeLinecap="round"/>
                                <line x1="17" y1="20" x2="17" y2="23" stroke="#050508" strokeWidth="1.5" strokeLinecap="round"/>
                                <line x1="11" y1="17" x2="14" y2="17" stroke="#050508" strokeWidth="1.5" strokeLinecap="round"/>
                                <line x1="20" y1="17" x2="23" y2="17" stroke="#050508" strokeWidth="1.5" strokeLinecap="round"/>
                            </svg>
                        </div>
                        <div>
                            <div className="nav-title">ProofPayX</div>
                            <div className="nav-tagline">Stripe for AI agents — but trustless</div>
                        </div>
                    </div>
                    <div className="nav-actions">
                        <NetSwitcher network={network} setNetwork={setNetwork}/>
                        {address ? (
                            <>
                                <CopyBtn text={address} className="btn btn-secondary">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                    {address.slice(0, 6)}...{address.slice(-4)}
                                </CopyBtn>
                                <button className="btn btn-danger" onClick={disconnectWallet}>Disconnect</button>
                            </>
                        ) : (
                            <button className="btn btn-primary" onClick={connectWallet}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M20 12v4H6a2 2 0 0 0-2 2c0 1.1.9 2 2 2h12v-4"/><path d="M20 12h-4"/></svg>
                                Connect Wallet
                            </button>
                        )}
                    </div>
                </nav>

                <StatsBar txCount={history.length}/>

                <div className="main-grid">
                    <div className="col">
                        <div className="card">
                            <div className="card-header">
                                <div className="card-title">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                                    Available Agents
                                </div>
                                <span className="card-badge">{loadingAgents ? 'Loading...' : `${agents.length} agents`}</span>
                            </div>
                            <div className="agent-grid">
                                {loadingAgents
                                    ? [1, 2, 3].map(i => <AgentSkeleton key={i}/>)
                                    : agents.length === 0
                                        ? <div style={{ textAlign: 'center', padding: '1rem', color: 'var(--text-muted)' }}>No agents registered yet. Connect wallet to load.</div>
                                        : agents.map(a => (
                                            <AgentCard key={a.address} agent={a}
                                                isSelected={selectedAgent?.address === a.address}
                                                onClick={() => { setAgent(a); addLog(`Selected agent: ${a.name}`); }}
                                            />
                                        ))
                                }
                            </div>
                        </div>

                        <EscrowForm contract={contract} onSuccess={handleEscrowSuccess} onLog={addLog} selectedAgent={selectedAgent} addToast={addToast}/>

                        <EscrowHistory history={history} network={network}/>
                    </div>

                    <div className="col">
                        <VerifyForm contract={contract} onLog={addLog} addToast={addToast} onRelease={handleRelease}/>
                        <TxLog logs={logs}/>
                    </div>
                </div>

                <footer className="footer">
                    <div className="footer-content">
                        <span>{curNet.name}</span>
                        <span className="footer-divider">·</span>
                        <span>Contract: <CopyBtn text={CONTRACT_ADDRESS} className="footer-link">{CONTRACT_ADDRESS.slice(0, 6)}...{CONTRACT_ADDRESS.slice(-4)}</CopyBtn></span>
                        <span className="footer-divider">·</span>
                        <span>Registry: <CopyBtn text={REGISTRY_ADDRESS} className="footer-link">{REGISTRY_ADDRESS.slice(0, 6)}...{REGISTRY_ADDRESS.slice(-4)}</CopyBtn></span>
                        <span className="footer-divider">·</span>
                        <a href={EXPLORER_BASE} target="_blank" rel="noopener noreferrer" className="footer-link">OKLink Explorer ↗</a>
                    </div>
                </footer>
            </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
