<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProofPayX - Trustless AI Payments</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cyan: #22d3ee;
            --cyan-dim: rgba(34,211,238,0.12);
            --cyan-border: rgba(34,211,238,0.3);
            --blue: #3b82f6;
            --amber: #f59e0b;
            --border: rgba(255,255,255,0.07);
            --text-1: #f1f5f9;
            --text-2: #94a3b8;
            --text-3: #475569;
            --bg: #06070d;
            --card-bg: rgba(18,18,26,0.97);
            --input-bg: rgba(0,0,0,0.45);
            --input-border: rgba(255,255,255,0.09);
            --log-bg: rgba(0,0,0,0.38);
            --toast-bg: rgba(10,10,18,0.98);
            --agent-bg: rgba(28,28,40,0.8);
            --history-bg: rgba(255,255,255,0.04);
        }
        .light {
            --border: rgba(0,0,0,0.08);
            --text-1: #0f172a; --text-2: #475569; --text-3: #94a3b8;
            --bg: #eef2ff;
            --card-bg: rgba(255,255,255,0.96);
            --input-bg: rgba(255,255,255,0.85); --input-border: rgba(0,0,0,0.1);
            --log-bg: rgba(248,250,252,0.95); --toast-bg: rgba(255,255,255,0.99);
            --agent-bg: rgba(241,245,249,0.9);
            --cyan-dim: rgba(34,211,238,0.07);
            --history-bg: rgba(0,0,0,0.03);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--text-1);
            min-height: 100vh; overflow-x: hidden;
            transition: background 0.35s ease, color 0.35s ease;
        }

        /* ── Aurora ── */
        .aurora {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none; overflow: hidden; will-change: transform;
            transition: opacity 0.5s ease;
        }
        .light .aurora { opacity: 0.12; }
        .aurora-strip {
            position: absolute; inset: -10px; opacity: 0.48; filter: blur(8px);
            background-image:
                repeating-linear-gradient(100deg,#06070d 0%,#06070d 7%,transparent 10%,transparent 12%,#06070d 16%),
                repeating-linear-gradient(100deg,#1d4ed8 10%,#a5b4fc 15%,#93c5fd 20%,#ddd6fe 25%,#60a5fa 30%);
            background-size: 300%, 200%; background-position: 50% 50%, 50% 50%;
            will-change: background-position; animation: aurora-move 60s linear infinite;
        }
        .aurora-mask { position:absolute;inset:0;background:radial-gradient(ellipse at 80% 10%,transparent 20%,#06070d 75%); }
        .aurora-blob {
            position:absolute;border-radius:50%;filter:blur(55px);opacity:0.22;
            will-change:transform;animation:drift 20s ease-in-out infinite alternate;
        }
        .aurora-blob:nth-child(1){width:520px;height:520px;background:#1d4ed8;top:-160px;left:-90px;}
        .aurora-blob:nth-child(2){width:420px;height:420px;background:#0e7490;top:70px;right:-90px;animation-delay:-7s;}
        .aurora-blob:nth-child(3){width:340px;height:340px;background:#6d28d9;bottom:-50px;left:32%;animation-delay:-14s;}
        .aurora::after {
            content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
            background-image:radial-gradient(circle,rgba(255,255,255,0.028) 1px,transparent 1px);
            background-size:28px 28px;
        }
        @keyframes aurora-move{from{background-position:50% 50%,50% 50%;}to{background-position:350% 50%,350% 50%;}}
        @keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(38px,28px) scale(1.07);}}

        /* ── Splash ── */
        .splash {
            position:fixed;inset:0;z-index:100;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            background:#06070d;overflow:hidden;pointer-events:none;
            animation:splash-exit 0.9s cubic-bezier(0.4,0,0.2,1) 4.6s both;
        }
        .splash-aurora{position:absolute;inset:-10px;opacity:0.48;filter:blur(8px);background-image:repeating-linear-gradient(100deg,#06070d 0%,#06070d 7%,transparent 10%,transparent 12%,#06070d 16%),repeating-linear-gradient(100deg,#1d4ed8 10%,#a5b4fc 15%,#93c5fd 20%,#ddd6fe 25%,#60a5fa 30%);background-size:300%,200%;will-change:background-position;animation:aurora-move 60s linear infinite;}
        .splash-b1,.splash-b2,.splash-b3{position:absolute;border-radius:50%;filter:blur(55px);opacity:0.22;will-change:transform;animation:drift 20s ease-in-out infinite alternate;}
        .splash-b1{width:520px;height:520px;background:#1d4ed8;top:-160px;left:-90px;}
        .splash-b2{width:420px;height:420px;background:#0e7490;top:70px;right:-90px;animation-delay:-7s;}
        .splash-b3{width:340px;height:340px;background:#6d28d9;bottom:-50px;left:32%;animation-delay:-14s;}
        .splash-mask{position:absolute;inset:0;background:radial-gradient(ellipse at 80% 10%,transparent 20%,#06070d 75%);}
        .splash-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.028) 1px,transparent 1px);background-size:28px 28px;}

        .splash-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:1.1rem;text-align:center;padding:0 2rem;}

        /* Multilingual hello */
        .splash-hello{
            height:2.2rem;overflow:hidden;margin-bottom:0.2rem;
        }
        .splash-hello-inner{
            display:flex;flex-direction:column;align-items:center;
            animation:hello-cycle 4.2s ease-in-out both;
        }
        .splash-hello-word{
            height:2.2rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;
            font-size:1.1rem;font-weight:500;color:rgba(34,211,238,0.7);letter-spacing:0.06em;
        }
        @keyframes hello-cycle{
            0%   {transform:translateY(0);}
            12%  {transform:translateY(-2.2rem);}
            24%  {transform:translateY(-4.4rem);}
            36%  {transform:translateY(-6.6rem);}
            48%  {transform:translateY(-8.8rem);}
            60%  {transform:translateY(-11rem);}
            72%  {transform:translateY(-13.2rem);}
            88%,100%{transform:translateY(-15.4rem);}
        }

        .splash-logo{opacity:0;transform:scale(0.5);animation:splash-pop 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.4s both;}
        .splash-badge{
            width:88px;height:88px;border-radius:24px;
            background:linear-gradient(135deg,rgba(34,211,238,0.13),rgba(59,130,246,0.13));
            border:1.5px solid rgba(34,211,238,0.36);
            display:flex;align-items:center;justify-content:center;
            animation:badge-glow 2.4s ease-in-out 1.2s infinite alternate;
        }
        @keyframes badge-glow{from{box-shadow:0 0 24px rgba(34,211,238,0.12);}to{box-shadow:0 0 56px rgba(34,211,238,0.36),0 0 90px rgba(59,130,246,0.16);}}
        .splash-name{opacity:0;transform:translateY(18px);animation:splash-up 0.55s ease 1s both;font-size:clamp(2.6rem,8vw,3.8rem);font-weight:700;letter-spacing:-0.03em;background:linear-gradient(90deg,#22d3ee,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .splash-tag{opacity:0;transform:translateY(12px);animation:splash-up 0.5s ease 1.45s both;font-size:clamp(0.82rem,2.5vw,1rem);color:#94a3b8;}
        .splash-tag em{color:#22d3ee;font-style:normal;font-weight:600;}
        .splash-bar{opacity:0;animation:splash-up 0.4s ease 1.9s both;width:140px;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:0.2rem;}
        .splash-fill{height:100%;width:0;background:linear-gradient(90deg,#22d3ee,#3b82f6);border-radius:2px;animation:fill-bar 2.5s cubic-bezier(0.4,0,0.2,1) 2s both;}

        @keyframes splash-pop{from{opacity:0;transform:scale(0.45);}to{opacity:1;transform:scale(1);}}
        @keyframes splash-up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fill-bar{from{width:0;}to{width:100%;}}
        @keyframes splash-exit{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.06);visibility:hidden;}}

        /* ── App ── */
        .app{position:relative;z-index:10;max-width:1180px;margin:0 auto;padding:1.5rem;opacity:0;animation:app-in 0.55s ease 5.2s both;}
        @keyframes app-in{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

        /* ── Topbar ── */
        .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.6rem;flex-wrap:wrap;gap:0.75rem;}
        .logo-row{display:inline-flex;align-items:center;gap:0.7rem;}
        .logo-badge{
            width:42px;height:42px;border-radius:11px;flex-shrink:0;
            background:linear-gradient(135deg,rgba(34,211,238,0.14),rgba(59,130,246,0.14));
            border:1px solid var(--cyan-border);
            display:flex;align-items:center;justify-content:center;
        }
        h1{font-size:clamp(1.4rem,3.5vw,1.9rem);font-weight:700;letter-spacing:-0.022em;background:linear-gradient(90deg,#22d3ee,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .tagline{font-size:0.74rem;color:var(--text-2);margin-top:1px;}
        .tagline em{color:var(--cyan);font-style:normal;font-weight:600;}
        .topbar-right{display:flex;align-items:center;gap:0.55rem;flex-wrap:wrap;}

        /* ── Net switcher ── */
        .net-select{
            display:inline-flex;align-items:center;gap:0.38rem;
            padding:0.38rem 0.72rem;
            background:var(--card-bg);border:1px solid var(--border);
            border-radius:999px;cursor:pointer;font-family:inherit;font-size:0.76rem;
            color:var(--text-2);transition:border-color 0.15s,color 0.15s;position:relative;
            user-select:none;
        }
        .net-select:hover{border-color:var(--cyan-border);color:var(--text-1);}
        .net-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:dot-pulse 2s ease-in-out infinite;}
        @keyframes dot-pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
        .net-dropdown{
            position:absolute;top:calc(100% + 6px);right:0;
            background:var(--card-bg);border:1px solid var(--border);
            border-radius:12px;padding:0.35rem;min-width:185px;z-index:200;
            box-shadow:0 14px 36px rgba(0,0,0,0.28);animation:pop-in 0.15s ease both;
        }
        @keyframes pop-in{from{opacity:0;transform:translateY(-6px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
        .net-opt{
            display:flex;align-items:center;gap:0.48rem;padding:0.46rem 0.58rem;
            border-radius:8px;cursor:pointer;font-size:0.78rem;color:var(--text-2);
            transition:background 0.12s,color 0.12s;
        }
        .net-opt:hover{background:var(--agent-bg);color:var(--text-1);}
        .net-opt.active{color:var(--cyan);font-weight:600;}
        .net-opt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

        /* ── Theme btn ── */
        .theme-btn{
            width:32px;height:32px;border-radius:50%;
            background:var(--card-bg);border:1px solid var(--border);
            display:flex;align-items:center;justify-content:center;cursor:pointer;
            color:var(--text-2);transition:border-color 0.15s,color 0.15s,transform 0.25s;
        }
        .theme-btn:hover{border-color:var(--cyan-border);color:var(--cyan);transform:rotate(22deg);}
        .theme-btn svg{width:14px;height:14px;}

        /* ── Wallet ── */
        .wallet-bar{display:flex;justify-content:center;margin-bottom:1.4rem;}
        .btn-wallet{
            display:inline-flex;align-items:center;gap:0.48rem;padding:0.58rem 1.2rem;
            background:linear-gradient(90deg,#0891b2,#2563eb);
            color:#fff;border:none;border-radius:999px;
            font-family:inherit;font-weight:600;font-size:0.86rem;cursor:pointer;
            transition:transform 0.15s,box-shadow 0.15s;will-change:transform;
        }
        .btn-wallet:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(6,182,212,0.33);}
        .wallet-info{display:flex;align-items:center;gap:0.55rem;flex-wrap:wrap;justify-content:center;}
        .wallet-pill{
            display:inline-flex;align-items:center;gap:0.38rem;padding:0.38rem 0.82rem;
            background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.28);
            border-radius:999px;color:#34d399;
            font-family:'JetBrains Mono',monospace;font-size:0.76rem;cursor:pointer;
            transition:background 0.15s;
        }
        .wallet-pill:hover{background:rgba(16,185,129,0.17);}
        .btn-disconnect{
            padding:0.38rem 0.82rem;background:transparent;font-family:inherit;
            border:1px solid rgba(239,68,68,0.28);color:#f87171;
            border-radius:999px;cursor:pointer;font-size:0.78rem;transition:background 0.15s;
        }
        .btn-disconnect:hover{background:rgba(239,68,68,0.08);}

        /* ── Grid ── */
        .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
        @media(max-width:900px){.main-grid{grid-template-columns:1fr;}}
        .col{display:flex;flex-direction:column;gap:1rem;}

        /* ── Card ── */
        .card{
            background:var(--card-bg);border:1px solid var(--border);
            border-radius:15px;padding:1.2rem;
            animation:card-in 0.5s ease both;contain:layout style;
            transition:background 0.3s,border-color 0.3s;
        }
        @keyframes card-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.95rem;}
        .card-head-left{display:flex;align-items:center;gap:0.42rem;font-size:0.88rem;font-weight:600;color:var(--text-1);}
        .card-head-left svg{width:15px;height:15px;color:var(--cyan);flex-shrink:0;}
        .card-head-right{font-size:0.62rem;color:var(--text-3);font-family:'JetBrains Mono',monospace;}

        /* ── Agent grid ── */
        .agent-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0.55rem;}
        @media(max-width:480px){.agent-grid{grid-template-columns:1fr;}}

        .agent-tile{
            background:var(--agent-bg);border:1.5px solid var(--border);
            border-radius:11px;padding:0.68rem;cursor:pointer;
            min-width:0;overflow:hidden; /* fix: prevents content blowout */
            position:relative;
            transition:border-color 0.15s,box-shadow 0.15s,background 0.15s;
            will-change:transform;
        }
        .agent-tile:hover{border-color:var(--cyan-border);box-shadow:0 5px 18px rgba(34,211,238,0.07);}
        .agent-tile.active{border-color:var(--cyan);background:var(--cyan-dim);box-shadow:0 0 0 3px rgba(34,211,238,0.1);}
        .agent-tile.active::after{
            content:"✓";position:absolute;top:5px;right:5px;
            width:15px;height:15px;line-height:15px;text-align:center;
            background:var(--cyan);color:#06070d;border-radius:50%;font-size:8px;font-weight:700;
        }
        .agent-icon-wrap{
            width:28px;height:28px;flex-shrink:0;
            background:linear-gradient(135deg,rgba(34,211,238,0.17),rgba(59,130,246,0.17));
            border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:0.42rem;
        }
        .agent-icon-wrap svg{width:13px;height:13px;color:var(--cyan);}
        .agent-name{font-size:0.7rem;font-weight:600;color:var(--text-1);margin-bottom:0.1rem;
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .agent-price{font-size:0.62rem;color:var(--cyan);font-weight:500;margin-bottom:0.28rem;}
        .rep-row{display:flex;align-items:center;gap:0.28rem;margin-bottom:0.22rem;}
        .stars{display:flex;gap:1px;}
        .star{width:7px;height:7px;}
        .star.full path{fill:var(--amber);}
        .star.empty path{fill:rgba(128,128,128,0.22);}
        .rep-score{font-size:0.58rem;color:var(--text-2);font-family:'JetBrains Mono',monospace;}
        .conf-bar-wrap{display:flex;align-items:center;gap:0.28rem;}
        .conf-label{font-size:0.54rem;color:var(--text-3);white-space:nowrap;flex-shrink:0;}
        .conf-bar-bg{flex:1;min-width:0;height:2.5px;background:rgba(128,128,128,0.14);border-radius:2px;overflow:hidden;}
        .conf-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--blue));}

        /* FIXED: address truncation */
        .agent-addr{
            font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:var(--text-3);
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
            width:100%;max-width:100%;display:block;
            margin-top:0.26rem;cursor:pointer;transition:color 0.15s;
        }
        .agent-addr:hover{color:var(--cyan);}

        /* ── Form ── */
        .form-group{margin-bottom:0.78rem;}
        .form-label{display:block;font-size:0.71rem;color:var(--text-2);margin-bottom:0.26rem;font-weight:500;}
        .form-input{
            width:100%;padding:0.56rem 0.78rem;
            background:var(--input-bg);border:1px solid var(--input-border);
            border-radius:8px;color:var(--text-1);font-size:0.82rem;
            transition:border-color 0.15s,box-shadow 0.15s;font-family:inherit;
        }
        .form-input:focus{outline:none;border-color:rgba(34,211,238,0.48);box-shadow:0 0 0 3px rgba(34,211,238,0.07);}
        .form-input::placeholder{color:var(--text-3);}
        textarea.form-input{resize:vertical;min-height:66px;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.72rem;}
        @media(max-width:480px){.form-row{grid-template-columns:1fr;}}

        /* ── Payout preview ── */
        .payout-preview{
            background:linear-gradient(135deg,rgba(6,182,212,0.05),rgba(59,130,246,0.05));
            border:1px solid rgba(34,211,238,0.13);border-radius:10px;
            padding:0.78rem 0.88rem;margin-bottom:0.78rem;
            transition:border-color 0.25s,background 0.25s;
        }
        .payout-preview.live{border-color:rgba(34,211,238,0.36);background:linear-gradient(135deg,rgba(6,182,212,0.08),rgba(59,130,246,0.08));}
        .payout-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.38rem;}
        .payout-row:last-child{margin-bottom:0;}
        .payout-key{font-size:0.68rem;color:var(--text-2);}
        .payout-val{font-size:0.72rem;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text-1);}
        .payout-val.accent{color:var(--cyan);}
        .payout-val.ok{color:#34d399;}
        .payout-val.warn{color:var(--amber);}
        .conf-track-wrap{margin-top:0.48rem;}
        .conf-track-labels{display:flex;justify-content:space-between;font-size:0.62rem;color:var(--text-2);margin-bottom:0.26rem;}
        .conf-track{height:4px;background:rgba(128,128,128,0.11);border-radius:3px;position:relative;overflow:hidden;}
        .conf-track-fill{height:100%;border-radius:3px;transition:width 0.35s ease,background 0.35s ease;}
        .conf-marker{position:absolute;top:-2px;width:2px;height:8px;background:rgba(245,158,11,0.65);border-radius:1px;transition:left 0.35s ease;}
        .payout-note{font-size:0.6rem;color:var(--text-3);margin-top:0.38rem;text-align:center;}

        /* ── Buttons ── */
        .btn-primary{
            width:100%;padding:0.72rem;
            background:linear-gradient(90deg,#0891b2,#2563eb);
            color:#fff;border:none;border-radius:9px;
            font-family:inherit;font-weight:600;font-size:0.84rem;cursor:pointer;
            display:flex;align-items:center;justify-content:center;gap:0.42rem;
            margin-top:0.32rem;transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;
            position:relative;overflow:hidden;will-change:transform;
        }
        .btn-primary::after{
            content:'';position:absolute;inset:0;
            background:linear-gradient(90deg,rgba(255,255,255,0.07),transparent);
            opacity:0;transition:opacity 0.2s;
        }
        .btn-primary:hover:not(:disabled)::after{opacity:1;}
        .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 22px rgba(6,182,212,0.26);}
        .btn-primary:disabled{opacity:0.36;cursor:not-allowed;}
        .btn-verify{background:linear-gradient(90deg,#059669,#0891b2);}
        .btn-verify:hover:not(:disabled){box-shadow:0 8px 22px rgba(16,185,129,0.26);}
        .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.28);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
        @keyframes spin{to{transform:rotate(360deg);}}

        /* ── Success blast ── */
        .success-blast{
            display:flex;flex-direction:column;align-items:center;gap:0.42rem;padding:0.95rem;
            background:linear-gradient(135deg,rgba(16,185,129,0.07),rgba(6,182,212,0.05));
            border:1px solid rgba(16,185,129,0.28);border-radius:9px;
            margin-top:0.32rem;animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .blast-icon{
            width:34px;height:34px;border-radius:50%;
            background:linear-gradient(135deg,#059669,#06b6d4);
            display:flex;align-items:center;justify-content:center;
            animation:pulse-ring 1.6s ease-out infinite;
        }
        @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(16,185,129,0.48);}70%{box-shadow:0 0 0 10px rgba(16,185,129,0);}100%{box-shadow:0 0 0 0 rgba(16,185,129,0);}}
        .blast-title{font-size:0.83rem;font-weight:700;color:#34d399;}
        .blast-sub{font-size:0.66rem;color:var(--text-2);text-align:center;}
        .status-error{
            display:flex;align-items:center;gap:0.42rem;padding:0.66rem 0.82rem;
            background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);
            border-radius:8px;color:#f87171;font-size:0.78rem;margin-top:0.32rem;
        }

        /* ── TX pill ── */
        .tx-pill{
            display:flex;align-items:center;justify-content:space-between;
            padding:0.42rem 0.68rem;margin-top:0.55rem;
            background:var(--log-bg);border:1px solid var(--border);
            border-radius:7px;font-family:'JetBrains Mono',monospace;
            font-size:0.58rem;color:var(--text-3);cursor:pointer;
            transition:border-color 0.15s,color 0.15s;min-width:0;
        }
        .tx-pill:hover{border-color:var(--cyan-border);color:var(--cyan);}
        .tx-pill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
        .copy-icon{width:10px;height:10px;flex-shrink:0;margin-left:6px;}

        /* ── Copy btn ── */
        .copy-btn-inline{cursor:pointer;display:inline-flex;align-items:center;gap:3px;transition:color 0.15s;}
        .copy-btn-inline:hover{color:var(--cyan);}

        /* ── History ── */
        .history-list{display:flex;flex-direction:column;gap:0.46rem;max-height:240px;overflow-y:auto;}
        .history-list::-webkit-scrollbar{width:3px;}
        .history-list::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.18);border-radius:2px;}
        .history-empty{text-align:center;color:var(--text-3);padding:1.4rem;font-size:0.78rem;}
        .h-item{
            display:flex;align-items:center;gap:0.46rem;
            padding:0.52rem 0.7rem;background:var(--history-bg);
            border:1px solid var(--border);border-radius:9px;
            transition:border-color 0.15s;min-width:0;overflow:hidden;
        }
        .h-item:hover{border-color:rgba(128,128,128,0.18);}
        .h-left{display:flex;flex-direction:column;gap:0.12rem;min-width:0;flex:1;overflow:hidden;}
        .h-id{font-size:0.72rem;font-weight:600;color:var(--text-1);}
        .h-agent{font-size:0.62rem;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .h-meta{font-size:0.58rem;color:var(--text-3);font-family:'JetBrains Mono',monospace;}
        .h-right{display:flex;align-items:center;gap:0.42rem;flex-shrink:0;}
        .h-amount{font-size:0.68rem;font-weight:600;color:var(--cyan);font-family:'JetBrains Mono',monospace;}
        .h-status{font-size:0.58rem;font-weight:600;padding:0.16rem 0.46rem;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;}
        .h-status.pending{background:rgba(245,158,11,0.11);color:#fbbf24;border:1px solid rgba(245,158,11,0.22);}
        .h-status.released{background:rgba(16,185,129,0.11);color:#34d399;border:1px solid rgba(16,185,129,0.22);}
        .h-status.refunded{background:rgba(239,68,68,0.09);color:#f87171;border:1px solid rgba(239,68,68,0.2);}
        .h-actions{display:flex;align-items:center;gap:0.3rem;flex-shrink:0;}
        .h-btn{background:none;border:none;cursor:pointer;color:var(--text-3);padding:2px;display:flex;align-items:center;transition:color 0.15s;}
        .h-btn:hover{color:var(--cyan);}
        .h-btn svg{width:11px;height:11px;}

        /* ── Log ── */
        .log-box{max-height:165px;overflow-y:auto;background:var(--log-bg);border:1px solid var(--border);border-radius:9px;padding:0.72rem;}
        .log-box::-webkit-scrollbar{width:3px;}
        .log-box::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.18);border-radius:2px;}
        .log-item{font-size:0.7rem;padding:0.26rem 0;border-bottom:1px solid rgba(128,128,128,0.055);display:flex;align-items:baseline;gap:0.28rem;flex-wrap:wrap;min-width:0;}
        .log-item:last-child{border-bottom:none;}
        .log-t{color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:0.6rem;flex-shrink:0;}
        .log-m{color:var(--text-2);word-break:break-all;}
        .log-m.ok{color:#34d399;}
        .log-m.fail{color:#f87171;}
        .log-link{color:var(--cyan);text-decoration:underline;font-size:0.6rem;flex-shrink:0;}
        .log-empty{text-align:center;color:var(--text-3);padding:1.2rem;font-size:0.78rem;}

        /* ── Loading skeleton ── */
        .agent-skeleton{
            background:var(--agent-bg);border:1.5px solid var(--border);
            border-radius:11px;padding:0.68rem;overflow:hidden;position:relative;
        }
        .agent-skeleton::after{
            content:'';position:absolute;inset:0;
            background:linear-gradient(90deg,transparent 20%,rgba(255,255,255,0.04) 50%,transparent 80%);
            animation:shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
        .skel-line{background:rgba(255,255,255,0.06);border-radius:4px;margin-bottom:0.5rem;}

        /* ── Toast ── */
        .toasts{position:fixed;top:1rem;right:1rem;z-index:999;display:flex;flex-direction:column;gap:0.42rem;}
        .toast{
            padding:0.72rem 0.95rem;background:var(--toast-bg);border:1px solid var(--border);border-radius:11px;
            display:flex;align-items:center;gap:0.58rem;
            box-shadow:0 12px 30px rgba(0,0,0,0.22);max-width:310px;
            animation:slide-right 0.22s ease both;
        }
        @keyframes slide-right{from{opacity:0;transform:translateX(46px);}to{opacity:1;transform:translateX(0);}}
        .toast.ok{border-color:rgba(16,185,129,0.28);}
        .toast.err{border-color:rgba(239,68,68,0.28);}
        .toast svg{width:14px;height:14px;flex-shrink:0;}
        .toast.ok svg{color:#34d399;}
        .toast.err svg{color:#f87171;}
        .toast span{font-size:0.78rem;color:var(--text-1);}

        /* ── Footer ── */
        .footer{text-align:center;color:var(--text-3);font-size:0.68rem;padding:1.4rem 0 0.9rem;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:0.5rem;}

        /* ── Misc animations ── */
        @keyframes popIn{from{opacity:0;transform:scale(0.88);}to{opacity:1;transform:scale(1);}}

        /* ── Mobile ── */
        @media(max-width:640px){
            .app{padding:0.9rem 0.8rem;}
            .topbar{flex-direction:column;align-items:flex-start;gap:0.55rem;}
            .topbar-right{width:100%;justify-content:space-between;}
            h1{font-size:1.5rem;}
            .card{padding:0.95rem;border-radius:13px;}
            .main-grid{gap:0.85rem;}
            .agent-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:0.4rem;}
            .history-list{max-height:210px;}
            .toasts{top:0.5rem;right:0.5rem;left:0.5rem;}
            .toast{max-width:100%;}
        }
        @media(max-width:360px){.agent-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const CONTRACT_ADDRESS = "0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6";
const CONTRACT_ABI = [
    "function createEscrow(address _agent, bytes32 _hashlock, uint8 _minConfidence, uint256 _durationSeconds) external payable returns (uint256)",
    "function verifyAndRelease(uint256 _id, bytes memory _proof, uint8 _confidence) external",
    "function escrowCounter() view returns (uint256)"
];

const REGISTRY_ADDRESS = "0x2b63B3c363b29B82E09d036167Ac212d4c7026d5";
const REGISTRY_ABI = [
    "function getActiveAgents() view returns ((address agentAddress, string name, string description, uint256 price, bool isActive, uint256 registeredAt)[])"
];

const NETWORKS = [
    { id:'xlayer-test', name:'X Layer Testnet', color:'#22d3ee', explorer:'https://www.okx.com/web3/explorer/xlayer-testnet/tx/' },
    { id:'sepolia',     name:'Sepolia',         color:'#a78bfa', explorer:'https://sepolia.etherscan.io/tx/' },
    { id:'mumbai',      name:'Polygon Mumbai',  color:'#8b5cf6', explorer:'https://mumbai.polygonscan.com/tx/' },
    { id:'bnb-test',    name:'BNB Testnet',     color:'#f59e0b', explorer:'https://testnet.bscscan.com/tx/' },
];

const FALLBACK_AGENTS = [
    { name:"ETH Predictor",  price:"0.01",  symbol:"OKB", address:"0x04b772f0cf69f45956061100d14bc5417b9ba3eb", reputation:4.8, confidence:91, placeholder:'e.g. ETH price prediction: 3500',      Icon:()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> },
    { name:"Sentiment",      price:"0.005", symbol:"OKB", address:"0x04b772f0cf69f45956061100d14bc5417b9ba3eb", reputation:4.5, confidence:83, placeholder:'e.g. Market sentiment: BULLISH (0.78)', Icon:()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg> },
    { name:"Code Auditor",   price:"0.02",  symbol:"OKB", address:"0x04b772f0cf69f45956061100d14bc5417b9ba3eb", reputation:4.9, confidence:96, placeholder:'e.g. Audit result: PASS — 0 criticals',  Icon:()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> },
];

const HELLOS = ["Hello","مرحبا","नमस्ते","こんにちは","안녕하세요","Hallo","Bonjour","مرحبا"];

/* ── useCopy ── */
function useCopy(timeout = 1800) {
    const [copied, setCopied] = useState(false);
    const copy = useCallback(text => {
        navigator.clipboard.writeText(text).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), timeout);
        }).catch(() => {});
    }, [timeout]);
    return [copied, copy];
}

/* ── CopyBtn ── */
function CopyBtn({ text, children, className='', style={} }) {
    const [copied, copy] = useCopy();
    return (
        <span className={`copy-btn-inline ${className}`} style={{color: copied ? '#34d399' : 'inherit', ...style}}
              onClick={e => { e.stopPropagation(); copy(text); }} title={copied ? 'Copied!' : 'Copy'}>
            {children}
            <svg className="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                {copied
                    ? <polyline points="20 6 9 17 4 12"/>
                    : <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>
                }
            </svg>
        </span>
    );
}

/* ── Stars ── */
function Stars({ score }) {
    return (
        <div className="stars">
            {[1,2,3,4,5].map(i => (
                <svg key={i} className={`star ${score >= i ? 'full' : 'empty'}`} viewBox="0 0 12 12">
                    <path d="M6 1l1.3 3.9H11L8.2 7.1l1 3.8L6 8.7l-3.2 2.2 1-3.8L1 4.9h3.7z" strokeWidth="0"/>
                </svg>
            ))}
        </div>
    );
}

/* ── Toast ── */
function Toast({ message, type, onClose }) {
    useEffect(() => { const t = setTimeout(onClose, 5000); return () => clearTimeout(t); }, [onClose]);
    return (
        <div className={`toast ${type === 'success' ? 'ok' : 'err'}`}>
            {type === 'success'
                ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            }
            <span>{message}</span>
        </div>
    );
}

/* ── Splash ── */
function Splash() {
    return (
        <div className="splash">
            <div className="splash-aurora"/>
            <div className="splash-b1"/><div className="splash-b2"/><div className="splash-b3"/>
            <div className="splash-mask"/><div className="splash-dots"/>
            <div className="splash-content">
                {/* Cycling hello words */}
                <div className="splash-hello">
                    <div className="splash-hello-inner">
                        {[...HELLOS, HELLOS[0]].map((w, i) => (
                            <div key={i} className="splash-hello-word">{w}</div>
                        ))}
                    </div>
                </div>
                <div className="splash-logo">
                    <div className="splash-badge">
                        <svg width="46" height="46" viewBox="0 0 34 34" fill="none">
                            <defs><linearGradient id="splg" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop stopColor="#22d3ee"/><stop offset="1" stopColor="#3b82f6"/></linearGradient></defs>
                            <path d="M17 2L4 7.5V17c0 6.6 5.6 12.8 13 14.5C24.4 29.8 30 23.6 30 17V7.5L17 2z" fill="url(#splg)" fillOpacity="0.22" stroke="url(#splg)" strokeWidth="1.4" strokeLinejoin="round"/>
                            <circle cx="17" cy="17" r="2.5" fill="#22d3ee"/>
                            <line x1="17" y1="10.5" x2="17" y2="14.5" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                            <line x1="17" y1="19.5" x2="17" y2="23.5" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                            <line x1="10.5" y1="17" x2="14.5" y2="17" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                            <line x1="19.5" y1="17" x2="23.5" y2="17" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                        </svg>
                    </div>
                </div>
                <div className="splash-name">ProofPayX</div>
                <div className="splash-tag">Stripe for AI agents — but <em>trustless</em></div>
                <div className="splash-bar"><div className="splash-fill"/></div>
            </div>
        </div>
    );
}

/* ── NetSwitcher ── */
function NetSwitcher({ network, setNetwork }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
        const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
    }, []);
    const cur = NETWORKS.find(n => n.id === network) || NETWORKS[0];
    return (
        <div ref={ref} className="net-select" onClick={() => setOpen(o => !o)}>
            <span className="net-dot" style={{background: cur.color}}/>
            <span>{cur.name}</span>
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{marginLeft:2,transform: open ? 'rotate(180deg)' : 'none', transition:'transform 0.2s'}}><polyline points="6 9 12 15 18 9"/></svg>
            {open && (
                <div className="net-dropdown" onClick={e => e.stopPropagation()}>
                    {NETWORKS.map(n => (
                        <div key={n.id} className={`net-opt ${network === n.id ? 'active' : ''}`}
                             onClick={() => { setNetwork(n.id); setOpen(false); }}>
                            <span className="net-opt-dot" style={{background: n.color}}/>
                            {n.name}
                            {network === n.id && <svg style={{marginLeft:'auto',width:11,height:11}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>}
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

/* ── ThemeBtn ── */
function ThemeBtn({ dark, toggle }) {
    return (
        <button className="theme-btn" onClick={toggle} title={dark ? 'Light mode' : 'Dark mode'}>
            {dark
                ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            }
        </button>
    );
}

/* ── PayoutPreview ── */
function PayoutPreview({ amount, minConf, agentConf }) {
    const amt = parseFloat(amount) || 0;
    const minPct = parseInt(minConf) || 80;
    const histPct = agentConf || 88;
    const ok = histPct >= minPct;
    const fillColor = ok ? 'linear-gradient(90deg,#10b981,#06b6d4)' : 'linear-gradient(90deg,#f59e0b,#ef4444)';
    return (
        <div className={`payout-preview${amt > 0 ? ' live' : ''}`}>
            <div className="payout-row"><span className="payout-key">Locked amount</span><span className="payout-val accent">{amt > 0 ? `${amt} OKB` : '—'}</span></div>
            <div className="payout-row"><span className="payout-key">Min confidence</span><span className="payout-val">{minPct}%</span></div>
            <div className="payout-row"><span className="payout-key">Agent avg confidence</span><span className={`payout-val ${ok?'ok':'warn'}`}>{histPct}%</span></div>
            <div className="payout-row"><span className="payout-key">Expected payout</span><span className={`payout-val ${ok?'ok':'warn'}`}>{amt > 0 ? (ok ? `${amt} OKB ✓` : 'Refunded') : '—'}</span></div>
            <div className="conf-track-wrap">
                <div className="conf-track-labels"><span>Confidence history</span><span>{histPct}%</span></div>
                <div className="conf-track">
                    <div className="conf-track-fill" style={{width:`${histPct}%`,background:fillColor}}/>
                    <div className="conf-marker" style={{left:`${minPct}%`}}/>
                </div>
            </div>
            <div className="payout-note">{ok ? `Agent meets your ${minPct}% threshold — payout likely` : `Agent avg (${histPct}%) below threshold — may refund`}</div>
        </div>
    );
}

/* ── AgentTile ── */
function AgentTile({ agent, isSelected, onClick }) {
    return (
        <div className={`agent-tile${isSelected ? ' active' : ''}`} onClick={onClick}>
            <div className="agent-icon-wrap"><agent.Icon/></div>
            <div className="agent-name" title={agent.name}>{agent.name}</div>
            <div className="agent-price">{agent.price} {agent.symbol}</div>
            <div className="rep-row"><Stars score={agent.reputation}/><span className="rep-score">{agent.reputation}</span></div>
            <div className="conf-bar-wrap">
                <span className="conf-label">Conf.</span>
                <div className="conf-bar-bg"><div className="conf-bar-fill" style={{width:`${agent.confidence}%`}}/></div>
                <span className="conf-label">{agent.confidence}%</span>
            </div>
            {/* FIXED: address is display:block width:100% with overflow hidden */}
            <CopyBtn text={agent.address} className="agent-addr" style={{display:'block',width:'100%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'JetBrains Mono',monospace",fontSize:'0.5rem',color:'var(--text-3)',marginTop:'0.26rem'}}>
                {agent.address}
            </CopyBtn>
        </div>
    );
}

/* ── AgentSkeleton ── */
function AgentSkeleton() {
    return (
        <div className="agent-skeleton">
            <div className="skel-line" style={{width:'28px',height:'28px',borderRadius:'7px',marginBottom:'0.42rem'}}/>
            <div className="skel-line" style={{width:'70%',height:'9px'}}/>
            <div className="skel-line" style={{width:'50%',height:'8px'}}/>
            <div className="skel-line" style={{width:'90%',height:'6px'}}/>
        </div>
    );
}

/* ── EscrowHistory ── */
function EscrowHistory({ history, network }) {
    const net = NETWORKS.find(n => n.id === network) || NETWORKS[0];
    return (
        <div className="card">
            <div className="card-head">
                <div className="card-head-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Escrow History
                </div>
                <span className="card-head-right">{history.length} record{history.length !== 1 ? 's' : ''}</span>
            </div>
            <div className="history-list">
                {history.length === 0
                    ? <div className="history-empty">No escrows yet. Create one to get started.</div>
                    : history.map((h, i) => (
                        <div key={i} className="h-item">
                            <div className="h-left">
                                <span className="h-id">Escrow #{h.id}</span>
                                <span className="h-agent">{h.agent}</span>
                                <span className="h-meta">{h.time} · {h.minConf}% conf</span>
                            </div>
                            <div className="h-right">
                                <span className="h-amount">{h.amount}</span>
                                <span className={`h-status ${h.status}`}>{h.status}</span>
                                <div className="h-actions">
                                    {h.txHash && (
                                        <a className="h-btn" href={`${net.explorer}${h.txHash}`} target="_blank" rel="noopener noreferrer" title="View on explorer">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                                        </a>
                                    )}
                                    <CopyBtn text={h.txHash || String(h.id)} className="h-btn" title="Copy">
                                        <span style={{display:'none'}}/>
                                    </CopyBtn>
                                </div>
                            </div>
                        </div>
                    ))
                }
            </div>
        </div>
    );
}

/* ── EscrowForm ── */
function EscrowForm({ contract, onSuccess, onLog, selectedAgent, addToast }) {
    const [agentAddr, setAgentAddr] = useState('');
    const [amount, setAmount]       = useState('');
    const [minConf, setMinConf]     = useState('80');
    const [result, setResult]       = useState('');
    const [loading, setLoading]     = useState(false);
    const [status, setStatus]       = useState('idle');
    const [txHash, setTxHash]       = useState('');
    const [escrowNum, setEscrowNum] = useState(null);
    const [copied, copy]            = useCopy();

    useEffect(() => {
        if (selectedAgent) { setAgentAddr(selectedAgent.address); setAmount(selectedAgent.price); }
    }, [selectedAgent]);

    const handleSubmit = async e => {
        e.preventDefault();
        if (!contract || !agentAddr || !amount || !result) return;
        setLoading(true); setStatus('processing'); onLog('Creating escrow transaction...');
        try {
            const hashlock = ethers.keccak256(ethers.toUtf8Bytes(result));
            const tx = await contract.createEscrow(agentAddr, hashlock, parseInt(minConf), 3600, { value: ethers.parseEther(amount) });
            setTxHash(tx.hash); onLog(`TX sent: ${tx.hash.slice(0,14)}...`, tx.hash);
            await tx.wait();
            const counter = await contract.escrowCounter();
            const id = Number(counter) - 1;
            setEscrowNum(id); setStatus('success');
            onLog(`SUCCESS Escrow #${id} created!`, tx.hash, true);
            addToast(`Escrow #${id} created!`, 'success');
            onSuccess({ id, agent: selectedAgent?.name || agentAddr.slice(0,8)+'...', amount: `${amount} OKB`, minConf, txHash: tx.hash, time: new Date().toLocaleTimeString(), status: 'pending' });
            setTimeout(() => { setStatus('idle'); setResult(''); setEscrowNum(null); setTxHash(''); }, 5000);
        } catch (err) {
            setStatus('error'); onLog(`FAILED: ${err.message}`, null, false, true);
            addToast(err.message || 'Failed', 'error');
            setTimeout(() => setStatus('idle'), 3000);
        } finally { setLoading(false); }
    };

    return (
        <div className="card">
            <div className="card-head">
                <div className="card-head-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/></svg>
                    Create Escrow
                </div>
            </div>
            <form onSubmit={handleSubmit}>
                <div className="form-group">
                    <label className="form-label">Agent Address</label>
                    <input type="text" className="form-input" value={agentAddr} onChange={e => setAgentAddr(e.target.value)} placeholder="0x..." />
                </div>
                <div className="form-row">
                    <div className="form-group">
                        <label className="form-label">Amount (OKB)</label>
                        <input type="number" step="0.001" className="form-input" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.01" />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Min Confidence %</label>
                        <input type="number" min="0" max="100" className="form-input" value={minConf} onChange={e => setMinConf(e.target.value)} placeholder="80" />
                    </div>
                </div>
                <PayoutPreview amount={amount} minConf={minConf} agentConf={selectedAgent?.confidence} />
                <div className="form-group">
                    <label className="form-label">Expected Result <span style={{color:'var(--text-3)',fontWeight:400}}>(hashed on-chain)</span></label>
                    <textarea className="form-input" value={result} onChange={e => setResult(e.target.value)} placeholder={selectedAgent?.placeholder || 'e.g. ETH price prediction: 3500'} rows="2" />
                </div>
                {status === 'success' && (
                    <div className="success-blast">
                        <div className="blast-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
                        <div className="blast-title">Escrow #{escrowNum} Created!</div>
                        <div className="blast-sub">Payment locked · Agent notified · Awaiting delivery</div>
                    </div>
                )}
                {status === 'error' && (
                    <div className="status-error">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        Transaction failed
                    </div>
                )}
                {(status === 'idle' || status === 'processing') && (
                    <button type="submit" className="btn-primary" disabled={loading || !contract || !agentAddr || !amount || !result}>
                        {loading
                            ? <><div className="spinner"/> Processing...</>
                            : <><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Lock Payment</>
                        }
                    </button>
                )}
                {txHash && (
                    <div className="tx-pill" onClick={() => copy(txHash)}>
                        <span>TX: {txHash.slice(0,20)}...{txHash.slice(-6)}</span>
                        <svg className="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{color: copied ? '#34d399' : 'currentColor'}}>
                            {copied ? <polyline points="20 6 9 17 4 12"/> : <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>}
                        </svg>
                    </div>
                )}
            </form>
        </div>
    );
}

/* ── VerifyForm ── */
function VerifyForm({ contract, onLog, addToast, onRelease }) {
    const [escrowId, setEscrowId] = useState('');
    const [actual, setActual]     = useState('');
    const [conf, setConf]         = useState('');
    const [loading, setLoading]   = useState(false);
    const [status, setStatus]     = useState('idle');
    const [txHash, setTxHash]     = useState('');
    const [copied, copy]          = useCopy();

    const handleSubmit = async e => {
        e.preventDefault();
        if (!contract || !escrowId || !actual || !conf) return;
        setLoading(true); setStatus('processing'); onLog(`Verifying escrow #${escrowId}...`);
        try {
            const tx = await contract.verifyAndRelease(parseInt(escrowId), ethers.toUtf8Bytes(actual), parseInt(conf));
            setTxHash(tx.hash); onLog(`Verification TX: ${tx.hash.slice(0,14)}...`, tx.hash);
            await tx.wait();
            setStatus('success');
            onLog(`SUCCESS Payment released for #${escrowId}!`, tx.hash, true);
            addToast(`Payment released for Escrow #${escrowId}!`, 'success');
            onRelease(parseInt(escrowId), tx.hash);
            setTimeout(() => { setStatus('idle'); setActual(''); setConf(''); setTxHash(''); }, 5000);
        } catch (err) {
            setStatus('error'); onLog(`FAILED: ${err.message}`, null, false, true);
            addToast(err.message || 'Verification failed', 'error');
            setTimeout(() => setStatus('idle'), 3000);
        } finally { setLoading(false); }
    };

    return (
        <div className="card">
            <div className="card-head">
                <div className="card-head-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
                    Verify and Release
                </div>
            </div>
            <form onSubmit={handleSubmit}>
                <div className="form-group">
                    <label className="form-label">Escrow ID</label>
                    <input type="number" className="form-input" value={escrowId} onChange={e => setEscrowId(e.target.value)} placeholder="0" />
                </div>
                <div className="form-group">
                    <label className="form-label">Actual Delivered Data</label>
                    <textarea className="form-input" value={actual} onChange={e => setActual(e.target.value)} placeholder="e.g. ETH price prediction: 3482 (delivered result)" rows="3" />
                </div>
                <div className="form-group">
                    <label className="form-label">Confidence %</label>
                    <input type="number" min="0" max="100" className="form-input" value={conf} onChange={e => setConf(e.target.value)} placeholder="85" />
                </div>
                {status === 'success' && (
                    <div className="success-blast">
                        <div className="blast-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
                        <div className="blast-title">Payment Released!</div>
                        <div className="blast-sub">Agent paid · Proof stored on-chain</div>
                    </div>
                )}
                {status === 'error' && (
                    <div className="status-error">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        Verification failed
                    </div>
                )}
                {(status === 'idle' || status === 'processing') && (
                    <button type="submit" className="btn-primary btn-verify" disabled={loading || !contract || !escrowId || !actual || !conf}>
                        {loading
                            ? <><div className="spinner"/> Verifying...</>
                            : <><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg> Verify and Release</>
                        }
                    </button>
                )}
                {txHash && (
                    <div className="tx-pill" onClick={() => copy(txHash)}>
                        <span>TX: {txHash.slice(0,20)}...{txHash.slice(-6)}</span>
                        <svg className="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{color: copied ? '#34d399' : 'currentColor'}}>
                            {copied ? <polyline points="20 6 9 17 4 12"/> : <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>}
                        </svg>
                    </div>
                )}
            </form>
        </div>
    );
}

/* ── TxLog ── */
function TxLog({ logs }) {
    return (
        <div className="card">
            <div className="card-head">
                <div className="card-head-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Transaction Log
                </div>
                <span className="card-head-right">{logs.length} events</span>
            </div>
            <div className="log-box">
                {logs.length === 0
                    ? <div className="log-empty">No transactions yet.</div>
                    : logs.map((l, i) => (
                        <div key={i} className="log-item">
                            <span className="log-t">[{l.time}]</span>
                            <span className={`log-m${l.success ? ' ok' : l.fail ? ' fail' : ''}`}>{l.message}</span>
                            {l.txHash && <a href={`https://www.okx.com/web3/explorer/xlayer-testnet/tx/${l.txHash}`} target="_blank" rel="noopener noreferrer" className="log-link">↗ TX</a>}
                        </div>
                    ))
                }
            </div>
        </div>
    );
}

/* ── App ── */
function App() {
    const [contract, setContract]     = useState(null);
    const [address, setAddress]       = useState('');
    const [selectedAgent, setAgent]   = useState(null);
    const [logs, setLogs]             = useState([]);
    const [toasts, setToasts]         = useState([]);
    const [history, setHistory]       = useState([]);
    const [network, setNetwork]       = useState('xlayer-test');
    const [dark, setDark]             = useState(true);
    const [agents, setAgents]         = useState(FALLBACK_AGENTS);
    const [loadingAgents, setLoading] = useState(false);

    useEffect(() => { document.body.classList.toggle('light', !dark); }, [dark]);

    const addToast    = useCallback((msg, type) => { const id = Date.now(); setToasts(p => [...p, {id,msg,type}]); }, []);
    const removeToast = useCallback(id => setToasts(p => p.filter(t => t.id !== id)), []);
    const addLog      = useCallback((message, txHash, success, fail) => {
        const time = new Date().toLocaleTimeString();
        setLogs(p => [{time, message, txHash, success, fail}, ...p].slice(0, 25));
    }, []);

    const connectWallet = async () => {
        try {
            const prov = window.okxwallet || window.ethereum;
            if (!prov) { addToast('No wallet found. Install OKX Wallet or MetaMask.', 'error'); return; }
            await prov.request({ method: 'eth_requestAccounts' });
            const ep = new ethers.BrowserProvider(prov);
            const s = await ep.getSigner();
            const addr = await s.getAddress();
            setContract(new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, s));
            setAddress(addr);
            addLog(`Wallet connected: ${addr}`);
            addToast('Wallet connected!', 'success');

            // Try fetch from registry, fall back to static list
            setLoading(true);
            try {
                const reg = new ethers.Contract(REGISTRY_ADDRESS, REGISTRY_ABI, s);
                const raw = await reg.getActiveAgents();
                if (raw.length > 0) {
                    const getIcon = name => {
                        const n = name.toLowerCase();
                        if (n.includes('eth') || n.includes('predict')) return () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
                        if (n.includes('sentiment')) return () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>;
                        return () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>;
                    };
                    setAgents(raw.map((a, i) => ({
                        name: a.name, price: ethers.formatEther(a.price), symbol: 'OKB',
                        address: a.agentAddress, description: a.description,
                        reputation: parseFloat((4.5 + i * 0.15).toFixed(1)),
                        confidence: Math.min(96, 83 + i * 6),
                        placeholder: `e.g. Result from ${a.name}`,
                        Icon: getIcon(a.name),
                    })));
                }
            } catch { /* keep fallback */ }
            setLoading(false);
        } catch (err) {
            addToast(err.message || 'Failed to connect', 'error');
            addLog(`Connection failed: ${err.message}`, null, false, true);
        }
    };

    const disconnectWallet = () => {
        setContract(null); setAddress('');
        setAgents(FALLBACK_AGENTS);
        addLog('Wallet disconnected');
        addToast('Wallet disconnected', 'success');
    };

    const handleEscrowSuccess = useCallback(record => setHistory(p => [record, ...p]), []);
    const handleRelease = useCallback((id, txHash) => setHistory(p => p.map(h => h.id === id ? {...h, status:'released', txHash} : h)), []);
    const curNet = NETWORKS.find(n => n.id === network) || NETWORKS[0];

    return (
        <>
            <Splash />

            <div className="aurora">
                <div className="aurora-blob"/><div className="aurora-blob"/><div className="aurora-blob"/>
                <div className="aurora-strip"/><div className="aurora-mask"/>
            </div>

            <div className="toasts">
                {toasts.map(t => <Toast key={t.id} message={t.msg} type={t.type} onClose={() => removeToast(t.id)} />)}
            </div>

            <div className="app">
                {/* Topbar */}
                <div className="topbar">
                    <div className="logo-row">
                        <div className="logo-badge">
                            <svg width="24" height="24" viewBox="0 0 34 34" fill="none">
                                <defs><linearGradient id="lg" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop stopColor="#22d3ee"/><stop offset="1" stopColor="#3b82f6"/></linearGradient></defs>
                                <path d="M17 2L4 7.5V17c0 6.6 5.6 12.8 13 14.5C24.4 29.8 30 23.6 30 17V7.5L17 2z" fill="url(#lg)" fillOpacity="0.2" stroke="url(#lg)" strokeWidth="1.4" strokeLinejoin="round"/>
                                <circle cx="17" cy="17" r="2.5" fill="#22d3ee"/>
                                <line x1="17" y1="10.5" x2="17" y2="14.5" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                                <line x1="17" y1="19.5" x2="17" y2="23.5" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                                <line x1="10.5" y1="17" x2="14.5" y2="17" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                                <line x1="19.5" y1="17" x2="23.5" y2="17" stroke="#22d3ee" strokeWidth="1.4" strokeLinecap="round"/>
                            </svg>
                        </div>
                        <div>
                            <h1>ProofPayX</h1>
                            <div className="tagline">Stripe for AI agents — but <em>trustless</em></div>
                        </div>
                    </div>
                    <div className="topbar-right">
                        <NetSwitcher network={network} setNetwork={setNetwork} />
                        <ThemeBtn dark={dark} toggle={() => setDark(d => !d)} />
                    </div>
                </div>

                {/* Wallet */}
                <div className="wallet-bar">
                    {address ? (
                        <div className="wallet-info">
                            <CopyBtn text={address} className="wallet-pill">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                {address.slice(0,6)}...{address.slice(-4)}
                            </CopyBtn>
                            <button className="btn-disconnect" onClick={disconnectWallet}>Disconnect</button>
                        </div>
                    ) : (
                        <button className="btn-wallet" onClick={connectWallet}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M20 12v4H6a2 2 0 0 0-2 2c0 1.1.9 2 2 2h12v-4"/><path d="M20 12h-4"/></svg>
                            Connect OKX Wallet
                        </button>
                    )}
                </div>

                {/* Main */}
                <div className="main-grid">
                    <div className="col">
                        <div className="card">
                            <div className="card-head">
                                <div className="card-head-left">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                                    Available Agents
                                </div>
                                <span className="card-head-right">
                                    {loadingAgents ? 'Loading...' : `${agents.length} agents`}
                                </span>
                            </div>
                            <div className="agent-grid">
                                {loadingAgents
                                    ? [1,2,3].map(i => <AgentSkeleton key={i}/>)
                                    : agents.map(a => (
                                        <AgentTile key={a.address + a.name} agent={a}
                                            isSelected={selectedAgent?.address === a.address && selectedAgent?.name === a.name}
                                            onClick={() => { setAgent(a); addLog(`Selected agent: ${a.name}`); }}
                                        />
                                    ))
                                }
                            </div>
                        </div>
                        <EscrowForm contract={contract} onSuccess={handleEscrowSuccess} onLog={addLog} selectedAgent={selectedAgent} addToast={addToast} />
                        <EscrowHistory history={history} network={network} />
                    </div>
                    <div className="col">
                        <VerifyForm contract={contract} onLog={addLog} addToast={addToast} onRelease={handleRelease} />
                        <TxLog logs={logs} />
                    </div>
                </div>

                <div className="footer">
                    <span>{curNet.name}</span>
                    <span style={{color:'var(--border)'}}>·</span>
                    <span>Contract: <CopyBtn text={CONTRACT_ADDRESS} style={{fontFamily:"'JetBrains Mono',monospace"}}>{CONTRACT_ADDRESS.slice(0,6)}...{CONTRACT_ADDRESS.slice(-4)}</CopyBtn></span>
                    <span style={{color:'var(--border)'}}>·</span>
                    <span>Registry: <CopyBtn text={REGISTRY_ADDRESS} style={{fontFamily:"'JetBrains Mono',monospace"}}>{REGISTRY_ADDRESS.slice(0,6)}...{REGISTRY_ADDRESS.slice(-4)}</CopyBtn></span>
                </div>
            </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
