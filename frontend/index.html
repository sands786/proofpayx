<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProofPayX — Trustless AI Payments</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --blue-300: #93c5fd;
            --indigo-300: #a5b4fc;
            --violet-200: #ddd6fe;
            --zinc-50: #fafafa;
            --zinc-100: #f4f4f5;
            --zinc-200: #e4e4e7;
            --zinc-300: #d4d4d8;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --zinc-600: #52525b;
            --zinc-700: #3f3f46;
            --zinc-800: #27272a;
            --zinc-900: #18181b;
            --zinc-950: #09090b;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--zinc-950);
            color: var(--zinc-100);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Aurora Background Animation */
        .aurora-container {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }
        
        .aurora-gradient {
            position: absolute;
            inset: -10px;
            opacity: 0.5;
            filter: blur(10px);
            background-image: 
                repeating-linear-gradient(100deg, var(--zinc-950) 0%, var(--zinc-950) 7%, transparent 10%, transparent 12%, var(--zinc-950) 16%),
                repeating-linear-gradient(100deg, var(--blue-500) 10%, var(--indigo-300) 15%, var(--blue-300) 20%, var(--violet-200) 25%, var(--blue-400) 30%);
            background-size: 300%, 200%;
            background-position: 50% 50%, 50% 50%;
            animation: aurora 60s linear infinite;
            pointer-events: none;
        }
        
        .aurora-gradient::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(100deg, var(--zinc-950) 0%, var(--zinc-950) 7%, transparent 10%, transparent 12%, var(--zinc-950) 16%),
                repeating-linear-gradient(100deg, var(--blue-500) 10%, var(--indigo-300) 15%, var(--blue-300) 20%, var(--violet-200) 25%, var(--blue-400) 30%);
            background-size: 200%, 100%;
            background-attachment: fixed;
            mix-blend-mode: difference;
            animation: aurora 60s linear infinite;
        }
        
        .aurora-mask {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 100% 0%, transparent 10%, var(--zinc-950) 70%);
            pointer-events: none;
        }
        
        @keyframes aurora {
            from {
                background-position: 50% 50%, 50% 50%;
            }
            to {
                background-position: 350% 50%, 350% 50%;
            }
        }
        
        .app-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
        }
        
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.6s ease-out;
        }
        
        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.2), rgba(59, 130, 246, 0.2));
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg {
            width: 32px;
            height: 32px;
            color: var(--cyan-400);
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--cyan-400), var(--blue-400), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.25rem;
            color: var(--zinc-400);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .subtitle span {
            color: var(--cyan-400);
            font-weight: 600;
        }
        
        .wallet-section {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }
        
        .wallet-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(90deg, var(--cyan-500), var(--blue-500));
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        .wallet-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
        }
        
        .wallet-connected {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
        }
        
        .wallet-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 9999px;
            color: #22c55e;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
        }
        
        .disconnect-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.5);
            border-radius: 16px;
            padding: 1.5rem;
        }
        
        .card-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--zinc-100);
            margin-bottom: 1.5rem;
        }
        
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        
        @media (max-width: 640px) {
            .agent-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .agent-card {
            background: rgba(39, 39, 42, 0.5);
            border: 2px solid rgba(63, 63, 70, 0.5);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .agent-card:hover {
            transform: scale(1.02);
            border-color: rgba(34, 211, 238, 0.5);
        }
        
        .agent-card.selected {
            border-color: var(--cyan-400);
            background: rgba(34, 211, 238, 0.1);
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            font-size: 0.875rem;
            color: var(--zinc-400);
            margin-bottom: 0.5rem;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(9, 9, 11, 0.8);
            border: 1px solid rgba(63, 63, 70, 0.8);
            border-radius: 8px;
            color: var(--zinc-100);
            font-size: 0.875rem;
            font-family: inherit;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--cyan-500);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(90deg, var(--cyan-500), var(--blue-500));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status-success {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            color: #22c55e;
            margin-top: 0.5rem;
        }
        
        .status-error {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #ef4444;
            margin-top: 0.5rem;
        }
        
        .tx-badge {
            display: block;
            width: 100%;
            padding: 0.75rem;
            margin-top: 1rem;
            background: rgba(9, 9, 11, 0.5);
            border: 1px solid rgba(63, 63, 70, 0.5);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--zinc-400);
            text-align: center;
            word-break: break-all;
        }
        
        .log-container {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(9, 9, 11, 0.5);
            border: 1px solid rgba(63, 63, 70, 0.5);
            border-radius: 8px;
            padding: 1rem;
        }
        
        .log-entry {
            font-size: 0.875rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(63, 63, 70, 0.3);
        }
        
        .log-time {
            color: var(--zinc-600);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }
        
        .log-link {
            color: var(--cyan-400);
            text-decoration: underline;
            margin-left: 0.5rem;
            font-size: 0.75rem;
        }
        
        .footer {
            text-align: center;
            color: var(--zinc-600);
            font-size: 0.875rem;
            padding: 2rem 0;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        const CONTRACT_ADDRESS = "0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6";
        const CONTRACT_ABI = [
            "function createEscrow(address _agent, bytes32 _hashlock, uint8 _minConfidence, uint256 _durationSeconds) external payable returns (uint256)",
            "function verifyAndRelease(uint256 _id, bytes memory _proof, uint8 _confidence) external",
            "function escrowCounter() view returns (uint256)"
        ];
        
        const AGENTS = [
            { name: "ETH Predictor", price: "0.01 OKB", address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb" },
            { name: "Sentiment Analyst", price: "0.005 OKB", address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb" },
            { name: "Code Auditor", price: "0.02 OKB", address: "0x04b772f0cf69f45956061100d14bc5417b9ba3eb" }
        ];
        
        function App() {
            const [contract, setContract] = useState(null);
            const [address, setAddress] = useState("");
            const [selectedAgent, setSelectedAgent] = useState(null);
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(false);
            
            const addLog = (message, txHash) => {
                const time = new Date().toLocaleTimeString();
                setLogs(prev => [{ time, message, txHash }, ...prev].slice(0, 20));
            };
            
            const connectWallet = async () => {
                const provider = window.okxwallet || window.ethereum;
                if (!provider) { alert("Install OKX Wallet"); return; }
                try {
                    const accounts = await provider.request({ method: "eth_requestAccounts" });
                    const ethersProvider = new ethers.BrowserProvider(provider);
                    const signer = await ethersProvider.getSigner();
                    const addressObj = await signer.getAddress();
                    const contractObj = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                    setContract(contractObj);
                    setAddress(addressObj);
                    addLog(`Wallet connected: ${addressObj.slice(0,6)}...${addressObj.slice(-4)}`);
                } catch (err) {
                    addLog(`Connection failed: ${err.message}`);
                }
            };
            
            const disconnectWallet = () => {
                setContract(null);
                setAddress("");
                addLog("Wallet disconnected");
            };
            
            const createEscrow = async () => {
                if (!contract) { alert("Connect wallet first"); return; }
                setLoading(true);
                try {
                    const hashlock = ethers.keccak256(ethers.toUtf8Bytes("Test data"));
                    const tx = await contract.createEscrow(selectedAgent?.address || AGENTS[0].address, hashlock, 80, 3600, {
                        value: ethers.parseEther("0.001")
                    });
                    addLog(`Escrow created! TX: ${tx.hash.slice(0,16)}...`, tx.hash);
                    await tx.wait();
                    addLog(`✅ Escrow confirmed!`);
                } catch (err) {
                    addLog(`❌ Failed: ${err.message}`);
                } finally {
                    setLoading(false);
                }
            };
            
            return (
                <div className="app-container">
                    <div className="aurora-container">
                        <div className="aurora-gradient"></div>
                        <div className="aurora-mask"></div>
                    </div>
                    
                    <div className="header">
                        <div className="logo-container">
                            <div className="logo-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </div>
                            <h1>ProofPayX</h1>
                        </div>
                        <p className="subtitle">Stripe for AI agents — but <span>trustless</span></p>
                    </div>
                    
                    <div className="wallet-section">
                        {address ? (
                            <div className="wallet-connected">
                                <div className="wallet-badge">✅ {address.slice(0,6)}...{address.slice(-4)}</div>
                                <button className="disconnect-btn" onClick={disconnectWallet}>Disconnect</button>
                            </div>
                        ) : (
                            <button className="wallet-btn" onClick={connectWallet}>🔌 Connect OKX Wallet</button>
                        )}
                    </div>
                    
                    <div className="main-grid">
                        <div>
                            <div className="card">
                                <div className="card-title">🤖 Available Agents</div>
                                <div className="agent-grid">
                                    {AGENTS.map((agent, i) => (
                                        <div key={i} className={`agent-card ${selectedAgent?.name === agent.name ? 'selected' : ''}`} onClick={() => setSelectedAgent(agent)}>
                                            <div className="agent-name">{agent.name}</div>
                                            <div className="agent-price">{agent.price}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="card" style={{marginTop: '1.5rem'}}>
                                <div className="card-title">💰 Create Escrow</div>
                                <button className="submit-btn" onClick={createEscrow} disabled={loading}>
                                    {loading ? "Processing..." : "Lock Payment"}
                                </button>
                            </div>
                        </div>
                        
                        <div>
                            <div className="card">
                                <div className="card-title">📋 Transaction Log</div>
                                <div className="log-container">
                                    {logs.length === 0 && <div style={{color: 'var(--zinc-600)', textAlign: 'center'}}>No transactions yet.</div>}
                                    {logs.map((log, i) => (
                                        <div key={i} className="log-entry">
                                            <span className="log-time">[{log.time}]</span>
                                            <span>{log.message}</span>
                                            {log.txHash && <a href={`https://www.okx.com/web3/explorer/xlayer-testnet/tx/${log.txHash}`} target="_blank" className="log-link">View ↗</a>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="footer">Connected to X Layer Testnet</div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
