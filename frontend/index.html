<!DOCTYPE html>
<html>
<head>
    <title>ProofPayX — Trustless AI Payments</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ffcc;
            padding: 2rem;
            margin: 0;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        button {
            background: #00ffcc;
            color: #0a0a0a;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            background: #1a1a1a;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            border-radius: 4px;
            font-family: monospace;
        }
        .card {
            border: 1px solid #00ffcc;
            padding: 1.5rem;
            margin: 1rem 0;
            border-radius: 12px;
            background: #0a0a0a;
        }
        h1 { margin-top: 0; }
        .status { font-size: 14px; margin-top: 12px; }
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .agent-card {
            background: #1a1a1a;
            border: 1px solid #00ffcc44;
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .agent-card:hover {
            border-color: #00ffcc;
            transform: translateY(-2px);
        }
        .agent-name { font-size: 1.2rem; font-weight: bold; }
        .agent-rep { font-size: 0.8rem; color: #00ffccaa; }
        .agent-price { font-size: 1rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔒 ProofPayX</h1>
    <p><em>Stripe for AI agents — but trustless.</em></p>
    
    <div class="card">
        <h3>📡 1. Connect Wallet</h3>
        <button id="connectBtn">Connect OKX Wallet</button>
        <p id="walletAddress" class="status"></p>
    </div>
    
    <div class="card">
        <h3>🤖 2. Available Agents (with Reputation)</h3>
        <div id="agentList" class="agent-grid">Loading agents...</div>
    </div>
    
    <div class="card">
        <h3>💰 3. Create Escrow</h3>
        <input type="text" id="agentAddress" placeholder="Agent Address (click an agent above to fill)">
        <input type="number" id="amount" placeholder="Amount (OKB)" step="0.001">
        <input type="number" id="confidence" placeholder="Min Confidence %" value="80">
        <textarea id="resultData" placeholder="Describe what you want the agent to deliver"></textarea>
        <button id="createBtn">Lock Payment</button>
    </div>
    
    <div class="card">
        <h3>🔓 4. Agent Verification (Demo)</h3>
        <input type="number" id="escrowId" placeholder="Escrow ID">
        <textarea id="actualData" placeholder="Actual delivered data"></textarea>
        <input type="number" id="actualConfidence" placeholder="Confidence %">
        <button id="verifyBtn">Verify & Release</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.min.js"></script>
<script>
    let provider, signer, contract;
    const CONTRACT_ADDRESS = "0x156C52c25d94956bBf20BE025ACbc55c1A5d56d6"; // Update after mainnet deploy
    
    const contractABI = [
        "function createEscrow(address _agent, bytes32 _hashlock, uint8 _minConfidence, uint256 _durationSeconds) external payable returns (uint256)",
        "function verifyAndRelease(uint256 _id, bytes32 _proof, uint8 _confidence) external",
        "function getReputation(address agent) view returns (uint256, uint256, uint256)",
        "event EscrowCreated(uint256 id, address payer, address agent, uint256 amount, bytes32 hashlock, uint8 minConfidence)",
        "event Released(uint256 id, address agent, uint256 amount)"
    ];
    
    // Marketplace agents (in real app, fetch from registry)
    const marketplaceAgents = [
        { address: "0x742d35Cc6634C0532925a3b844Bc9e7595f6b6cc", name: "ETH Predictor", price: 0.01, description: "5-min ETH price prediction with 90%+ confidence" },
        { address: "0x4B0897b0513fdC7C541B6d9D7E929C4e5364D2db", name: "Sentiment Analyst", price: 0.005, description: "Real-time market sentiment from news & social" },
        { address: "0xAb5801a7D398351b8bE11C439e05C5B3259aeC9B", name: "Code Auditor", price: 0.02, description: "Smart contract vulnerability scanner" },
        { address: "0xYourAgentAddress", name: "Your Custom Agent", price: 0.008, description: "Add any agent here" }
    ];
    
    document.getElementById('connectBtn').onclick = async () => {
        if (window.ethereum) {
            provider = new ethers.BrowserProvider(window.ethereum);
            await provider.send('eth_requestAccounts', []);
            signer = await provider.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDRESS, contractABI, signer);
            const address = await signer.getAddress();
            document.getElementById('walletAddress').innerHTML = `Connected: ${address}`;
            loadMarketplace();
        } else {
            alert('Please install OKX Wallet extension');
        }
    };
    
    async function loadMarketplace() {
        const container = document.getElementById('agentList');
        container.innerHTML = '';
        for (const agent of marketplaceAgents) {
            let repText = 'Unknown';
            try {
                const rep = await contract.getReputation(agent.address);
                repText = `${rep[0]}% (${rep[1]} jobs) | Earned: ${ethers.formatEther(rep[2])} OKB`;
            } catch(e) { console.log('No reputation yet'); }
            
            const card = document.createElement('div');
            card.className = 'agent-card';
            card.innerHTML = `
                <div class="agent-name">${agent.name}</div>
                <div class="agent-rep">Reputation: ${repText}</div>
                <div class="agent-price">💰 ${agent.price} OKB</div>
                <div style="font-size:0.8rem; margin-top:8px;">${agent.description}</div>
            `;
            card.onclick = () => {
                document.getElementById('agentAddress').value = agent.address;
                document.getElementById('amount').value = agent.price;
                alert(`Selected ${agent.name}. Fill in the expected result and lock payment.`);
            };
            container.appendChild(card);
        }
    }
    
    document.getElementById('createBtn').onclick = async () => {
        const agent = document.getElementById('agentAddress').value;
        const amount = document.getElementById('amount').value;
        const minConf = document.getElementById('confidence').value;
        const data = document.getElementById('resultData').value;
        if (!agent || !amount || !data) { alert('Fill all fields'); return; }
        const hashlock = ethers.keccak256(ethers.toUtf8Bytes(data));
        const tx = await contract.createEscrow(agent, hashlock, minConf, 3600, {
            value: ethers.parseEther(amount)
        });
        await tx.wait();
        alert('Escrow created! Check explorer.');
    };
    
    document.getElementById('verifyBtn').onclick = async () => {
        const id = document.getElementById('escrowId').value;
        const data = document.getElementById('actualData').value;
        const conf = document.getElementById('actualConfidence').value;
        if (!id || !data || !conf) { alert('Fill all fields'); return; }
        const proofHash = ethers.keccak256(ethers.toUtf8Bytes(data));
        const tx = await contract.verifyAndRelease(id, proofHash, conf);
        await tx.wait();
        alert('Payment released!');
    };
</script>
</body>
</html>
